<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" role="img" aria-labelledby="title desc">
  <title id="title">Blog banner</title>
  <desc id="desc">A simple gradient banner for a personal blog.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="45%" stop-color="#164e63" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="1600" height="480" fill="url(#bg)" />
  <g opacity="0.3">
    <circle cx="1320" cy="120" r="160" fill="#ffffff" fill-opacity="0.08" />
    <circle cx="1180" cy="320" r="240" fill="#ffffff" fill-opacity="0.05" />
    <circle cx="260" cy="420" r="180" fill="#ffffff" fill-opacity="0.06" />
  </g>
  <g stroke="url(#line)" stroke-width="2">
    <path d="M0 120h780" />
    <path d="M0 200h1020" />
    <path d="M0 280h900" />
    <path d="M0 360h1180" />
  </g>
  <g fill="#ffffff">
    <rect x="140" y="128" width="180" height="18" rx="9" fill-opacity="0.24" />
    <rect x="140" y="166" width="320" height="20" rx="10" fill-opacity="0.88" />
    <rect x="140" y="206" width="260" height="16" rx="8" fill-opacity="0.28" />
    <rect x="140" y="252" width="420" height="16" rx="8" fill-opacity="0.16" />
    <rect x="140" y="284" width="360" height="16" rx="8" fill-opacity="0.16" />
  </g>
</svg>
