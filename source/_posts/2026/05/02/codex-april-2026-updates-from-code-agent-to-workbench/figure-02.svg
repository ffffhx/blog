<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Codex 工作台能力分层</title>
  <desc id="desc">展示 Codex 从模型到组织级部署的五层能力。</desc>
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="70" y="76" fill="#111827" font-family="Arial, 'PingFang SC', sans-serif" font-size="36" font-weight="800">Codex 正在形成五层工作台</text>
  <text x="72" y="118" fill="#64748b" font-family="Arial, 'PingFang SC', sans-serif" font-size="20">模型更强只是第一层，真正的变化是 harness、工具、长期任务和组织边界一起成熟。</text>
  <g font-family="Arial, 'PingFang SC', sans-serif" font-size="20">
    <rect x="110" y="185" width="980" height="80" rx="18" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="145" y="235" fill="#1e3a8a" font-weight="700">模型层</text>
    <text x="300" y="235" fill="#1e293b">GPT-5.5 进入 Codex，适合实现、重构、调试、测试和知识工作</text>
    <rect x="110" y="290" width="980" height="80" rx="18" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="145" y="340" fill="#075985" font-weight="700">Harness 层</text>
    <text x="300" y="340" fill="#1e293b">App Server、多环境、hooks、MCP、tool discovery、permission profiles</text>
    <rect x="110" y="395" width="980" height="80" rx="18" fill="#ccfbf1" stroke="#5eead4"/>
    <text x="145" y="445" fill="#115e59" font-weight="700">工作台层</text>
    <text x="300" y="445" fill="#1e293b">Browser Use、Computer Use、Chats、PR review、artifact viewer、多终端</text>
    <rect x="110" y="500" width="980" height="80" rx="18" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="145" y="550" fill="#92400e" font-weight="700">长期任务层</text>
    <text x="300" y="550" fill="#1e293b">Memory、context-aware suggestions、thread automations、持久化 /goal</text>
    <rect x="110" y="605" width="980" height="80" rx="18" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="145" y="655" fill="#991b1b" font-weight="700">组织层</text>
    <text x="300" y="655" fill="#1e293b">token 计费、Codex-only seats、Bedrock、Codex Labs、账号安全</text>
  </g>
  <g transform="translate(970 134)">
    <rect x="0" y="0" width="80" height="80" rx="22" fill="#111827"/>
    <circle cx="30" cy="35" r="6" fill="#fde68a"/>
    <circle cx="52" cy="35" r="6" fill="#fde68a"/>
    <path d="M30 56 Q42 64 54 56" fill="none" stroke="#fde68a" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
