<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Codex 最近一个月更新时间线</title>
  <desc id="desc">展示 2026 年 4 月到 5 月初 Codex 的主要更新节点。</desc>
  <rect width="1200" height="760" fill="#fbf7ef"/>
  <text x="70" y="74" fill="#111827" font-family="Arial, 'PingFang SC', sans-serif" font-size="36" font-weight="800">最近 30 天的主线不是“功能多”，而是“常驻化”</text>
  <text x="72" y="116" fill="#64748b" font-family="Arial, 'PingFang SC', sans-serif" font-size="20">2026-04-02 到 2026-05-02，Codex 同时更新了计费、桌面 app、模型、CLI、企业化和状态浮层。</text>
  <line x1="120" y1="390" x2="1080" y2="390" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <g transform="translate(90 195)">
      <circle cx="30" cy="195" r="16" fill="#2563eb"/>
      <rect x="0" y="0" width="180" height="128" rx="18" fill="#dbeafe" stroke="#93c5fd"/>
      <text x="22" y="38" fill="#1e3a8a" font-size="20" font-weight="700">4 月 2 日</text>
      <text x="22" y="72" fill="#1e293b" font-size="18">PAYG 与</text>
      <text x="22" y="100" fill="#1e293b" font-size="18">token 计费</text>
    </g>
    <g transform="translate(245 430)">
      <circle cx="30" cy="-40" r="16" fill="#b45309"/>
      <rect x="0" y="0" width="180" height="128" rx="18" fill="#ffedd5" stroke="#fdba74"/>
      <text x="22" y="38" fill="#92400e" font-size="20" font-weight="700">4 月 9 日</text>
      <text x="22" y="72" fill="#1e293b" font-size="18">$100 Pro</text>
      <text x="22" y="100" fill="#1e293b" font-size="18">Codex 用量</text>
    </g>
    <g transform="translate(400 195)">
      <circle cx="30" cy="195" r="16" fill="#0f766e"/>
      <rect x="0" y="0" width="205" height="128" rx="18" fill="#ccfbf1" stroke="#5eead4"/>
      <text x="22" y="38" fill="#115e59" font-size="20" font-weight="700">4 月 16 日</text>
      <text x="22" y="72" fill="#1e293b" font-size="18">Codex app</text>
      <text x="22" y="100" fill="#1e293b" font-size="18">变成工作台</text>
    </g>
    <g transform="translate(600 430)">
      <circle cx="30" cy="-40" r="16" fill="#7c3aed"/>
      <rect x="0" y="0" width="200" height="128" rx="18" fill="#ede9fe" stroke="#c4b5fd"/>
      <text x="22" y="38" fill="#5b21b6" font-size="20" font-weight="700">4 月 23 日</text>
      <text x="22" y="72" fill="#1e293b" font-size="18">GPT-5.5</text>
      <text x="22" y="100" fill="#1e293b" font-size="18">Browser Use</text>
    </g>
    <g transform="translate(785 195)">
      <circle cx="30" cy="195" r="16" fill="#dc2626"/>
      <rect x="0" y="0" width="205" height="128" rx="18" fill="#fee2e2" stroke="#fca5a5"/>
      <text x="22" y="38" fill="#991b1b" font-size="20" font-weight="700">4 月 30 日</text>
      <text x="22" y="72" fill="#1e293b" font-size="18">CLI /goal</text>
      <text x="22" y="100" fill="#1e293b" font-size="18">账号安全</text>
    </g>
    <g transform="translate(955 430)">
      <circle cx="30" cy="-40" r="16" fill="#334155"/>
      <rect x="0" y="0" width="180" height="128" rx="18" fill="#e2e8f0" stroke="#94a3b8"/>
      <text x="22" y="38" fill="#0f172a" font-size="20" font-weight="700">5 月 1 日</text>
      <text x="22" y="72" fill="#1e293b" font-size="18">Codex Pets</text>
      <text x="22" y="100" fill="#1e293b" font-size="18">状态浮层</text>
    </g>
  </g>
</svg>
