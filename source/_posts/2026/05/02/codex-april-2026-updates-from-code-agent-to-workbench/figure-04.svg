<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Codex 企业化和安全更新</title>
  <desc id="desc">展示 Codex 在计费、企业部署和安全上的更新。</desc>
  <rect width="1200" height="760" fill="#f6f5f0"/>
  <text x="70" y="76" fill="#111827" font-family="Arial, 'PingFang SC', sans-serif" font-size="36" font-weight="800">组织级使用需要三件事：算清、接入、守住边界</text>
  <text x="72" y="118" fill="#64748b" font-family="Arial, 'PingFang SC', sans-serif" font-size="20">4 月的多项更新都在回答企业会问的问题：钱怎么算，怎么接入，出了风险怎么控。</text>
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="90" y="190" width="310" height="410" rx="26" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="128" y="245" fill="#1e3a8a" font-size="28" font-weight="800">计费透明</text>
    <text x="128" y="300" fill="#1e293b" font-size="20">Codex-only seats</text>
    <text x="128" y="340" fill="#1e293b" font-size="20">token-based rate card</text>
    <text x="128" y="380" fill="#1e293b" font-size="20">input / cached / output</text>
    <text x="128" y="420" fill="#1e293b" font-size="20">$100 Pro 选项</text>
    <text x="128" y="500" fill="#475569" font-size="18">重点：从“每条消息估算”</text>
    <text x="128" y="530" fill="#475569" font-size="18">转向“按 token 明细看”。</text>
    <rect x="445" y="190" width="310" height="410" rx="26" fill="#ccfbf1" stroke="#5eead4"/>
    <text x="483" y="245" fill="#115e59" font-size="28" font-weight="800">企业接入</text>
    <text x="483" y="300" fill="#1e293b" font-size="20">90+ plugins</text>
    <text x="483" y="340" fill="#1e293b" font-size="20">Codex Labs</text>
    <text x="483" y="380" fill="#1e293b" font-size="20">GSI 合作伙伴</text>
    <text x="483" y="420" fill="#1e293b" font-size="20">Amazon Bedrock preview</text>
    <text x="483" y="500" fill="#475569" font-size="18">重点：放进已有云、采购</text>
    <text x="483" y="530" fill="#475569" font-size="18">和团队工具链。</text>
    <rect x="800" y="190" width="310" height="410" rx="26" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="838" y="245" fill="#991b1b" font-size="28" font-weight="800">安全边界</text>
    <text x="838" y="300" fill="#1e293b" font-size="20">Automatic approvals</text>
    <text x="838" y="340" fill="#1e293b" font-size="20">permission profiles</text>
    <text x="838" y="380" fill="#1e293b" font-size="20">Advanced Account Security</text>
    <text x="838" y="420" fill="#1e293b" font-size="20">macOS 签名证书轮换</text>
    <text x="838" y="500" fill="#475569" font-size="18">重点：Agent 能做更多事，</text>
    <text x="838" y="530" fill="#475569" font-size="18">审批和账号必须更强。</text>
  </g>
</svg>
