<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Codex app 常驻工作流</title>
  <desc id="desc">展示 Codex app 如何通过聊天、浏览器、自动化、记忆和桌宠形成常驻工作流。</desc>
  <rect width="1200" height="760" fill="#fffaf0"/>
  <text x="70" y="76" fill="#111827" font-family="Arial, 'PingFang SC', sans-serif" font-size="36" font-weight="800">从一次对话，到一段持续工作流</text>
  <text x="72" y="118" fill="#64748b" font-family="Arial, 'PingFang SC', sans-serif" font-size="20">Codex app 的更新让任务可以开始、执行、暂停、唤醒、回看，并在桌面上暴露状态。</text>
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="80" y="210" width="210" height="120" rx="22" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="118" y="255" fill="#1e3a8a" font-size="24" font-weight="700">Chats</text>
    <text x="118" y="292" fill="#334155" font-size="18">不用先选项目</text>
    <text x="118" y="318" fill="#334155" font-size="18">先研究和规划</text>
    <path d="M290 270 L390 270" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="390" y="210" width="230" height="120" rx="22" fill="#ccfbf1" stroke="#5eead4"/>
    <text x="428" y="255" fill="#115e59" font-size="24" font-weight="700">Browser / Computer</text>
    <text x="428" y="292" fill="#334155" font-size="18">看页面、点击 UI</text>
    <text x="428" y="318" fill="#334155" font-size="18">验证本地修复</text>
    <path d="M620 270 L720 270" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="720" y="210" width="220" height="120" rx="22" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="758" y="255" fill="#92400e" font-size="24" font-weight="700">Artifacts</text>
    <text x="758" y="292" fill="#334155" font-size="18">预览文档产物</text>
    <text x="758" y="318" fill="#334155" font-size="18">继续 Review</text>
    <path d="M830 330 C830 420 640 420 640 500" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="405" y="500" width="250" height="120" rx="22" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="443" y="545" fill="#5b21b6" font-size="24" font-weight="700">Memory + Automation</text>
    <text x="443" y="582" fill="#334155" font-size="18">保留上下文</text>
    <text x="443" y="608" fill="#334155" font-size="18">定时唤醒线程</text>
    <path d="M405 560 C300 560 250 470 210 340" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="840" y="500" width="220" height="120" rx="22" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="878" y="545" fill="#0f172a" font-size="24" font-weight="700">Codex Pets</text>
    <text x="878" y="582" fill="#334155" font-size="18">桌面浮层</text>
    <text x="878" y="608" fill="#334155" font-size="18">展示任务状态</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
