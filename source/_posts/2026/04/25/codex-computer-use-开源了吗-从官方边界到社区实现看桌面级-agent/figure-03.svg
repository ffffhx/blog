<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">三种 Computer Use 实现路线对比</title>
  <desc id="desc">对比官方 bundled plugin、codex-cua 内嵌式 GUI tools、open-computer-use 与 cua-driver MCP 外挂式实现。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#334155" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    .bg { fill: #f7f3ea; }
    .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #1f2937; }
    .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #64748b; }
    .card { fill: #ffffff; stroke-width: 2; rx: 18; filter: url(#shadow); }
    .official { stroke: #d39b55; }
    .embedded { stroke: #5f8fb4; }
    .mcp { stroke: #6aa886; }
    .head { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #1f2937; }
    .tag { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #ffffff; }
    .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #334155; }
    .text { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #475569; }
    .bar1 { fill: #b86b18; }
    .bar2 { fill: #407aa4; }
    .bar3 { fill: #2f7d63; }
    .line { stroke: #e2d7c8; stroke-width: 1; }
  </style>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="72" y="72">Computer Use 的三种实现路线</text>
  <text class="subtitle" x="72" y="104">官方产品形态、Codex core 内嵌方案、独立 MCP driver，各自解决的问题不同。</text>

  <rect class="card official" x="72" y="154" width="330" height="500" rx="18"/>
  <rect class="bar1" x="96" y="182" width="126" height="30" rx="15"/>
  <text class="tag" x="123" y="203">官方形态</text>
  <text class="head" x="96" y="252">Bundled Plugin</text>
  <line class="line" x1="96" y1="282" x2="378" y2="282"/>
  <text class="label" x="96" y="322">接入方式</text>
  <text class="text" x="96" y="350">openai/codex 发现</text>
  <text class="text" x="96" y="374">computer-use@openai-bundled</text>
  <text class="label" x="96" y="420">执行器</text>
  <text class="text" x="96" y="448">macOS app binary</text>
  <text class="text" x="96" y="472">license 标注 Proprietary</text>
  <text class="label" x="96" y="518">适合分析</text>
  <text class="text" x="96" y="546">看官方协议边界</text>
  <text class="text" x="96" y="570">不能读执行器源码</text>

  <rect class="card embedded" x="435" y="154" width="330" height="500" rx="18"/>
  <rect class="bar2" x="459" y="182" width="126" height="30" rx="15"/>
  <text class="tag" x="486" y="203">内嵌路线</text>
  <text class="head" x="459" y="252">codex-cua</text>
  <line class="line" x1="459" y1="282" x2="741" y2="282"/>
  <text class="label" x="459" y="322">接入方式</text>
  <text class="text" x="459" y="350">GUI tools 注册进 Codex core</text>
  <text class="text" x="459" y="374">gui_observe / gui_click</text>
  <text class="label" x="459" y="420">执行器</text>
  <text class="text" x="459" y="448">Rust handler + Swift helper</text>
  <text class="text" x="459" y="472">语义 grounding 和 session</text>
  <text class="label" x="459" y="518">适合分析</text>
  <text class="text" x="459" y="546">看 observe-act-verify</text>
  <text class="text" x="459" y="570">但不是官方实现</text>

  <rect class="card mcp" x="798" y="154" width="330" height="500" rx="18"/>
  <rect class="bar3" x="822" y="182" width="126" height="30" rx="15"/>
  <text class="tag" x="849" y="203">外挂路线</text>
  <text class="head" x="822" y="252">MCP Driver</text>
  <line class="line" x1="822" y1="282" x2="1104" y2="282"/>
  <text class="label" x="822" y="322">接入方式</text>
  <text class="text" x="822" y="350">独立 MCP server</text>
  <text class="text" x="822" y="374">Codex / Claude / Gemini 复用</text>
  <text class="label" x="822" y="420">执行器</text>
  <text class="text" x="822" y="448">AX tree + 截图 + 输入模拟</text>
  <text class="text" x="822" y="472">可扩展到后台窗口驱动</text>
  <text class="label" x="822" y="518">适合分析</text>
  <text class="text" x="822" y="546">看 MCP 工具协议</text>
  <text class="text" x="822" y="570">语义层通常外置</text>

  <rect x="72" y="690" width="1056" height="44" rx="12" fill="#ffffff" stroke="#d7c5aa"/>
  <text class="text" x="96" y="718">阅读顺序建议：先看官方 dynamic tool 边界，再看社区执行器如何用系统 API 完成观察、定位、执行和验证。</text>
</svg>
