<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">官方 Codex 仓库与 Computer Use 执行器的开源边界</title>
  <desc id="desc">图示官方 openai/codex 仓库开源的是运行时接入边界，实际 Computer Use 执行器以 proprietary bundled plugin 形式分发。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f6f84"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#334155" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    .bg { fill: #f7f3ea; }
    .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #1f2937; }
    .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #64748b; }
    .box { fill: #ffffff; stroke: #d7c5aa; stroke-width: 2; rx: 18; filter: url(#shadow); }
    .open { fill: #e8f3ef; stroke: #74a892; }
    .closed { fill: #fff4e6; stroke: #d39b55; }
    .system { fill: #eef2ff; stroke: #8491c8; }
    .label { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #1f2937; }
    .text { font: 400 17px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #334155; }
    .small { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #64748b; }
    .pill-open { fill: #2f7d63; }
    .pill-closed { fill: #b86b18; }
    .pill-text { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #ffffff; }
    .arrow { stroke: #3f6f84; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="72" y="72">Codex Computer Use 的开源边界</text>
  <text class="subtitle" x="72" y="104">官方仓库公开的是接入层；真正控制桌面的执行器仍是 bundled proprietary 插件。</text>

  <rect class="box open" x="72" y="160" width="310" height="430" rx="18"/>
  <rect class="pill-open" x="96" y="184" width="88" height="30" rx="15"/>
  <text class="pill-text" x="119" y="205">开源</text>
  <text class="label" x="96" y="250">openai/codex</text>
  <text class="text" x="96" y="292">Feature gate</text>
  <text class="small" x="96" y="318">ComputerUse stable flag</text>
  <text class="text" x="96" y="364">Plugin allowlist</text>
  <text class="small" x="96" y="390">computer-use@openai-bundled</text>
  <text class="text" x="96" y="436">tool_search 特判</text>
  <text class="small" x="96" y="462">更大的工具检索预算</text>
  <text class="text" x="96" y="508">Dynamic Tool 协议</text>
  <text class="small" x="96" y="534">请求事件与结果回传</text>

  <rect class="box closed" x="450" y="210" width="300" height="320" rx="18"/>
  <rect class="pill-closed" x="474" y="234" width="116" height="30" rx="15"/>
  <text class="pill-text" x="500" y="255">未开源</text>
  <text class="label" x="474" y="300">Bundled Plugin</text>
  <text class="text" x="474" y="342">computer-use</text>
  <text class="small" x="474" y="368">license: Proprietary</text>
  <text class="text" x="474" y="414">SkyComputerUseClient</text>
  <text class="small" x="474" y="440">以 MCP server 方式启动</text>
  <text class="text" x="474" y="486">macOS app binary</text>

  <rect class="box system" x="820" y="160" width="300" height="430" rx="18"/>
  <text class="label" x="844" y="226">操作系统能力</text>
  <text class="text" x="844" y="276">Accessibility</text>
  <text class="small" x="844" y="302">读取控件树与执行动作</text>
  <text class="text" x="844" y="348">Screen Capture</text>
  <text class="small" x="844" y="374">窗口截图和显示器截图</text>
  <text class="text" x="844" y="420">Input Events</text>
  <text class="small" x="844" y="446">鼠标、键盘、拖拽、滚动</text>
  <text class="text" x="844" y="492">User Apps</text>
  <text class="small" x="844" y="518">浏览器、IDE、聊天、表格等</text>

  <path class="arrow" d="M 382 370 C 410 370, 420 370, 450 370"/>
  <path class="arrow" d="M 750 370 C 780 370, 790 370, 820 370"/>
  <text class="small" x="393" y="350">动态工具请求</text>
  <text class="small" x="762" y="350">系统调用</text>

  <rect x="72" y="640" width="1048" height="56" rx="14" fill="#ffffff" stroke="#d7c5aa"/>
  <text class="text" x="96" y="674">判断标准：能看到 Codex 如何调用 Computer Use，不等于能看到官方 Computer Use 如何实现桌面控制。</text>
</svg>
