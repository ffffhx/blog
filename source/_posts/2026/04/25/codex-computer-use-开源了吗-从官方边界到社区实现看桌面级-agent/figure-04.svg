<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">macOS Computer Use 底层信号路径</title>
  <desc id="desc">图示 macOS 上 Computer Use 常见的权限、截图、无障碍树、输入事件和安全控制路径。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f6f84"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#334155" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    .bg { fill: #f6f1e8; }
    .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #1f2937; }
    .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #64748b; }
    .box { fill: #ffffff; stroke: #d7c5aa; stroke-width: 2; rx: 18; filter: url(#shadow); }
    .perm { fill: #fff4e6; stroke: #d39b55; }
    .observe { fill: #e8f3ef; stroke: #74a892; }
    .input { fill: #eef2ff; stroke: #8491c8; }
    .safe { fill: #f9e6e8; stroke: #c56b72; }
    .label { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #1f2937; }
    .text { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #475569; }
    .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #64748b; }
    .arrow { stroke: #3f6f84; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 8; fill: none; }
  </style>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="72" y="72">macOS Computer Use 的底层信号路径</text>
  <text class="subtitle" x="72" y="104">可用实现通常把 TCC 权限、屏幕观察、无障碍树和输入事件组合成一个受控服务。</text>

  <rect class="box" x="74" y="174" width="230" height="390" rx="18"/>
  <text class="label" x="102" y="226">Agent / MCP</text>
  <text class="text" x="102" y="276">get_app_state</text>
  <text class="text" x="102" y="316">click / drag / scroll</text>
  <text class="text" x="102" y="356">type_text / press_key</text>
  <text class="text" x="102" y="396">set_value</text>
  <text class="small" x="102" y="470">工具接口越清晰，模型越容易</text>
  <text class="small" x="102" y="494">把意图转成受限动作。</text>

  <rect class="box perm" x="374" y="150" width="250" height="150" rx="18"/>
  <text class="label" x="402" y="204">权限层</text>
  <text class="text" x="402" y="244">Accessibility</text>
  <text class="text" x="402" y="274">Screen Recording</text>

  <rect class="box observe" x="374" y="356" width="250" height="208" rx="18"/>
  <text class="label" x="402" y="410">观察层</text>
  <text class="text" x="402" y="450">AXUIElement 控件树</text>
  <text class="text" x="402" y="482">ScreenCaptureKit</text>
  <text class="text" x="402" y="514">screencapture / CGWindow</text>

  <rect class="box input" x="700" y="150" width="250" height="208" rx="18"/>
  <text class="label" x="728" y="204">动作层</text>
  <text class="text" x="728" y="244">AXPress / set value</text>
  <text class="text" x="728" y="276">CGEvent 键鼠事件</text>
  <text class="text" x="728" y="308">pid 定向投递</text>

  <rect class="box safe" x="700" y="414" width="250" height="150" rx="18"/>
  <text class="label" x="728" y="468">安全层</text>
  <text class="text" x="728" y="508">app allowlist</text>
  <text class="text" x="728" y="538">急停、锁、窗口排除</text>

  <rect class="box" x="1018" y="238" width="126" height="250" rx="18"/>
  <text class="label" x="1042" y="292">目标</text>
  <text class="text" x="1042" y="334">浏览器</text>
  <text class="text" x="1042" y="366">IDE</text>
  <text class="text" x="1042" y="398">聊天</text>
  <text class="text" x="1042" y="430">系统窗口</text>

  <path class="arrow" d="M 304 276 C 334 252, 344 232, 374 224"/>
  <path class="arrow" d="M 304 394 C 334 414, 344 440, 374 460"/>
  <path class="arrow" d="M 624 460 C 656 430, 674 386, 700 318"/>
  <path class="arrow" d="M 950 254 C 982 276, 998 300, 1018 324"/>
  <path class="arrow" d="M 950 492 C 984 474, 1002 452, 1018 430"/>
  <path class="dash" d="M 499 300 C 500 326, 500 332, 499 356"/>
  <path class="dash" d="M 825 358 C 825 386, 825 392, 825 414"/>

  <text class="small" x="334" y="246">先验检查</text>
  <text class="small" x="342" y="434">采集状态</text>
  <text class="small" x="648" y="414">定位后执行</text>
  <text class="small" x="970" y="278">输入事件</text>
  <text class="small" x="968" y="476">保护边界</text>
</svg>
