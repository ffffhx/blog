<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Computer Use 的观察、定位、执行、验证、安全闭环</title>
  <desc id="desc">图示桌面 Agent 在 Computer Use 中从观察界面、定位目标、执行动作、验证结果到安全控制的循环。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#256f73"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#334155" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    .bg { fill: #f6f1e8; }
    .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #1f2937; }
    .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #64748b; }
    .node { fill: #ffffff; stroke-width: 2; filter: url(#shadow); }
    .n1 { stroke: #5f8fb4; }
    .n2 { stroke: #6aa886; }
    .n3 { stroke: #c28b4d; }
    .n4 { stroke: #8c82c8; }
    .n5 { stroke: #c56b72; }
    .label { font: 700 23px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #1f2937; text-anchor: middle; }
    .text { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #475569; text-anchor: middle; }
    .center { fill: #ffffff; stroke: #d7c5aa; stroke-width: 2; filter: url(#shadow); }
    .center-title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #1f2937; text-anchor: middle; }
    .center-text { font: 400 17px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #64748b; text-anchor: middle; }
    .arrow { stroke: #256f73; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #64748b; text-anchor: middle; }
  </style>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="72" y="72">Computer Use 的核心闭环</text>
  <text class="subtitle" x="72" y="104">桌面 Agent 的可靠性来自“看见、定位、执行、再看见”，安全控制贯穿整条链路。</text>

  <circle class="center" cx="600" cy="382" r="118"/>
  <text class="center-title" x="600" y="360">Agent</text>
  <text class="center-text" x="600" y="394">推理下一步</text>
  <text class="center-text" x="600" y="424">根据证据修正动作</text>

  <rect class="node n1" x="455" y="150" width="290" height="112" rx="18"/>
  <text class="label" x="600" y="190">观察 Observe</text>
  <text class="text" x="600" y="222">截图、窗口、AX 树、焦点</text>

  <rect class="node n2" x="810" y="304" width="290" height="112" rx="18"/>
  <text class="label" x="955" y="344">定位 Ground</text>
  <text class="text" x="955" y="376">元素索引、语义目标、坐标</text>

  <rect class="node n3" x="670" y="560" width="290" height="112" rx="18"/>
  <text class="label" x="815" y="600">执行 Act</text>
  <text class="text" x="815" y="632">AX action、CGEvent、键鼠</text>

  <rect class="node n4" x="240" y="560" width="290" height="112" rx="18"/>
  <text class="label" x="385" y="600">验证 Verify</text>
  <text class="text" x="385" y="632">重新截图、读取状态、比对变化</text>

  <rect class="node n5" x="100" y="304" width="290" height="112" rx="18"/>
  <text class="label" x="245" y="344">安全 Safety</text>
  <text class="text" x="245" y="376">权限、锁、急停、隐私排除</text>

  <path class="arrow" d="M 716 238 C 800 260, 840 282, 875 314"/>
  <path class="arrow" d="M 935 416 C 922 486, 890 532, 844 560"/>
  <path class="arrow" d="M 680 616 C 620 650, 556 650, 497 616"/>
  <path class="arrow" d="M 330 560 C 260 520, 234 478, 238 416"/>
  <path class="arrow" d="M 322 304 C 360 260, 412 236, 485 220"/>

  <text class="small" x="792" y="272">把视觉证据转成目标</text>
  <text class="small" x="908" y="504">把目标转成系统事件</text>
  <text class="small" x="590" y="690">动作后必须复查</text>
  <text class="small" x="230" y="500">发现异常立即收敛</text>
  <text class="small" x="395" y="260">权限与隐私先行</text>
</svg>
