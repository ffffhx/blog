<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#fffaf3"/>
  <text x="60" y="70" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700" fill="#1f2937">Codex Browser Use：公开源码边界</text>
  <text x="60" y="112" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#6b7280">观察 commit：a2db6f97，日期：2026-04-25。公开的是平台层，不是完整浏览器控制运行时。</text>

  <line x1="600" y1="150" x2="600" y2="690" stroke="#d1d5db" stroke-width="4" stroke-dasharray="12 10"/>
  <text x="390" y="152" font-family="Arial, 'PingFang SC', sans-serif" font-size="22" font-weight="700" fill="#047857">公开仓库可见</text>
  <text x="720" y="152" font-family="Arial, 'PingFang SC', sans-serif" font-size="22" font-weight="700" fill="#b45309">公开仓库不可见</text>

  <rect x="80" y="190" width="440" height="86" rx="8" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
  <text x="110" y="226" font-family="Arial, 'PingFang SC', sans-serif" font-size="21" font-weight="700" fill="#065f46">App Server / Codex Core</text>
  <text x="110" y="258" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#047857">线程、回合、事件流、工具调用和客户端协议</text>

  <rect x="80" y="310" width="440" height="86" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="110" y="346" font-family="Arial, 'PingFang SC', sans-serif" font-size="21" font-weight="700" fill="#1d4ed8">Feature Gate</text>
  <text x="110" y="378" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#2563eb">in_app_browser / browser_use / computer_use</text>

  <rect x="80" y="430" width="440" height="86" rx="8" fill="#f0fdfa" stroke="#2dd4bf" stroke-width="2"/>
  <text x="110" y="466" font-family="Arial, 'PingFang SC', sans-serif" font-size="21" font-weight="700" fill="#0f766e">Plugin / Skill / MCP 平台</text>
  <text x="110" y="498" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#0d9488">加载 plugin.json、skills、MCP servers、apps</text>

  <rect x="80" y="550" width="440" height="86" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="2"/>
  <text x="110" y="586" font-family="Arial, 'PingFang SC', sans-serif" font-size="21" font-weight="700" fill="#b91c1c">Sandbox 线索</text>
  <text x="110" y="618" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#dc2626">测试中出现 /tmp/codex-browser-use socket 放行</text>

  <rect x="680" y="220" width="430" height="96" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="710" y="258" font-family="Arial, 'PingFang SC', sans-serif" font-size="21" font-weight="700" fill="#92400e">browser-use 插件本体</text>
  <text x="710" y="290" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#b45309">公开仓库没有插件目录和完整源码</text>

  <rect x="680" y="360" width="430" height="96" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="710" y="398" font-family="Arial, 'PingFang SC', sans-serif" font-size="21" font-weight="700" fill="#9a3412">browser-client 运行时</text>
  <text x="710" y="430" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#c2410c">tab、locator、截图、DOM snapshot 的实现不可见</text>

  <rect x="680" y="500" width="430" height="96" rx="8" fill="#fdf2f8" stroke="#f472b6" stroke-width="2"/>
  <text x="710" y="538" font-family="Arial, 'PingFang SC', sans-serif" font-size="21" font-weight="700" fill="#be185d">内置浏览器后端</text>
  <text x="710" y="570" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#db2777">动作如何落到真实页面，不在公开源码里</text>

  <text x="515" y="710" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#6b7280">边界线：能直接引用源码证明的部分 / 只能谨慎推断的部分</text>
</svg>
