<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#fffaf3"/>
  <text x="60" y="70" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700" fill="#1f2937">Codex Plugin 平台如何承载能力</text>
  <text x="60" y="112" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#6b7280">公开源码显示：插件不是直接被调用，而是贡献 skills、MCP servers、apps，再进入模型上下文和工具集合。</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="70" y="210" width="220" height="95" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="108" y="248" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">config.toml</text>
  <text x="94" y="280" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#2563eb">[plugins.&quot;name@market&quot;]</text>

  <rect x="360" y="210" width="220" height="95" rx="8" fill="#f0fdfa" stroke="#2dd4bf" stroke-width="2"/>
  <text x="398" y="248" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#0f766e">Plugin Store</text>
  <text x="386" y="280" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#0d9488">缓存和版本定位</text>

  <rect x="650" y="210" width="220" height="95" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="684" y="248" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#854d0e">plugin.json</text>
  <text x="680" y="280" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#a16207">声明组件路径</text>

  <rect x="940" y="210" width="190" height="95" rx="8" fill="#fdf2f8" stroke="#f472b6" stroke-width="2"/>
  <text x="970" y="248" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#be185d">Session</text>
  <text x="964" y="280" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#db2777">注入会话能力</text>

  <line x1="290" y1="258" x2="358" y2="258" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="580" y1="258" x2="648" y2="258" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="870" y1="258" x2="938" y2="258" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="250" y="430" width="210" height="98" rx="8" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
  <text x="318" y="468" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#047857">Skills</text>
  <text x="282" y="500" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#059669">指导模型如何使用能力</text>

  <rect x="500" y="430" width="210" height="98" rx="8" fill="#eef2ff" stroke="#818cf8" stroke-width="2"/>
  <text x="548" y="468" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#4338ca">MCP Servers</text>
  <text x="528" y="500" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#4f46e5">把动作暴露为工具</text>

  <rect x="750" y="430" width="210" height="98" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="815" y="468" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#c2410c">Apps</text>
  <text x="782" y="500" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#ea580c">连接外部应用能力</text>

  <line x1="760" y1="305" x2="355" y2="428" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <line x1="760" y1="305" x2="605" y2="428" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <line x1="760" y1="305" x2="855" y2="428" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>

  <text x="216" y="640" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" fill="#334155">Browser Use 可以符合这个模型，但它自己的插件本体没有出现在公开 openai/codex 仓库中。</text>
</svg>
