<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#fffaf3"/>
  <text x="60" y="70" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700" fill="#1f2937">沙箱 socket 线索：Browser Use 可能如何跨边界</text>
  <text x="60" y="112" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#6b7280">公开测试只证明 socket allowlist 存在；socket 后端如何实现仍不属于公开源码。</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="80" y="190" width="460" height="390" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="112" y="230" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#334155">受限执行环境</text>
  <text x="112" y="262" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#64748b">Agent 工具调用、命令执行、沙箱策略</text>

  <rect x="140" y="330" width="330" height="94" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="202" y="370" font-family="Arial, 'PingFang SC', sans-serif" font-size="21" font-weight="700" fill="#1d4ed8">浏览器动作请求</text>
  <text x="178" y="402" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#2563eb">导航、点击、输入、截图、读取状态</text>

  <rect x="630" y="190" width="460" height="390" rx="12" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="662" y="230" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#9a3412">浏览器控制后端</text>
  <text x="662" y="262" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#c2410c">Codex App / 内置浏览器侧，具体实现未公开</text>

  <rect x="690" y="330" width="330" height="94" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="748" y="370" font-family="Arial, 'PingFang SC', sans-serif" font-size="21" font-weight="700" fill="#92400e">真实页面执行</text>
  <text x="726" y="402" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#b45309">tab、DOM、截图、输入事件、页面加载</text>

  <rect x="440" y="292" width="320" height="64" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="472" y="331" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#b91c1c">/tmp/codex-browser-use</text>

  <line x1="470" y1="377" x2="628" y2="377" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="628" y1="398" x2="470" y2="398" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="450" y="470" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#475569">公开源码能看到：沙箱测试允许特定 Unix socket</text>
  <text x="450" y="502" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#475569">公开源码看不到：socket 协议和浏览器动作执行器</text>

  <rect x="260" y="635" width="680" height="56" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="302" y="670" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" fill="#92400e">合理推断：Browser Use 通过受控 IPC 桥接浏览器，而不是让 Agent 直接绕过沙箱。</text>
</svg>
