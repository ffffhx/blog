<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg { fill: #f7f2ea; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #25313b; }
      .sub { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #63717e; }
      .box { fill: #ffffff; stroke: #d8cbbb; stroke-width: 2; rx: 18; }
      .boxA { fill: #e8f1ff; stroke: #7da4d9; }
      .boxB { fill: #eaf7ef; stroke: #75ad88; }
      .boxC { fill: #fff3dd; stroke: #d5a351; }
      .boxD { fill: #f2ecff; stroke: #9a82d5; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #28333d; }
      .text { font: 400 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #46525e; }
      .small { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #687582; }
      .arrow { stroke: #7b8792; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7b8792"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="72" y="78">读 bb-browser 前先对齐几个概念</text>
  <text class="sub" x="72" y="110">它把真实浏览器、调试协议、后台进程和 Agent 工具协议连接成一层浏览器能力接口</text>

  <rect class="box boxA" x="82" y="170" width="250" height="150"/>
  <text class="label" x="112" y="215">真实浏览器</text>
  <text class="text" x="112" y="252">Chrome / Edge / Brave</text>
  <text class="small" x="112" y="284">已有 Cookie、登录态、页面状态</text>

  <rect class="box boxB" x="474" y="170" width="250" height="150"/>
  <text class="label" x="504" y="215">CDP</text>
  <text class="text" x="504" y="252">Chrome DevTools Protocol</text>
  <text class="small" x="504" y="284">控制 tab、DOM、Network、Runtime</text>

  <rect class="box boxC" x="868" y="170" width="250" height="150"/>
  <text class="label" x="898" y="215">Daemon</text>
  <text class="text" x="898" y="252">本地后台进程</text>
  <text class="small" x="898" y="284">维护 CDP 连接和 tab 状态</text>

  <rect class="box boxD" x="278" y="440" width="250" height="150"/>
  <text class="label" x="308" y="485">MCP</text>
  <text class="text" x="308" y="522">Agent 工具协议</text>
  <text class="small" x="308" y="554">把浏览器动作注册成工具</text>

  <rect class="box" x="672" y="440" width="250" height="150"/>
  <text class="label" x="702" y="485">site adapter</text>
  <text class="text" x="702" y="522">网站命令脚本</text>
  <text class="small" x="702" y="554">在浏览器 tab 内执行 JS</text>

  <path class="arrow" d="M332 245 C382 245 421 245 474 245"/>
  <path class="arrow" d="M724 245 C774 245 816 245 868 245"/>
  <path class="arrow" d="M936 320 C890 382 850 414 806 440"/>
  <path class="arrow" d="M524 440 C560 405 608 382 668 368 C728 354 778 374 812 440"/>
  <path class="arrow" d="M403 440 C330 388 265 365 208 320"/>

  <text class="small" x="72" y="690">核心理解：bb-browser 不是只“点网页”，而是让 Agent 进入真实浏览器上下文。</text>
</svg>
