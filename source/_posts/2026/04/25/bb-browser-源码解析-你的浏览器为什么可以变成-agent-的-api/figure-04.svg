<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg { fill: #f7f2ea; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #25313b; }
      .sub { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #63717e; }
      .box { fill: #fff; stroke: #d9cbbb; stroke-width: 2; rx: 18; }
      .center { fill: #fff2dc; stroke: #d3a04d; }
      .blue { fill: #e7f0ff; stroke: #77a0d8; }
      .green { fill: #e9f7ee; stroke: #70aa86; }
      .purple { fill: #f2ecff; stroke: #9b82d6; }
      .label { font: 700 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #28333d; }
      .text { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #46525e; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #687582; }
      .arrow { stroke: #7b8792; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7b8792"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="72" y="78">协议模型：Request / Response 和 COMMANDS 注册表</text>
  <text class="sub" x="72" y="110">同一份结构化命令描述，支撑 CLI、MCP、provider 和 daemon 分发</text>

  <rect class="box center" x="430" y="170" width="340" height="180"/>
  <text class="label" x="466" y="220">packages/shared</text>
  <text class="text" x="466" y="258">protocol.ts：Request / Response</text>
  <text class="text" x="466" y="288">commands.ts：COMMANDS + schema</text>
  <text class="small" x="466" y="320">单一命令事实来源</text>

  <rect class="box blue" x="90" y="430" width="250" height="145"/>
  <text class="label" x="120" y="476">CLI</text>
  <text class="text" x="120" y="512">解析 argv</text>
  <text class="text" x="120" y="540">发送 daemon request</text>

  <rect class="box green" x="475" y="430" width="250" height="145"/>
  <text class="label" x="505" y="476">MCP</text>
  <text class="text" x="505" y="512">自动生成 tools</text>
  <text class="text" x="505" y="540">返回文本或图片结果</text>

  <rect class="box purple" x="860" y="430" width="250" height="145"/>
  <text class="label" x="890" y="476">Daemon</text>
  <text class="text" x="890" y="512">dispatchRequest</text>
  <text class="text" x="890" y="540">翻译为 CDP 命令</text>

  <path class="arrow" d="M520 350 C430 390 360 410 290 430"/>
  <path class="arrow" d="M600 350 L600 430"/>
  <path class="arrow" d="M680 350 C770 390 840 410 910 430"/>

  <text class="small" x="72" y="690">核心收益：命令形状不是散落在帮助文本里，而是能被 Agent 和程序共同消费的结构化数据。</text>
</svg>
