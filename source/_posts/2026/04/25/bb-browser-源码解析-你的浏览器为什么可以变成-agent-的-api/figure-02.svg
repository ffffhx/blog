<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg { fill: #f7f2ea; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #25313b; }
      .sub { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #63717e; }
      .card { fill: #fff; stroke: #d9cbbb; stroke-width: 2; rx: 18; }
      .primary { fill: #e7f0ff; stroke: #77a0d8; }
      .green { fill: #e9f7ee; stroke: #70aa86; }
      .orange { fill: #fff2dc; stroke: #d3a04d; }
      .purple { fill: #f2ecff; stroke: #9b82d6; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #28333d; }
      .text { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #46525e; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #687582; }
      .arrow { stroke: #7b8792; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7b8792"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="72" y="78">开源状态与生态边界</text>
  <text class="sub" x="72" y="110">工具本体、发布包、社区 adapter 仓库要分开看</text>

  <rect class="card primary" x="82" y="180" width="300" height="170"/>
  <text class="label" x="112" y="226">epiral/bb-browser</text>
  <text class="text" x="112" y="264">Public GitHub 仓库</text>
  <text class="text" x="112" y="294">MIT License</text>
  <text class="small" x="112" y="326">TypeScript 88.8% / JavaScript 11.2%</text>

  <rect class="card green" x="450" y="180" width="300" height="170"/>
  <text class="label" x="480" y="226">npm: bb-browser</text>
  <text class="text" x="480" y="264">latest: 0.11.3</text>
  <text class="text" x="480" y="294">license: MIT</text>
  <text class="small" x="480" y="326">暴露 CLI、MCP、provider 入口</text>

  <rect class="card orange" x="818" y="180" width="300" height="170"/>
  <text class="label" x="848" y="226">epiral/bb-sites</text>
  <text class="text" x="848" y="264">公开 adapter 仓库</text>
  <text class="text" x="848" y="294">按站点维护 JS 命令</text>
  <text class="small" x="848" y="326">复用授权需看该仓库当前声明</text>

  <rect class="card purple" x="268" y="470" width="300" height="150"/>
  <text class="label" x="298" y="516">核心工具</text>
  <text class="text" x="298" y="554">负责扫描、加载、执行 adapter</text>
  <text class="small" x="298" y="584">Daemon / CDP / MCP 都在这里</text>

  <rect class="card" x="632" y="470" width="300" height="150"/>
  <text class="label" x="662" y="516">站点能力</text>
  <text class="text" x="662" y="554">知乎、GitHub、arXiv 等命令</text>
  <text class="small" x="662" y="584">由 site update 拉取到本地</text>

  <path class="arrow" d="M382 265 L450 265"/>
  <path class="arrow" d="M750 265 L818 265"/>
  <path class="arrow" d="M600 350 C560 405 500 430 432 470"/>
  <path class="arrow" d="M968 350 C930 410 870 440 798 470"/>

  <text class="small" x="72" y="690">结论：bb-browser 工具本体是 MIT；adapter 生态是独立公开仓库，运行前仍要审查来源和权限。</text>
</svg>
