<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg { fill: #f7f2ea; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #25313b; }
      .sub { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #63717e; }
      .box { fill: #fff; stroke: #d9cbbb; stroke-width: 2; rx: 18; }
      .blue { fill: #e7f0ff; stroke: #77a0d8; }
      .green { fill: #e9f7ee; stroke: #70aa86; }
      .orange { fill: #fff2dc; stroke: #d3a04d; }
      .purple { fill: #f2ecff; stroke: #9b82d6; }
      .label { font: 700 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #28333d; }
      .text { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #46525e; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #687582; }
      .arrow { stroke: #7b8792; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7b8792"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="72" y="78">观察能力：每个 tab 都有小型 DevTools 状态</text>
  <text class="sub" x="72" y="110">network、console、errors 都按 tab 隔离，并用 seq 支持增量查询</text>

  <rect class="box blue" x="90" y="210" width="260" height="140"/>
  <text class="label" x="120" y="256">用户动作</text>
  <text class="text" x="120" y="292">click / fill / open</text>
  <text class="small" x="120" y="322">recordAction 记录 lastActionSeq</text>

  <rect class="box green" x="470" y="210" width="260" height="140"/>
  <text class="label" x="500" y="256">页面事件</text>
  <text class="text" x="500" y="292">Network / Console / Error</text>
  <text class="small" x="500" y="322">CDP session event 进入缓存</text>

  <rect class="box orange" x="850" y="210" width="260" height="140"/>
  <text class="label" x="880" y="256">RingBuffer</text>
  <text class="text" x="880" y="292">500 / 200 / 100</text>
  <text class="small" x="880" y="322">控制内存，丢弃最旧事件</text>

  <rect class="box purple" x="280" y="470" width="280" height="150"/>
  <text class="label" x="310" y="518">增量查询</text>
  <text class="text" x="310" y="554">--since last_action</text>
  <text class="small" x="310" y="584">只看上次动作之后的变化</text>

  <rect class="box" x="650" y="470" width="280" height="150"/>
  <text class="label" x="680" y="518">Agent 反馈</text>
  <text class="text" x="680" y="554">接口、报错、控制台信息</text>
  <text class="small" x="680" y="584">不只看页面截图</text>

  <path class="arrow" d="M350 280 L470 280"/>
  <path class="arrow" d="M730 280 L850 280"/>
  <path class="arrow" d="M980 350 C910 420 820 450 790 470"/>
  <path class="arrow" d="M600 350 C540 410 470 440 420 470"/>
  <path class="arrow" d="M560 545 L650 545"/>

  <text class="small" x="72" y="690">核心收益：Agent 做完动作后能读取“刚刚发生了什么”，而不是只能靠视觉猜测。</text>
</svg>
