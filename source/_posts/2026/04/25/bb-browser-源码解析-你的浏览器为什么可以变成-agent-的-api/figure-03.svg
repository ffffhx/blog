<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg { fill: #f7f2ea; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #25313b; }
      .sub { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #63717e; }
      .box { fill: #fff; stroke: #d9cbbb; stroke-width: 2; rx: 18; }
      .blue { fill: #e7f0ff; stroke: #77a0d8; }
      .green { fill: #e9f7ee; stroke: #70aa86; }
      .orange { fill: #fff2dc; stroke: #d3a04d; }
      .purple { fill: #f2ecff; stroke: #9b82d6; }
      .label { font: 700 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #28333d; }
      .text { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #46525e; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #687582; }
      .arrow { stroke: #7b8792; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7b8792"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="72" y="78">运行时架构：入口很多，核心只有一个 Daemon</text>
  <text class="sub" x="72" y="110">CLI、MCP 和 provider 都通过本地 HTTP 请求同一个后台进程，再由 daemon 走 CDP 控制真实浏览器</text>

  <rect class="box blue" x="80" y="185" width="230" height="120"/>
  <text class="label" x="110" y="230">CLI</text>
  <text class="text" x="110" y="264">bb-browser open</text>
  <text class="text" x="110" y="288">site / snapshot / fetch</text>

  <rect class="box blue" x="80" y="340" width="230" height="120"/>
  <text class="label" x="110" y="385">MCP Server</text>
  <text class="text" x="110" y="419">browser_* tools</text>
  <text class="text" x="110" y="443">site_* tools</text>

  <rect class="box blue" x="80" y="495" width="230" height="120"/>
  <text class="label" x="110" y="540">Provider</text>
  <text class="text" x="110" y="574">更高层工具注册</text>
  <text class="text" x="110" y="598">复用同一命令集</text>

  <rect class="box green" x="460" y="300" width="280" height="170"/>
  <text class="label" x="490" y="350">Daemon HTTP</text>
  <text class="text" x="490" y="386">GET /status</text>
  <text class="text" x="490" y="414">POST /command</text>
  <text class="text" x="490" y="442">Bearer token</text>

  <rect class="box orange" x="840" y="220" width="270" height="150"/>
  <text class="label" x="870" y="270">CDP WebSocket</text>
  <text class="text" x="870" y="306">Target / Page / DOM</text>
  <text class="text" x="870" y="334">Runtime / Network</text>

  <rect class="box purple" x="840" y="450" width="270" height="150"/>
  <text class="label" x="870" y="500">真实 Chrome</text>
  <text class="text" x="870" y="536">用户登录态</text>
  <text class="text" x="870" y="564">多个 tab 和页面 JS</text>

  <path class="arrow" d="M310 245 C370 255 410 310 460 350"/>
  <path class="arrow" d="M310 400 L460 400"/>
  <path class="arrow" d="M310 555 C370 535 410 470 460 430"/>
  <path class="arrow" d="M740 360 C780 330 804 306 840 294"/>
  <path class="arrow" d="M975 370 L975 450"/>

  <text class="small" x="72" y="690">核心收益：浏览器连接、tab 状态、网络事件缓存都集中在 daemon，入口层只负责表达意图。</text>
</svg>
