<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg { fill: #f7f2ea; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #25313b; }
      .sub { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #63717e; }
      .box { fill: #fff; stroke: #d9cbbb; stroke-width: 2; rx: 18; }
      .blue { fill: #e7f0ff; stroke: #77a0d8; }
      .green { fill: #e9f7ee; stroke: #70aa86; }
      .orange { fill: #fff2dc; stroke: #d3a04d; }
      .purple { fill: #f2ecff; stroke: #9b82d6; }
      .label { font: 700 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #28333d; }
      .text { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #46525e; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #687582; }
      .arrow { stroke: #7b8792; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7b8792"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="72" y="78">site adapter：把网站能力沉淀成命令</text>
  <text class="sub" x="72" y="110">adapter 在真实浏览器 tab 中运行，复用 domain、Cookie、页面 JS 和站点接口</text>

  <rect class="box blue" x="80" y="205" width="235" height="150"/>
  <text class="label" x="110" y="252">adapter 文件</text>
  <text class="text" x="110" y="288">platform/command.js</text>
  <text class="small" x="110" y="320">@meta + async function</text>

  <rect class="box green" x="375" y="205" width="235" height="150"/>
  <text class="label" x="405" y="252">扫描和参数</text>
  <text class="text" x="405" y="288">local 覆盖 community</text>
  <text class="small" x="405" y="320">检查 required args</text>

  <rect class="box orange" x="670" y="205" width="235" height="150"/>
  <text class="label" x="700" y="252">目标 tab</text>
  <text class="text" x="700" y="288">按 domain 匹配</text>
  <text class="small" x="700" y="320">没有就打开对应站点</text>

  <rect class="box purple" x="965" y="205" width="155" height="150"/>
  <text class="label" x="992" y="252">eval</text>
  <text class="text" x="992" y="288">执行函数</text>
  <text class="small" x="992" y="320">返回 JSON</text>

  <rect class="box" x="270" y="465" width="280" height="140"/>
  <text class="label" x="300" y="512">站点 API</text>
  <text class="text" x="300" y="548">fetch 相对路径</text>
  <text class="small" x="300" y="578">credentials include</text>

  <rect class="box" x="650" y="465" width="280" height="140"/>
  <text class="label" x="680" y="512">页面运行时</text>
  <text class="text" x="680" y="548">Webpack / Pinia / Store</text>
  <text class="small" x="680" y="578">复用站点自己的封装</text>

  <path class="arrow" d="M315 280 L375 280"/>
  <path class="arrow" d="M610 280 L670 280"/>
  <path class="arrow" d="M905 280 L965 280"/>
  <path class="arrow" d="M1035 355 C930 430 805 450 790 465"/>
  <path class="arrow" d="M1035 355 C845 420 540 435 415 465"/>

  <text class="small" x="72" y="690">核心收益：高频网页任务从“临场操作”变成“可搜索、可调用、可组合”的命令。</text>
</svg>
