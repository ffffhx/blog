<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f8f3ea"/>
  <text x="80" y="86" font-family="Arial, 'PingFang SC', sans-serif" font-size="36" font-weight="700" fill="#253238">Playwright 把页面不确定性收敛成测试闭环</text>
  <text x="80" y="126" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#5d6a70">现代 Web 页面会异步变化，测试框架需要持续观察、等待、动作和验证</text>

  <rect x="100" y="210" width="210" height="120" rx="16" fill="#ffffff" stroke="#d8c4a7" stroke-width="2"/>
  <text x="142" y="262" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#243943">页面状态</text>
  <text x="132" y="298" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#526066">DOM / 网络 / 动画</text>

  <rect x="390" y="210" width="210" height="120" rx="16" fill="#ffffff" stroke="#d8c4a7" stroke-width="2"/>
  <text x="435" y="262" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#243943">Locator</text>
  <text x="414" y="298" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#526066">延迟定位元素</text>

  <rect x="680" y="210" width="210" height="120" rx="16" fill="#ffffff" stroke="#d8c4a7" stroke-width="2"/>
  <text x="710" y="262" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#243943">自动等待</text>
  <text x="708" y="298" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#526066">可见 / 稳定 / 可点</text>

  <rect x="970" y="210" width="150" height="120" rx="16" fill="#ffffff" stroke="#d8c4a7" stroke-width="2"/>
  <text x="997" y="262" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#243943">动作</text>
  <text x="994" y="298" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#526066">点击 / 输入</text>

  <rect x="100" y="460" width="250" height="120" rx="16" fill="#e9f3ef" stroke="#9fc5b8" stroke-width="2"/>
  <text x="154" y="512" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#243943">断言验证</text>
  <text x="130" y="548" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#526066">自动重试直到成立</text>

  <rect x="470" y="460" width="250" height="120" rx="16" fill="#fff6df" stroke="#d9b763" stroke-width="2"/>
  <text x="536" y="512" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#243943">Trace</text>
  <text x="498" y="548" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#526066">保留失败证据链</text>

  <rect x="840" y="460" width="250" height="120" rx="16" fill="#edf0fb" stroke="#aeb9df" stroke-width="2"/>
  <text x="906" y="512" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#243943">Report</text>
  <text x="872" y="548" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#526066">给团队可读结果</text>

  <path d="M310 270 L375 270" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M375 270 L363 258 M375 270 L363 282" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M600 270 L665 270" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M665 270 L653 258 M665 270 L653 282" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M890 270 L955 270" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M955 270 L943 258 M955 270 L943 282" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M1045 330 C1045 406 995 421 965 451" fill="none" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M965 451 L978 447 M965 451 L969 438" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M840 520 L735 520" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M735 520 L747 508 M735 520 L747 532" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M470 520 L365 520" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M365 520 L377 508 M365 520 L377 532" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M225 460 C184 406 172 374 194 335" fill="none" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M194 335 L190 350 M194 335 L207 344" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>

  <text x="80" y="678" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#526066">闭环重点：不要用固定 sleep 赌页面稳定，而是让框架按用户动作语义等待可执行状态。</text>
</svg>
