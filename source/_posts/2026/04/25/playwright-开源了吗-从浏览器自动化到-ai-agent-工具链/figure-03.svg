<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f8f3ea"/>
  <text x="80" y="86" font-family="Arial, 'PingFang SC', sans-serif" font-size="36" font-weight="700" fill="#253238">Locator、Actionability 和自动重试断言</text>
  <text x="80" y="126" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#5d6a70">Playwright 在动作前检查元素是否真的能被用户操作，在断言时持续重试</text>

  <rect x="90" y="200" width="280" height="360" rx="18" fill="#ffffff" stroke="#d7c9b5" stroke-width="2"/>
  <text x="132" y="252" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#243943">Locator</text>
  <text x="120" y="312" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#526066">getByRole</text>
  <text x="120" y="352" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#526066">getByLabel</text>
  <text x="120" y="392" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#526066">getByText</text>
  <text x="120" y="432" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#526066">getByTestId</text>
  <text x="120" y="492" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#8a6a3f">描述目标，不急着取 DOM</text>

  <rect x="460" y="170" width="280" height="420" rx="18" fill="#ffffff" stroke="#d7c9b5" stroke-width="2"/>
  <text x="503" y="222" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#243943">动作前检查</text>
  <rect x="500" y="264" width="200" height="42" rx="21" fill="#e9f3ef"/>
  <text x="560" y="291" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" fill="#314b55">存在</text>
  <rect x="500" y="322" width="200" height="42" rx="21" fill="#e9f3ef"/>
  <text x="560" y="349" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" fill="#314b55">可见</text>
  <rect x="500" y="380" width="200" height="42" rx="21" fill="#e9f3ef"/>
  <text x="560" y="407" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" fill="#314b55">稳定</text>
  <rect x="500" y="438" width="200" height="42" rx="21" fill="#e9f3ef"/>
  <text x="560" y="465" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" fill="#314b55">可用</text>
  <rect x="500" y="496" width="200" height="42" rx="21" fill="#e9f3ef"/>
  <text x="526" y="523" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" fill="#314b55">能接收事件</text>

  <rect x="830" y="200" width="280" height="360" rx="18" fill="#ffffff" stroke="#d7c9b5" stroke-width="2"/>
  <text x="871" y="252" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#243943">自动重试断言</text>
  <text x="864" y="316" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#526066">toBeVisible</text>
  <text x="864" y="356" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#526066">toHaveText</text>
  <text x="864" y="396" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#526066">toHaveURL</text>
  <text x="864" y="436" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#526066">toHaveCount</text>
  <text x="864" y="496" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#8a6a3f">直到成立或超时</text>

  <path d="M370 380 L445 380" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M445 380 L433 368 M445 380 L433 392" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M740 380 L815 380" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M815 380 L803 368 M815 380 L803 392" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>

  <rect x="178" y="625" width="844" height="56" rx="16" fill="#edf0fb" stroke="#aeb9df"/>
  <text x="214" y="661" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">可靠性来自动作语义：测试写“我要点哪个元素”，框架决定“什么时候可以点”。</text>
</svg>
