  <rect x="78" y="626" width="1044" height="58" rx="16" fill="#e8f1ef" stroke="#b8d0cb"/>
  <text x="112" y="663" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">判断开源状态看三件事：公开源码位置、许可证文本、社区协作入口。Playwright 三项都满足。</text>
