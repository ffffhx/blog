<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f8f3ea"/>
  <text x="80" y="86" font-family="Arial, 'PingFang SC', sans-serif" font-size="36" font-weight="700" fill="#253238">Playwright 的开源状态和工具边界</text>
  <text x="80" y="126" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#5d6a70">公开仓库 + Apache-2.0 许可证 + 完整浏览器自动化工具链</text>

  <rect x="78" y="176" width="300" height="390" rx="18" fill="#ffffff" stroke="#d7c9b5" stroke-width="2"/>
  <text x="112" y="230" font-family="Arial, 'PingFang SC', sans-serif" font-size="26" font-weight="700" fill="#1f3d4a">开源事实</text>
  <text x="112" y="284" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">GitHub: microsoft/playwright</text>
  <text x="112" y="324" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">License: Apache-2.0</text>
  <text x="112" y="364" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">源码、issue、PR 公开</text>
  <text x="112" y="404" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">可使用、修改、分发</text>
  <rect x="112" y="450" width="228" height="56" rx="28" fill="#2e7d6f"/>
  <text x="150" y="486" font-family="Arial, 'PingFang SC', sans-serif" font-size="22" font-weight="700" fill="#ffffff">结论：已开源</text>

  <rect x="450" y="176" width="300" height="390" rx="18" fill="#ffffff" stroke="#d7c9b5" stroke-width="2"/>
  <text x="484" y="230" font-family="Arial, 'PingFang SC', sans-serif" font-size="26" font-weight="700" fill="#1f3d4a">核心能力</text>
  <text x="484" y="284" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">Chromium</text>
  <text x="484" y="324" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">Firefox</text>
  <text x="484" y="364" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">WebKit</text>
  <text x="484" y="404" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">统一 API</text>
  <text x="484" y="444" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">隔离上下文</text>
  <text x="484" y="484" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">自动等待与断言</text>

  <rect x="822" y="176" width="300" height="390" rx="18" fill="#ffffff" stroke="#d7c9b5" stroke-width="2"/>
  <text x="856" y="230" font-family="Arial, 'PingFang SC', sans-serif" font-size="26" font-weight="700" fill="#1f3d4a">工具链</text>
  <text x="856" y="284" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">Playwright Test</text>
  <text x="856" y="324" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">Trace Viewer</text>
  <text x="856" y="364" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">HTML Report</text>
  <text x="856" y="404" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">Codegen</text>
  <text x="856" y="444" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">VS Code Extension</text>
  <text x="856" y="484" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">CLI / MCP for Agent</text>

  <path d="M392 371 L430 371" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M430 371 L418 359 M430 371 L418 383" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
