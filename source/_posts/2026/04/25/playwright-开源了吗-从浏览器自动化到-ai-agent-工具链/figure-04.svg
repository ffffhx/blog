<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f8f3ea"/>
  <text x="80" y="86" font-family="Arial, 'PingFang SC', sans-serif" font-size="36" font-weight="700" fill="#253238">Trace Viewer 把一次失败拆成可回放证据</text>
  <text x="80" y="126" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#5d6a70">一次 CI 红灯不应该只留下错误行，还要留下页面、网络、日志和源码上下文</text>

  <rect x="88" y="190" width="250" height="130" rx="18" fill="#ffffff" stroke="#d7c9b5" stroke-width="2"/>
  <text x="128" y="246" font-family="Arial, 'PingFang SC', sans-serif" font-size="25" font-weight="700" fill="#243943">测试失败</text>
  <text x="124" y="284" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#526066">Timeout / Assertion</text>

  <rect x="476" y="190" width="250" height="130" rx="18" fill="#fff6df" stroke="#d9b763" stroke-width="2"/>
  <text x="525" y="246" font-family="Arial, 'PingFang SC', sans-serif" font-size="25" font-weight="700" fill="#243943">记录 Trace</text>
  <text x="514" y="284" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#526066">动作时间线和页面状态</text>

  <rect x="864" y="190" width="250" height="130" rx="18" fill="#e9f3ef" stroke="#9fc5b8" stroke-width="2"/>
  <text x="907" y="246" font-family="Arial, 'PingFang SC', sans-serif" font-size="25" font-weight="700" fill="#243943">HTML Report</text>
  <text x="902" y="284" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#526066">团队可读入口</text>

  <path d="M338 255 L461 255" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M461 255 L449 243 M461 255 L449 267" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M726 255 L849 255" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M849 255 L837 243 M849 255 L837 267" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>

  <rect x="130" y="430" width="190" height="94" rx="16" fill="#ffffff" stroke="#d7c9b5" stroke-width="2"/>
  <text x="175" y="468" font-family="Arial, 'PingFang SC', sans-serif" font-size="22" font-weight="700" fill="#243943">截图</text>
  <text x="158" y="500" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#526066">看见当时画面</text>

  <rect x="370" y="430" width="190" height="94" rx="16" fill="#ffffff" stroke="#d7c9b5" stroke-width="2"/>
  <text x="410" y="468" font-family="Arial, 'PingFang SC', sans-serif" font-size="22" font-weight="700" fill="#243943">DOM</text>
  <text x="398" y="500" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#526066">检查页面结构</text>

  <rect x="610" y="430" width="190" height="94" rx="16" fill="#ffffff" stroke="#d7c9b5" stroke-width="2"/>
  <text x="650" y="468" font-family="Arial, 'PingFang SC', sans-serif" font-size="22" font-weight="700" fill="#243943">Network</text>
  <text x="635" y="500" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#526066">定位接口问题</text>

  <rect x="850" y="430" width="190" height="94" rx="16" fill="#ffffff" stroke="#d7c9b5" stroke-width="2"/>
  <text x="890" y="468" font-family="Arial, 'PingFang SC', sans-serif" font-size="22" font-weight="700" fill="#243943">Console</text>
  <text x="882" y="500" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#526066">查看前端错误</text>

  <path d="M601 320 L601 405" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M601 405 L589 393 M601 405 L613 393" stroke="#b56a40" stroke-width="5" stroke-linecap="round"/>
  <path d="M601 405 C515 410 456 420 320 430" fill="none" stroke="#b56a40" stroke-width="4" stroke-linecap="round"/>
  <path d="M601 405 C640 418 666 424 704 430" fill="none" stroke="#b56a40" stroke-width="4" stroke-linecap="round"/>
  <path d="M601 405 C734 410 829 420 945 430" fill="none" stroke="#b56a40" stroke-width="4" stroke-linecap="round"/>

  <rect x="158" y="620" width="884" height="58" rx="16" fill="#edf0fb" stroke="#aeb9df"/>
  <text x="196" y="657" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#314b55">Trace 的价值不是“更好看”，而是让偶发失败有证据可查、可复现、可讨论。</text>
</svg>
