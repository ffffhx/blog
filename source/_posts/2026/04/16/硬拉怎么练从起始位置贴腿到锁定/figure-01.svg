<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="20"/>

  <text class="title" x="72" y="92">硬拉 setup：先把自己放对位置</text>
  <text class="subtitle" x="72" y="126">杠的位置、平衡点和起拉前张力，决定了第一下离地是不是干净</text>

  <rect x="92" y="196" width="220" height="330" rx="24" fill="#fff4de" stroke="#f2bc55" stroke-width="3"/>
  <text class="h" x="202" y="244" text-anchor="middle">1. 杠的位置</text>
  <text class="t" x="202" y="306" text-anchor="middle">杠在鞋带上方</text>
  <text class="t" x="202" y="338" text-anchor="middle">离小腿一两厘米</text>
  <text class="t" x="202" y="402" text-anchor="middle">先把脚站好</text>
  <text class="t" x="202" y="434" text-anchor="middle">别让杠离身体太远</text>

  <rect x="346" y="196" width="220" height="330" rx="24" fill="#eef7ff" stroke="#8bbcff" stroke-width="3"/>
  <text class="h" x="456" y="244" text-anchor="middle">2. 折髋找杠</text>
  <text class="t" x="456" y="306" text-anchor="middle">硬拉先是 hip hinge</text>
  <text class="t" x="456" y="338" text-anchor="middle">不是先蹲下去</text>
  <text class="t" x="456" y="402" text-anchor="middle">抓杠后再调整</text>
  <text class="t" x="456" y="434" text-anchor="middle">不要让屁股先弹起来</text>

  <rect x="600" y="196" width="220" height="330" rx="24" fill="#edf9f0" stroke="#80c99a" stroke-width="3"/>
  <text class="h" x="710" y="244" text-anchor="middle">3. 建立张力</text>
  <text class="t" x="710" y="306" text-anchor="middle">呼吸、brace</text>
  <text class="t" x="710" y="338" text-anchor="middle">把背和背阔拉紧</text>
  <text class="t" x="710" y="402" text-anchor="middle">先拉紧身体</text>
  <text class="t" x="710" y="434" text-anchor="middle">不要直接 jerk</text>

  <rect x="854" y="196" width="254" height="330" rx="24" fill="#fff0f0" stroke="#ef9a9a" stroke-width="3"/>
  <text class="h" x="981" y="244" text-anchor="middle">4. 贴腿上升并锁定</text>
  <text class="t" x="981" y="306" text-anchor="middle">杠尽量沿身体上升</text>
  <text class="t" x="981" y="338" text-anchor="middle">别让它在空中绕路</text>
  <text class="t" x="981" y="402" text-anchor="middle">锁定靠髋伸展</text>
  <text class="t" x="981" y="434" text-anchor="middle">不要夸张后仰</text>

  <path d="M312 362H346" stroke="#c4b5a5" stroke-width="8" stroke-linecap="round"/>
  <path d="M566 362H600" stroke="#c4b5a5" stroke-width="8" stroke-linecap="round"/>
  <path d="M820 362H854" stroke="#c4b5a5" stroke-width="8" stroke-linecap="round"/>

  <rect x="300" y="576" width="600" height="62" rx="20" fill="#fffdfa" stroke="#ddd6c8" stroke-width="2"/>
  <text class="t" x="600" y="615" text-anchor="middle">判断标准很简单：如果第一下离地越来越干净，说明你的 setup 和张力越来越像样</text>
</svg>
