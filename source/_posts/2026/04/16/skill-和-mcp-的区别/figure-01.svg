<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 26px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>

  <text class="title" x="72" y="92">Skill 和 MCP 的第一性区别</text>
  <text class="subtitle" x="72" y="126">一个更接近 workflow，一个更接近 protocol</text>

  <rect x="112" y="196" width="408" height="360" rx="28" fill="#fff1d6" stroke="#f2b84b" stroke-width="3"/>
  <text class="h" x="316" y="254" text-anchor="middle">Skill</text>
  <text class="t" x="316" y="304" text-anchor="middle">告诉 agent</text>
  <text class="t" x="316" y="338" text-anchor="middle">这件事应该怎么做</text>
  <text class="t" x="316" y="398" text-anchor="middle">name / description</text>
  <text class="t" x="316" y="430" text-anchor="middle">SKILL.md / scripts / references</text>
  <text class="t" x="316" y="490" text-anchor="middle">偏方法、偏流程、偏规范</text>

  <rect x="680" y="196" width="408" height="360" rx="28" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="3"/>
  <text class="h" x="884" y="254" text-anchor="middle">MCP</text>
  <text class="t" x="884" y="304" text-anchor="middle">告诉 agent</text>
  <text class="t" x="884" y="338" text-anchor="middle">可以连接什么系统</text>
  <text class="t" x="884" y="398" text-anchor="middle">client / server / tools / resources</text>
  <text class="t" x="884" y="430" text-anchor="middle">统一协议与能力暴露</text>
  <text class="t" x="884" y="490" text-anchor="middle">偏连接、偏接口、偏互操作</text>

  <rect x="480" y="294" width="240" height="164" rx="24" fill="#fffdfa" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="354" text-anchor="middle">Agent</text>
  <text class="t" x="600" y="392" text-anchor="middle">把工作流和能力面</text>
  <text class="t" x="600" y="424" text-anchor="middle">组合起来完成任务</text>
</svg>
