<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .text { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow5" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="22"/>
  <text class="title" x="72" y="92">工具不是裸函数，而是受治理的执行单元</text>
  <text class="subtitle" x="72" y="126">先过滤、再暴露、再验证、再判权，最后才执行</text>
  <rect x="80" y="300" width="180" height="100" rx="18" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="box" x="170" y="345" text-anchor="middle">Deny Rules</text>
  <text class="text" x="170" y="375" text-anchor="middle">先过滤工具</text>
  <rect x="320" y="280" width="190" height="140" rx="18" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="box" x="415" y="325" text-anchor="middle">Tool Pool</text>
  <text class="text" x="415" y="355" text-anchor="middle">built-ins</text>
  <text class="text" x="415" y="383" text-anchor="middle">+ MCP tools</text>
  <rect x="570" y="300" width="180" height="100" rx="18" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="box" x="660" y="345" text-anchor="middle">Model</text>
  <text class="text" x="660" y="375" text-anchor="middle">看到当前工具集</text>
  <rect x="810" y="250" width="260" height="200" rx="18" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="box" x="940" y="305" text-anchor="middle">Tool Runtime</text>
  <text class="text" x="940" y="338" text-anchor="middle">validateInput</text>
  <text class="text" x="940" y="366" text-anchor="middle">checkPermissions</text>
  <text class="text" x="940" y="394" text-anchor="middle">execute / summarize</text>
  <line x1="260" y1="350" x2="300" y2="350" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow5)"/>
  <line x1="510" y1="350" x2="550" y2="350" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow5)"/>
  <line x1="750" y1="350" x2="790" y2="350" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow5)"/>
  <rect x="180" y="520" width="840" height="80" rx="18" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="text" x="600" y="568" text-anchor="middle">重点：工具先经过治理再进入模型视野，Claude Code 更像是在收窄模型可见世界，而不是先暴露一切再拦截</text>
</svg>
