<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .text { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="22"/>
  <text class="title" x="72" y="92">最后收束成一句话</text>
  <text class="subtitle" x="72" y="126">成熟的 coding agent，最终拼的不是 prompt 花活，而是运行时骨架</text>
  <rect x="110" y="220" width="300" height="220" rx="22" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="box" x="260" y="285" text-anchor="middle">Claude Code</text>
  <text class="text" x="260" y="330" text-anchor="middle">把一条 query loop 做强</text>
  <text class="text" x="260" y="365" text-anchor="middle">让任务持续推进</text>
  <text class="text" x="260" y="400" text-anchor="middle">让工具与上下文围着循环转</text>
  <rect x="445" y="220" width="310" height="220" rx="22" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="box" x="600" y="285" text-anchor="middle">共同点</text>
  <text class="text" x="600" y="330" text-anchor="middle">都在把模型关进受控执行系统</text>
  <text class="text" x="600" y="365" text-anchor="middle">都要处理权限、上下文、状态、恢复</text>
  <text class="text" x="600" y="400" text-anchor="middle">都不是纯聊天产品</text>
  <rect x="790" y="220" width="300" height="220" rx="22" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="box" x="940" y="285" text-anchor="middle">Codex</text>
  <text class="text" x="940" y="330" text-anchor="middle">把控制面做清楚</text>
  <text class="text" x="940" y="365" text-anchor="middle">让 thread / turn / item 显式化</text>
  <text class="text" x="940" y="400" text-anchor="middle">让平台能力更可组合</text>
  <rect x="170" y="520" width="860" height="90" rx="18" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="text" x="600" y="575" text-anchor="middle">结论：成熟 agent 的关键不是“模型会不会调工具”，而是 runtime 和 harness 怎么把这些动作组织成可控、可恢复、可持续运行的系统</text>
</svg>
