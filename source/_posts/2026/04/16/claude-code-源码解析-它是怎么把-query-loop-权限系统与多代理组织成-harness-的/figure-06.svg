<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .text { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow6" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="22"/>
  <text class="title" x="72" y="92">权限判定链</text>
  <text class="subtitle" x="72" y="126">Claude Code 不是一个权限开关，而是一条分层过滤链</text>
  <rect x="90" y="300" width="160" height="90" rx="18" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="box" x="170" y="352" text-anchor="middle">Request</text>
  <rect x="300" y="300" width="170" height="90" rx="18" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="box" x="385" y="352" text-anchor="middle">Rule Match</text>
  <rect x="520" y="300" width="170" height="90" rx="18" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="box" x="605" y="352" text-anchor="middle">Tool Check</text>
  <rect x="740" y="300" width="170" height="90" rx="18" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="box" x="825" y="352" text-anchor="middle">Hook / Auto</text>
  <rect x="960" y="240" width="140" height="80" rx="18" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text class="box" x="1030" y="287" text-anchor="middle">Allow</text>
  <rect x="960" y="340" width="140" height="80" rx="18" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
  <text class="box" x="1030" y="387" text-anchor="middle">Ask</text>
  <rect x="960" y="440" width="140" height="80" rx="18" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
  <text class="box" x="1030" y="487" text-anchor="middle">Deny</text>
  <line x1="250" y1="345" x2="280" y2="345" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow6)"/>
  <line x1="470" y1="345" x2="500" y2="345" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow6)"/>
  <line x1="690" y1="345" x2="720" y2="345" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow6)"/>
  <line x1="910" y1="345" x2="940" y2="280" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow6)"/>
  <line x1="910" y1="345" x2="940" y2="380" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow6)"/>
  <line x1="910" y1="345" x2="940" y2="480" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow6)"/>
  <rect x="160" y="550" width="880" height="70" rx="18" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="text" x="600" y="593" text-anchor="middle">关键分支：dontAsk 会把 ask 强转 deny；auto 会把 ask 先交给 classifier 或 hook，而不是立刻弹窗</text>
</svg>
