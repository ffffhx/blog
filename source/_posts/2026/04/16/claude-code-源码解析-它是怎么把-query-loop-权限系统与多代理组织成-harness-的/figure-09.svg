<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .head { font: 700 28px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .text { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="22"/>
  <text class="title" x="72" y="92">Claude Code vs Codex：系统重心差异</text>
  <text class="subtitle" x="72" y="126">一个围绕 query loop，另一个围绕 thread / turn / item 控制面</text>
  <rect x="100" y="180" width="440" height="420" rx="22" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="head" x="320" y="235" text-anchor="middle">Claude Code</text>
  <text class="text" x="320" y="282" text-anchor="middle">主组织单元：query loop / messages / toolUseContext</text>
  <text class="text" x="320" y="320" text-anchor="middle">本地规则：CLAUDE.md 分层 memory</text>
  <text class="text" x="320" y="358" text-anchor="middle">权限：mode + rule + hook + classifier</text>
  <text class="text" x="320" y="396" text-anchor="middle">多代理：fork / subagent + cache reuse</text>
  <text class="text" x="320" y="434" text-anchor="middle">系统气质：runtime-first</text>
  <rect x="660" y="180" width="440" height="420" rx="22" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="head" x="880" y="235" text-anchor="middle">Codex</text>
  <text class="text" x="880" y="282" text-anchor="middle">主组织单元：thread / turn / item</text>
  <text class="text" x="880" y="320" text-anchor="middle">本地规则：AGENTS.md 分层 project docs</text>
  <text class="text" x="880" y="358" text-anchor="middle">权限：sandbox + exec policy + approvals</text>
  <text class="text" x="880" y="396" text-anchor="middle">多代理：spawned agents + lifecycle protocol</text>
  <text class="text" x="880" y="434" text-anchor="middle">系统气质：control-plane-first</text>
  <rect x="270" y="540" width="660" height="60" rx="18" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="text" x="600" y="578" text-anchor="middle">一句话：Claude Code 更关心如何把一轮任务一路干完，Codex 更关心如何把 agent 做成明确的控制面平台</text>
</svg>
