<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .layer { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .text { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="22"/>
  <text class="title" x="72" y="92">Claude Code 的整体分层</text>
  <text class="subtitle" x="72" y="126">从 CLI 到 Query Loop，再到底层工具、权限、上下文与子代理</text>
  <rect x="120" y="170" width="960" height="70" rx="18" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="layer" x="600" y="214" text-anchor="middle">CLI / main.tsx</text>
  <rect x="150" y="265" width="900" height="80" rx="18" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="layer" x="600" y="314" text-anchor="middle">QueryEngine.ts</text>
  <rect x="180" y="370" width="840" height="95" rx="18" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="layer" x="600" y="420" text-anchor="middle">query.ts / Query Loop</text>
  <text class="text" x="600" y="448" text-anchor="middle">模型调用、tool_use、compact、续跑都在这里汇合</text>
  <rect x="95" y="505" width="230" height="100" rx="18" fill="#e0f2fe" stroke="#4ea9dc" stroke-width="2"/>
  <text class="layer" x="210" y="548" text-anchor="middle">Tool.ts / tools.ts</text>
  <text class="text" x="210" y="577" text-anchor="middle">工具抽象与工具池装配</text>
  <rect x="355" y="505" width="230" height="100" rx="18" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="layer" x="470" y="548" text-anchor="middle">permissions/*</text>
  <text class="text" x="470" y="577" text-anchor="middle">模式、规则、hook、classifier</text>
  <rect x="615" y="505" width="230" height="100" rx="18" fill="#ebe5ff" stroke="#b6a4ff" stroke-width="2"/>
  <text class="layer" x="730" y="548" text-anchor="middle">context.ts</text>
  <text class="text" x="730" y="577" text-anchor="middle">CLAUDE.md、git、日期、memory</text>
  <rect x="875" y="505" width="230" height="100" rx="18" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
  <text class="layer" x="990" y="548" text-anchor="middle">AgentTool/*</text>
  <text class="text" x="990" y="577" text-anchor="middle">subagent、fork、权限收缩</text>
</svg>
