<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .boxTitle { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .boxText { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="22"/>
  <text class="title" x="72" y="92">术语预备：先把几个词放对位置</text>
  <text class="subtitle" x="72" y="126">模型、runtime、tool、harness 和真实世界不是一层东西</text>
  <rect x="90" y="190" width="220" height="110" rx="20" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="boxTitle" x="200" y="235" text-anchor="middle">Model</text>
  <text class="boxText" x="200" y="268" text-anchor="middle">理解、规划、生成</text>
  <rect x="360" y="170" width="480" height="150" rx="22" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="boxTitle" x="600" y="220" text-anchor="middle">Agent Runtime</text>
  <text class="boxText" x="600" y="255" text-anchor="middle">接输入、拼上下文、调模型、接工具结果</text>
  <text class="small" x="600" y="285" text-anchor="middle">Query loop 在这里持续推进任务</text>
  <rect x="890" y="190" width="220" height="110" rx="20" fill="#ebe5ff" stroke="#b6a4ff" stroke-width="2"/>
  <text class="boxTitle" x="1000" y="235" text-anchor="middle">Harness</text>
  <text class="boxText" x="1000" y="268" text-anchor="middle">限定边界与执行规则</text>
  <line x1="310" y1="245" x2="338" y2="245" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow1)"/>
  <line x1="840" y1="245" x2="868" y2="245" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow1)"/>
  <rect x="110" y="410" width="220" height="100" rx="18" fill="#e0f2fe" stroke="#4ea9dc" stroke-width="2"/>
  <text class="boxTitle" x="220" y="450" text-anchor="middle">Tool Pool</text>
  <text class="boxText" x="220" y="480" text-anchor="middle">当前轮真正可见的工具</text>
  <rect x="385" y="410" width="220" height="100" rx="18" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="boxTitle" x="495" y="450" text-anchor="middle">Compact</text>
  <text class="boxText" x="495" y="480" text-anchor="middle">控制上下文预算</text>
  <rect x="660" y="410" width="220" height="100" rx="18" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="boxTitle" x="770" y="450" text-anchor="middle">Subagent</text>
  <text class="boxText" x="770" y="480" text-anchor="middle">继承上下文但重算权限</text>
  <rect x="935" y="410" width="180" height="100" rx="18" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="boxTitle" x="1025" y="450" text-anchor="middle">World</text>
  <text class="boxText" x="1025" y="480" text-anchor="middle">文件、命令、网络</text>
  <rect x="140" y="565" width="920" height="70" rx="18" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="boxText" x="600" y="608" text-anchor="middle">一句话：模型负责决策，runtime 负责推进，harness 负责限制模型如何触碰真实世界</text>
</svg>
