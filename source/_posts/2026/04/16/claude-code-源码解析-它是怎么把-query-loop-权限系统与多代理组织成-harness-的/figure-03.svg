<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .text { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="22"/>
  <text class="title" x="72" y="92">从 CLI 到 Query Loop 的请求链路</text>
  <text class="subtitle" x="72" y="126">真正关键的不是界面，而是 QueryEngine 如何给主循环备料</text>
  <rect x="90" y="280" width="180" height="100" rx="18" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="box" x="180" y="325" text-anchor="middle">User / CLI</text>
  <text class="text" x="180" y="355" text-anchor="middle">输入任务</text>
  <rect x="340" y="250" width="220" height="160" rx="18" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="box" x="450" y="300" text-anchor="middle">main.tsx</text>
  <text class="text" x="450" y="332" text-anchor="middle">解析参数</text>
  <text class="text" x="450" y="360" text-anchor="middle">初始化 app state</text>
  <rect x="630" y="240" width="250" height="180" rx="18" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="box" x="755" y="290" text-anchor="middle">QueryEngine.ts</text>
  <text class="text" x="755" y="322" text-anchor="middle">拼 prompt / context</text>
  <text class="text" x="755" y="350" text-anchor="middle">包装 canUseTool</text>
  <text class="text" x="755" y="378" text-anchor="middle">准备 toolUseContext</text>
  <rect x="950" y="260" width="170" height="140" rx="18" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="box" x="1035" y="310" text-anchor="middle">query.ts</text>
  <text class="text" x="1035" y="340" text-anchor="middle">进入主循环</text>
  <line x1="270" y1="330" x2="320" y2="330" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow3)"/>
  <line x1="560" y1="330" x2="610" y2="330" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow3)"/>
  <line x1="880" y1="330" x2="930" y2="330" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow3)"/>
  <rect x="180" y="500" width="840" height="90" rx="18" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="text" x="600" y="542" text-anchor="middle">关键词：Claude Code 不是直接把用户输入丢给模型，而是先组装 prompt、context、tools、permissions，再进入 query loop</text>
</svg>
