<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .text { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow7" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="22"/>
  <text class="title" x="72" y="92">上下文治理：规则、环境事实与预算控制</text>
  <text class="subtitle" x="72" y="126">CLAUDE.md、git 快照和 compact 会在 query loop 前汇成一个受预算控制的窗口</text>
  <rect x="90" y="220" width="180" height="90" rx="18" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="box" x="180" y="273" text-anchor="middle">Managed</text>
  <rect x="90" y="330" width="180" height="90" rx="18" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="box" x="180" y="383" text-anchor="middle">User</text>
  <rect x="90" y="440" width="180" height="90" rx="18" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="box" x="180" y="493" text-anchor="middle">Project</text>
  <rect x="90" y="550" width="180" height="90" rx="18" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="box" x="180" y="603" text-anchor="middle">Local</text>
  <rect x="360" y="260" width="250" height="160" rx="18" fill="#ebe5ff" stroke="#b6a4ff" stroke-width="2"/>
  <text class="box" x="485" y="312" text-anchor="middle">userContext</text>
  <text class="text" x="485" y="344" text-anchor="middle">CLAUDE.md</text>
  <text class="text" x="485" y="372" text-anchor="middle">currentDate</text>
  <rect x="660" y="260" width="250" height="160" rx="18" fill="#e0f2fe" stroke="#4ea9dc" stroke-width="2"/>
  <text class="box" x="785" y="312" text-anchor="middle">systemContext</text>
  <text class="text" x="785" y="344" text-anchor="middle">gitStatus</text>
  <text class="text" x="785" y="372" text-anchor="middle">cacheBreaker</text>
  <rect x="960" y="260" width="160" height="160" rx="18" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
  <text class="box" x="1040" y="310" text-anchor="middle">Compact</text>
  <text class="text" x="1040" y="342" text-anchor="middle">snip</text>
  <text class="text" x="1040" y="370" text-anchor="middle">micro</text>
  <text class="text" x="1040" y="398" text-anchor="middle">auto</text>
  <line x1="270" y1="345" x2="340" y2="340" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow7)"/>
  <line x1="610" y1="340" x2="640" y2="340" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow7)"/>
  <line x1="910" y1="340" x2="940" y2="340" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow7)"/>
  <rect x="330" y="500" width="700" height="80" rx="18" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="text" x="680" y="548" text-anchor="middle">重点：Claude Code 的上下文不是单纯聊天历史，而是规则、环境事实和受预算控制的消息窗口</text>
</svg>
