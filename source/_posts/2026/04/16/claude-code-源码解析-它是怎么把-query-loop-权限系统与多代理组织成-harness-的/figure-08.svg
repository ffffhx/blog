<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .text { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow8" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="22"/>
  <text class="title" x="72" y="92">Subagent / Fork：继承上下文，收缩权限，复用缓存</text>
  <text class="subtitle" x="72" y="126">Claude Code 的多代理重点不是多开，而是上下文和 prompt cache 的可控复用</text>
  <rect x="100" y="270" width="220" height="140" rx="18" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="box" x="210" y="320" text-anchor="middle">Parent Agent</text>
  <text class="text" x="210" y="350" text-anchor="middle">完整上下文</text>
  <text class="text" x="210" y="378" text-anchor="middle">完整 tool_use 历史</text>
  <rect x="410" y="240" width="290" height="200" rx="18" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="box" x="555" y="295" text-anchor="middle">Fork Builder</text>
  <text class="text" x="555" y="328" text-anchor="middle">placeholder tool_result</text>
  <text class="text" x="555" y="356" text-anchor="middle">directive 作为差异尾部</text>
  <text class="text" x="555" y="384" text-anchor="middle">保持前缀稳定以命中 cache</text>
  <rect x="790" y="250" width="170" height="180" rx="18" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="box" x="875" y="300" text-anchor="middle">Child A</text>
  <text class="text" x="875" y="332" text-anchor="middle">scope A</text>
  <text class="text" x="875" y="360" text-anchor="middle">allowedTools A</text>
  <rect x="990" y="250" width="170" height="180" rx="18" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="box" x="1075" y="300" text-anchor="middle">Child B</text>
  <text class="text" x="1075" y="332" text-anchor="middle">scope B</text>
  <text class="text" x="1075" y="360" text-anchor="middle">allowedTools B</text>
  <line x1="320" y1="340" x2="390" y2="340" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow8)"/>
  <line x1="700" y1="320" x2="770" y2="320" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow8)"/>
  <line x1="700" y1="360" x2="970" y2="360" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow8)"/>
  <rect x="170" y="520" width="860" height="80" rx="18" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="text" x="600" y="568" text-anchor="middle">重点：子代理可以继承上下文，但不默认继承全部权限；fork 还会刻意保持请求前缀稳定来优化 prompt cache</text>
</svg>
