<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .text { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="22"/>
  <text class="title" x="72" y="92">Query Loop 的单轮心跳</text>
  <text class="subtitle" x="72" y="126">工具调用、compact 和模型续跑被统一放在一个循环里</text>
  <rect x="140" y="170" width="200" height="90" rx="18" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="box" x="240" y="223" text-anchor="middle">Prefetch</text>
  <rect x="430" y="170" width="320" height="90" rx="18" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="box" x="590" y="223" text-anchor="middle">Budget + Compact</text>
  <rect x="840" y="170" width="220" height="90" rx="18" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="box" x="950" y="223" text-anchor="middle">callModel</text>
  <rect x="820" y="350" width="260" height="100" rx="18" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="box" x="950" y="402" text-anchor="middle">tool_use ?</text>
  <rect x="430" y="520" width="320" height="90" rx="18" fill="#ebe5ff" stroke="#b6a4ff" stroke-width="2"/>
  <text class="box" x="590" y="573" text-anchor="middle">Execute Tools</text>
  <rect x="120" y="520" width="220" height="90" rx="18" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
  <text class="box" x="230" y="573" text-anchor="middle">Finish</text>
  <line x1="340" y1="215" x2="410" y2="215" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow4)"/>
  <line x1="750" y1="215" x2="820" y2="215" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow4)"/>
  <line x1="950" y1="260" x2="950" y2="330" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow4)"/>
  <line x1="820" y1="400" x2="590" y2="520" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow4)"/>
  <line x1="430" y1="565" x2="260" y2="565" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow4)"/>
  <path d="M590,520 C700,460 740,340 820,215" fill="none" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow4)"/>
  <text class="text" x="1020" y="315">没有 tool_use 就结束</text>
  <text class="text" x="700" y="500">有 tool_use 就回到下一轮</text>
</svg>
