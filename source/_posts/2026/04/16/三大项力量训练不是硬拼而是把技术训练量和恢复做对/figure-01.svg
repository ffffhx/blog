<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .s { font: 600 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>

  <text class="title" x="72" y="92">三大项入门，不是先选最猛计划</text>
  <text class="subtitle" x="72" y="126">先建立动作稳定性、训练频率、小步渐进和恢复能力，再决定用哪套框架</text>

  <rect x="72" y="170" width="240" height="470" rx="24" fill="#fff4de" stroke="#f2bc55" stroke-width="3"/>
  <text class="h" x="192" y="220" text-anchor="middle">入门优先级</text>
  <text class="t" x="192" y="275" text-anchor="middle">1. 动作可重复</text>
  <text class="t" x="192" y="320" text-anchor="middle">2. 每周频率稳定</text>
  <text class="t" x="192" y="365" text-anchor="middle">3. 小步渐进加重</text>
  <text class="t" x="192" y="410" text-anchor="middle">4. 恢复能跟上</text>
  <rect x="112" y="462" width="160" height="112" rx="18" fill="#fffdfa" stroke="#e7d8bc" stroke-width="2"/>
  <text class="s" x="192" y="508" text-anchor="middle">先把这四件事</text>
  <text class="s" x="192" y="538" text-anchor="middle">做稳定</text>

  <rect x="352" y="170" width="240" height="470" rx="24" fill="#eef7ff" stroke="#8bbcff" stroke-width="3"/>
  <text class="h" x="472" y="220" text-anchor="middle">Starting Strength</text>
  <text class="s" x="472" y="252" text-anchor="middle">NLP / 线性推进</text>
  <text class="t" x="472" y="308" text-anchor="middle">优点：简单、反馈快</text>
  <text class="t" x="472" y="348" text-anchor="middle">适合：真正新手</text>
  <text class="t" x="472" y="388" text-anchor="middle">代价：很快会撞墙</text>
  <text class="t" x="472" y="428" text-anchor="middle">重点：用最简单方式</text>
  <text class="t" x="472" y="458" text-anchor="middle">建立训练习惯</text>
  <rect x="392" y="500" width="160" height="92" rx="18" fill="#fffdfa" stroke="#c9dcfb" stroke-width="2"/>
  <text class="s" x="472" y="540" text-anchor="middle">适合入门台阶</text>
  <text class="s" x="472" y="570" text-anchor="middle">不适合当终点</text>

  <rect x="632" y="170" width="240" height="470" rx="24" fill="#edf9f0" stroke="#80c99a" stroke-width="3"/>
  <text class="h" x="752" y="220" text-anchor="middle">5/3/1</text>
  <text class="s" x="752" y="252" text-anchor="middle">保守 TM / 长期推进</text>
  <text class="t" x="752" y="308" text-anchor="middle">优点：可持续、稳</text>
  <text class="t" x="752" y="348" text-anchor="middle">适合：过了新手期</text>
  <text class="t" x="752" y="388" text-anchor="middle">代价：前期感觉偏慢</text>
  <text class="t" x="752" y="428" text-anchor="middle">重点：长期不要急</text>
  <text class="t" x="752" y="458" text-anchor="middle">让训练活得久</text>
  <rect x="672" y="500" width="160" height="92" rx="18" fill="#fffdfa" stroke="#cbe7d2" stroke-width="2"/>
  <text class="s" x="752" y="540" text-anchor="middle">最像长期方案</text>
  <text class="s" x="752" y="570" text-anchor="middle">不是最快方案</text>

  <rect x="912" y="170" width="200" height="470" rx="24" fill="#fff0f0" stroke="#ef9a9a" stroke-width="3"/>
  <text class="h" x="1012" y="220" text-anchor="middle">Smolov</text>
  <text class="s" x="1012" y="252" text-anchor="middle">高频 / 高量 / 专项冲刺</text>
  <text class="t" x="1012" y="308" text-anchor="middle">优点：刺激非常集中</text>
  <text class="t" x="1012" y="348" text-anchor="middle">适合：有基础的人</text>
  <text class="t" x="1012" y="388" text-anchor="middle">代价：疲劳很高</text>
  <text class="t" x="1012" y="428" text-anchor="middle">重点：短期专项</text>
  <text class="t" x="1012" y="458" text-anchor="middle">不是新手主线</text>
  <rect x="942" y="500" width="140" height="92" rx="18" fill="#fffdfa" stroke="#f2c8c8" stroke-width="2"/>
  <text class="s" x="1012" y="540" text-anchor="middle">有名</text>
  <text class="s" x="1012" y="570" text-anchor="middle">但不通用</text>
</svg>
