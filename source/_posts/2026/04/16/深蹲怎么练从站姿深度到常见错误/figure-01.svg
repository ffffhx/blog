<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="20"/>

  <text class="title" x="72" y="92">深蹲入门检查表</text>
  <text class="subtitle" x="72" y="126">对大多数入门者来说，先把脚底压力、髋膝配合和深度做稳定，比先追求某种“标准外形”更重要</text>

  <rect x="80" y="180" width="320" height="430" rx="26" fill="#fff4de" stroke="#f2bc55" stroke-width="3"/>
  <text class="h" x="240" y="230" text-anchor="middle">脚底压力</text>
  <ellipse cx="185" cy="430" rx="42" ry="92" fill="#f3c59d"/>
  <ellipse cx="295" cy="430" rx="42" ry="92" fill="#f3c59d"/>
  <path d="M170 338L140 312" stroke="#f2bc55" stroke-width="8" stroke-linecap="round"/>
  <path d="M310 338L340 312" stroke="#f2bc55" stroke-width="8" stroke-linecap="round"/>
  <text class="t" x="240" y="520" text-anchor="middle">整个脚掌受力</text>
  <text class="t" x="240" y="552" text-anchor="middle">不要只压脚尖</text>
  <text class="t" x="240" y="584" text-anchor="middle">也不要只压脚跟</text>

  <rect x="440" y="180" width="320" height="430" rx="26" fill="#eef7ff" stroke="#8bbcff" stroke-width="3"/>
  <text class="h" x="600" y="230" text-anchor="middle">髋和膝一起动</text>
  <circle cx="600" cy="284" r="28" fill="#ffd6bf"/>
  <path d="M600 314L600 428" stroke="#22304A" stroke-width="16" stroke-linecap="round"/>
  <path d="M600 350L540 402" stroke="#22304A" stroke-width="14" stroke-linecap="round"/>
  <path d="M600 350L660 382" stroke="#22304A" stroke-width="14" stroke-linecap="round"/>
  <path d="M600 428L538 510" stroke="#22304A" stroke-width="16" stroke-linecap="round"/>
  <path d="M600 428L654 516" stroke="#22304A" stroke-width="16" stroke-linecap="round"/>
  <path d="M654 516L704 534" stroke="#8bbcff" stroke-width="8" stroke-linecap="round"/>
  <path d="M536 512L486 530" stroke="#8bbcff" stroke-width="8" stroke-linecap="round"/>
  <text class="t" x="600" y="552" text-anchor="middle">髋往后一点</text>
  <text class="t" x="600" y="584" text-anchor="middle">膝往前、往外一点</text>

  <rect x="800" y="180" width="320" height="430" rx="26" fill="#edf9f0" stroke="#80c99a" stroke-width="3"/>
  <text class="h" x="960" y="230" text-anchor="middle">深度与稳定</text>
  <rect x="900" y="280" width="120" height="190" rx="18" fill="#fffdfa" stroke="#cbe7d2" stroke-width="2"/>
  <path d="M960 306L960 432" stroke="#22304A" stroke-width="14" stroke-linecap="round"/>
  <path d="M960 334L918 382" stroke="#22304A" stroke-width="12" stroke-linecap="round"/>
  <path d="M960 334L1004 358" stroke="#22304A" stroke-width="12" stroke-linecap="round"/>
  <path d="M960 432L920 468" stroke="#22304A" stroke-width="14" stroke-linecap="round"/>
  <path d="M960 432L1000 468" stroke="#22304A" stroke-width="14" stroke-linecap="round"/>
  <path d="M888 468H1032" stroke="#80c99a" stroke-width="6" stroke-dasharray="10 10"/>
  <text class="t" x="960" y="520" text-anchor="middle">至少蹲到髋 crease</text>
  <text class="t" x="960" y="552" text-anchor="middle">低于膝盖顶部</text>
  <text class="t" x="960" y="584" text-anchor="middle">但不要为了更深而散掉</text>
</svg>
