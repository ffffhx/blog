<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f0; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>

  <text class="title" x="72" y="92">Skill 到底是什么</text>
  <text class="subtitle" x="72" y="126">它不是“模型升级包”，而是一份可被 agent 发现、加载、执行的工作流说明</text>

  <rect x="92" y="190" width="220" height="120" rx="20" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="202" y="238" text-anchor="middle">Prompt</text>
  <text class="t" x="202" y="274" text-anchor="middle">一次性请求</text>

  <rect x="360" y="190" width="220" height="120" rx="20" fill="#e0f2fe" stroke="#59b6e7" stroke-width="2"/>
  <text class="h" x="470" y="238" text-anchor="middle">Tool / MCP</text>
  <text class="t" x="470" y="274" text-anchor="middle">能力入口与连接方式</text>

  <rect x="628" y="170" width="260" height="160" rx="24" fill="#fff1d6" stroke="#f2b84b" stroke-width="3"/>
  <text class="h" x="758" y="226" text-anchor="middle">Skill</text>
  <text class="t" x="758" y="264" text-anchor="middle">可复用 workflow</text>
  <text class="small" x="758" y="296" text-anchor="middle">name + description + SKILL.md</text>

  <rect x="936" y="190" width="170" height="120" rx="20" fill="#ebe5ff" stroke="#b6a4ff" stroke-width="2"/>
  <text class="h" x="1021" y="238" text-anchor="middle">Agent</text>
  <text class="t" x="1021" y="274" text-anchor="middle">执行者</text>

  <line x1="580" y1="250" x2="608" y2="250" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow1)"/>
  <line x1="888" y1="250" x2="916" y2="250" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow1)"/>

  <rect x="124" y="404" width="952" height="220" rx="24" fill="#fffdfa" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="452" text-anchor="middle">Skill 的核心组成</text>

  <rect x="170" y="490" width="220" height="88" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text class="h" x="280" y="528" text-anchor="middle">发现层</text>
  <text class="t" x="280" y="560" text-anchor="middle">name / description</text>

  <rect x="490" y="490" width="220" height="88" rx="18" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text class="h" x="600" y="528" text-anchor="middle">规则层</text>
  <text class="t" x="600" y="560" text-anchor="middle">SKILL.md 正文</text>

  <rect x="810" y="490" width="220" height="88" rx="18" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="h" x="920" y="528" text-anchor="middle">资源层</text>
  <text class="t" x="920" y="560" text-anchor="middle">scripts / references / assets</text>
</svg>
