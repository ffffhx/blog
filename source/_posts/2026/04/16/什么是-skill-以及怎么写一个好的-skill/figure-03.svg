<svg width="1200" height="780" viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 23px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="780" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="700" rx="20"/>

  <text class="title" x="72" y="94">一个好 Skill 的结构</text>
  <text class="subtitle" x="72" y="128">发现、规则、资源、验证，四层都要清楚，skill 才能既好命中，也好执行</text>

  <rect x="90" y="190" width="1020" height="490" rx="28" fill="#fffdfa" stroke="#d6d3d1" stroke-width="2"/>

  <rect x="128" y="232" width="200" height="122" rx="20" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="228" y="280" text-anchor="middle">发现层</text>
  <text class="t" x="228" y="316" text-anchor="middle">好 name</text>
  <text class="t" x="228" y="342" text-anchor="middle">好 description</text>

  <rect x="370" y="232" width="220" height="122" rx="20" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="480" y="280" text-anchor="middle">规则层</text>
  <text class="t" x="480" y="316" text-anchor="middle">Workflow</text>
  <text class="t" x="480" y="342" text-anchor="middle">Output contract</text>

  <rect x="632" y="232" width="220" height="122" rx="20" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text class="h" x="742" y="280" text-anchor="middle">资源层</text>
  <text class="t" x="742" y="316" text-anchor="middle">references / assets</text>
  <text class="t" x="742" y="342" text-anchor="middle">scripts</text>

  <rect x="894" y="232" width="178" height="122" rx="20" fill="#f3e8ff" stroke="#c084fc" stroke-width="2"/>
  <text class="h" x="983" y="280" text-anchor="middle">验证层</text>
  <text class="t" x="983" y="316" text-anchor="middle">真实任务测试</text>
  <text class="t" x="983" y="342" text-anchor="middle">失败回写</text>

  <rect x="128" y="412" width="944" height="216" rx="24" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text class="h" x="600" y="458" text-anchor="middle">四个判断问题</text>

  <rect x="168" y="494" width="180" height="92" rx="18" fill="#eff6ff"/>
  <text class="t" x="258" y="532" text-anchor="middle">Agent 能否</text>
  <text class="t" x="258" y="560" text-anchor="middle">发现它</text>

  <rect x="388" y="494" width="180" height="92" rx="18" fill="#fff7ed"/>
  <text class="t" x="478" y="532" text-anchor="middle">Agent 能否</text>
  <text class="t" x="478" y="560" text-anchor="middle">按顺序执行</text>

  <rect x="608" y="494" width="180" height="92" rx="18" fill="#f0fdf4"/>
  <text class="t" x="698" y="532" text-anchor="middle">上下文成本</text>
  <text class="t" x="698" y="560" text-anchor="middle">是否合理</text>

  <rect x="828" y="494" width="180" height="92" rx="18" fill="#faf5ff"/>
  <text class="t" x="918" y="532" text-anchor="middle">真实任务里</text>
  <text class="t" x="918" y="560" text-anchor="middle">是否稳定</text>
</svg>
