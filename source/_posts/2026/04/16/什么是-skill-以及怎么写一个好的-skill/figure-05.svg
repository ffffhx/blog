<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow5" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>

  <text class="title" x="72" y="92">Skill 的迭代闭环</text>
  <text class="subtitle" x="72" y="126">好 skill 不是第一次就写对，而是通过真实任务持续收窄边界、修正文案、补足示例</text>

  <circle cx="600" cy="380" r="116" fill="#fff1d6" stroke="#f2b84b" stroke-width="3"/>
  <text class="h" x="600" y="372" text-anchor="middle">真实任务</text>
  <text class="t" x="600" y="406" text-anchor="middle">才是最终评测集</text>

  <rect x="120" y="162" width="220" height="96" rx="18" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="230" y="204" text-anchor="middle">1. 写初稿</text>
  <text class="t" x="230" y="236" text-anchor="middle">name / description / body</text>

  <rect x="860" y="162" width="220" height="96" rx="18" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text class="h" x="970" y="204" text-anchor="middle">2. 试运行</text>
  <text class="t" x="970" y="236" text-anchor="middle">看是否命中与执行稳定</text>

  <rect x="860" y="500" width="220" height="96" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text class="h" x="970" y="542" text-anchor="middle">3. 记录失败</text>
  <text class="t" x="970" y="574" text-anchor="middle">模糊描述、漏步骤、坏示例</text>

  <rect x="120" y="500" width="220" height="96" rx="18" fill="#f3e8ff" stroke="#c084fc" stroke-width="2"/>
  <text class="h" x="230" y="542" text-anchor="middle">4. 回写优化</text>
  <text class="t" x="230" y="574" text-anchor="middle">修描述、补示例、拆资源</text>

  <path d="M340 210C430 180 510 214 548 276" fill="none" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow5)"/>
  <path d="M716 276C754 214 834 180 860 210" fill="none" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow5)"/>
  <path d="M970 258C1010 334 1010 428 970 500" fill="none" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow5)"/>
  <path d="M860 548C760 606 684 592 648 492" fill="none" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow5)"/>
  <path d="M552 492C516 592 440 606 340 548" fill="none" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow5)"/>
  <path d="M230 500C190 424 190 334 230 258" fill="none" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow5)"/>
</svg>
