<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f7f7fb; }
      .frame { fill: #ffffff; stroke: #d8d8e5; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .mono { font: 600 20px "SFMono-Regular", Consolas, monospace; fill: #1f2937; }
      .h { font: 700 22px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>

  <text class="title" x="72" y="92">一个可复用的 Skill 模板</text>
  <text class="subtitle" x="72" y="126">把元数据、正文、外部资源和脚本放在最适合它们的位置，而不是全部塞进一个大文件</text>

  <rect x="96" y="184" width="470" height="456" rx="24" fill="#0f172a"/>
  <text class="mono" x="132" y="232" fill="#e2e8f0">summarizing-official-docs/</text>
  <text class="mono" x="156" y="282" fill="#93c5fd">├── SKILL.md</text>
  <text class="mono" x="156" y="332" fill="#fde68a">├── references/</text>
  <text class="mono" x="188" y="382" fill="#f8fafc">└── source-checklist.md</text>
  <text class="mono" x="156" y="432" fill="#86efac">├── assets/</text>
  <text class="mono" x="188" y="482" fill="#f8fafc">└── output-template.md</text>
  <text class="mono" x="156" y="532" fill="#c4b5fd">└── scripts/</text>
  <text class="mono" x="188" y="582" fill="#f8fafc">└── collect-links.sh</text>

  <rect x="642" y="196" width="428" height="116" rx="20" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="676" y="246">SKILL.md</text>
  <text class="t" x="676" y="280">最短路径的规则与输出约定</text>

  <rect x="642" y="340" width="428" height="116" rx="20" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="676" y="390">references / assets</text>
  <text class="t" x="676" y="424">详细知识与模板外置，按需读取</text>

  <rect x="642" y="484" width="428" height="116" rx="20" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text class="h" x="676" y="534">scripts</text>
  <text class="t" x="676" y="568">只有在确实需要执行动作时才调用</text>
</svg>
