<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #dbe2ea; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .t { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
    </style>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="36" y="36" width="1128" height="688" rx="20"/>

  <text class="title" x="72" y="92">Skill 是怎么工作的</text>
  <text class="subtitle" x="72" y="126">核心机制不是“全量注入”，而是 progressive disclosure：先发现，再加载，再按需读取资源</text>

  <rect x="86" y="220" width="220" height="140" rx="20" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="196" y="274" text-anchor="middle">1. 发现</text>
  <text class="t" x="196" y="310" text-anchor="middle">启动时只看</text>
  <text class="t" x="196" y="338" text-anchor="middle">name / description</text>

  <rect x="356" y="220" width="220" height="140" rx="20" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="466" y="274" text-anchor="middle">2. 激活</text>
  <text class="t" x="466" y="310" text-anchor="middle">任务匹配后读取</text>
  <text class="t" x="466" y="338" text-anchor="middle">完整 SKILL.md</text>

  <rect x="626" y="220" width="220" height="140" rx="20" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text class="h" x="736" y="274" text-anchor="middle">3. 补充</text>
  <text class="t" x="736" y="310" text-anchor="middle">按需读取 references</text>
  <text class="t" x="736" y="338" text-anchor="middle">assets 或执行 scripts</text>

  <rect x="896" y="220" width="220" height="140" rx="20" fill="#f3e8ff" stroke="#c084fc" stroke-width="2"/>
  <text class="h" x="1006" y="274" text-anchor="middle">4. 完成任务</text>
  <text class="t" x="1006" y="310" text-anchor="middle">把说明、资源和工具</text>
  <text class="t" x="1006" y="338" text-anchor="middle">组合成执行结果</text>

  <line x1="306" y1="290" x2="336" y2="290" stroke="#64748b" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="576" y1="290" x2="606" y2="290" stroke="#64748b" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="846" y1="290" x2="876" y2="290" stroke="#64748b" stroke-width="4" marker-end="url(#arrow2)"/>

  <rect x="110" y="454" width="980" height="176" rx="24" fill="#fffdfa" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="504" text-anchor="middle">为什么这种设计重要</text>

  <rect x="180" y="536" width="240" height="56" rx="16" fill="#eef2ff"/>
  <text class="t" x="300" y="571" text-anchor="middle">减少上下文拥堵</text>

  <rect x="480" y="536" width="240" height="56" rx="16" fill="#ecfeff"/>
  <text class="t" x="600" y="571" text-anchor="middle">降低 token 成本</text>

  <rect x="780" y="536" width="240" height="56" rx="16" fill="#fef9c3"/>
  <text class="t" x="900" y="571" text-anchor="middle">把 skill 做成可组合积木</text>

  <text class="small" x="600" y="666" text-anchor="middle">结论：好的 skill 不是塞更多信息，而是把信息放到 agent 真正需要的时候再交给它</text>
</svg>
