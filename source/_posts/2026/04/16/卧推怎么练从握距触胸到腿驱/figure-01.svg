<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="640" rx="20"/>

  <text class="title" x="72" y="92">卧推入门四个关键点</text>
  <text class="subtitle" x="72" y="126">卧推不是单纯把杠推起来，而是用上背、握法、触胸点和腿驱把力量稳定送出去</text>

  <rect x="88" y="186" width="1024" height="420" rx="28" fill="#f7fbff" stroke="#d9e8ff" stroke-width="2"/>
  <rect x="370" y="386" width="460" height="32" rx="16" fill="#d6d3d1"/>
  <circle cx="500" cy="350" r="28" fill="#ffd6bf"/>
  <path d="M500 378L500 446" stroke="#22304A" stroke-width="16" stroke-linecap="round"/>
  <path d="M500 398L420 336" stroke="#22304A" stroke-width="14" stroke-linecap="round"/>
  <path d="M500 398L580 336" stroke="#22304A" stroke-width="14" stroke-linecap="round"/>
  <path d="M500 446L436 520" stroke="#22304A" stroke-width="14" stroke-linecap="round"/>
  <path d="M500 446L564 520" stroke="#22304A" stroke-width="14" stroke-linecap="round"/>
  <path d="M400 322H600" stroke="#111827" stroke-width="10" stroke-linecap="round"/>
  <circle cx="400" cy="322" r="18" fill="#374151"/>
  <circle cx="600" cy="322" r="18" fill="#374151"/>
  <path d="M608 250Q680 290 724 340" stroke="#ef9a9a" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M724 340Q676 280 634 238" stroke="#ef9a9a" stroke-width="8" fill="none" stroke-dasharray="12 10" stroke-linecap="round"/>

  <rect x="116" y="214" width="220" height="132" rx="22" fill="#fff4de" stroke="#f2bc55" stroke-width="3"/>
  <text class="h" x="226" y="258" text-anchor="middle">握法</text>
  <text class="t" x="226" y="298" text-anchor="middle">杠放在掌根附近</text>
  <text class="t" x="226" y="330" text-anchor="middle">拇指包住杠</text>

  <rect x="116" y="388" width="220" height="132" rx="22" fill="#eef7ff" stroke="#8bbcff" stroke-width="3"/>
  <text class="h" x="226" y="432" text-anchor="middle">上背</text>
  <text class="t" x="226" y="472" text-anchor="middle">肩胛后缩下压</text>
  <text class="t" x="226" y="504" text-anchor="middle">在凳上建立支点</text>

  <rect x="864" y="214" width="220" height="132" rx="22" fill="#edf9f0" stroke="#80c99a" stroke-width="3"/>
  <text class="h" x="974" y="258" text-anchor="middle">触胸点</text>
  <text class="t" x="974" y="298" text-anchor="middle">每次尽量同一点</text>
  <text class="t" x="974" y="330" text-anchor="middle">前臂接近垂直</text>

  <rect x="864" y="388" width="220" height="132" rx="22" fill="#fff0f0" stroke="#ef9a9a" stroke-width="3"/>
  <text class="h" x="974" y="432" text-anchor="middle">腿驱</text>
  <text class="t" x="974" y="472" text-anchor="middle">把身体顶进凳子</text>
  <text class="t" x="974" y="504" text-anchor="middle">不是把屁股抬起</text>
</svg>
