<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#F5F1EA"/>
  <text x="72" y="86" font-size="34" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">多代理和自动化阶段，AI 开始处理并行与重复任务</text>
  <text x="72" y="120" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#6E665D">重点不再只是聊天或补全，而是把任务拆开、放到后台运行，并把重复性工作做成可审查的自动化。</text>

  <circle cx="600" cy="396" r="126" fill="#F0F6FF" stroke="#AAC8EF" stroke-width="3"/>
  <text x="542" y="382" font-size="28" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2A4E79" font-weight="700">共享 Agent</text>
  <text x="540" y="416" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2A4E79">运行时能力</text>

  <rect x="478" y="466" width="244" height="96" rx="18" fill="#FFFFFF" stroke="#AAC8EF"/>
  <text x="530" y="500" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#41596E">Rules / Memory / MCP</text>
  <text x="520" y="528" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#41596E">Sandbox / Approvals</text>

  <rect x="98" y="178" width="190" height="92" rx="20" fill="#FFF4E8" stroke="#EFC28B" stroke-width="2"/>
  <rect x="98" y="510" width="190" height="92" rx="20" fill="#F8FBFF" stroke="#BFD4F1" stroke-width="2"/>
  <rect x="912" y="178" width="190" height="92" rx="20" fill="#F4FBF7" stroke="#B9DCC8" stroke-width="2"/>
  <rect x="912" y="510" width="190" height="92" rx="20" fill="#F7F3FF" stroke="#D0C0F4" stroke-width="2"/>
  <rect x="88" y="332" width="200" height="116" rx="20" fill="#FFF9F2" stroke="#D8C9B7" stroke-width="2"/>
  <rect x="912" y="332" width="200" height="116" rx="20" fill="#FFF9F2" stroke="#D8C9B7" stroke-width="2"/>

  <text x="170" y="216" font-size="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#8B5611" font-weight="700">Web</text>
  <text x="120" y="246" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#6A604F">问答、委派、长任务看板</text>

  <text x="163" y="548" font-size="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2D5B98" font-weight="700">IDE</text>
  <text x="117" y="578" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#546374">读仓库、改文件、看 diff</text>

  <text x="969" y="216" font-size="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2C6B49" font-weight="700">CLI</text>
  <text x="936" y="246" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#55645D">build / test / git / ssh</text>

  <text x="948" y="548" font-size="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#5B42A7" font-weight="700">Desktop</text>
  <text x="930" y="578" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#61586F">多代理管理与通知中心</text>

  <text x="118" y="370" font-size="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#655C52" font-weight="700">Automations</text>
  <text x="118" y="400" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#655C52">定时 triage、日报、</text>
  <text x="124" y="426" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#655C52">CI 摘要与重复任务</text>

  <text x="948" y="370" font-size="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#655C52" font-weight="700">External</text>
  <text x="930" y="400" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#655C52">GitHub / Slack / Figma /</text>
  <text x="936" y="426" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#655C52">Docs / CI / MCP Servers</text>

  <line x1="288" y1="224" x2="474" y2="326" stroke="#D79B45" stroke-width="4" stroke-linecap="round"/>
  <line x1="288" y1="556" x2="470" y2="454" stroke="#5A8FD8" stroke-width="4" stroke-linecap="round"/>
  <line x1="912" y1="224" x2="726" y2="326" stroke="#41A36F" stroke-width="4" stroke-linecap="round"/>
  <line x1="912" y1="556" x2="726" y2="454" stroke="#8A68D6" stroke-width="4" stroke-linecap="round"/>
  <line x1="288" y1="390" x2="474" y2="390" stroke="#A58B69" stroke-width="4" stroke-linecap="round"/>
  <line x1="912" y1="390" x2="726" y2="390" stroke="#A58B69" stroke-width="4" stroke-linecap="round"/>

  <text x="84" y="686" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#665E54">真正的新阶段：不是又多一个聊天框，而是同一个 Agent 体系开始并行处理任务，并把重复工作做成后台自动化。</text>
</svg>
