<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#F5F2EC"/>
  <text x="72" y="86" font-size="34" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">仓库级 IDE Agent 在做什么</text>
  <text x="72" y="120" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#6F675D">以 Cursor 这类产品为代表，AI 已经不是“当前文件补全器”，而是“先理解仓库，再执行任务”的系统。</text>

  <rect x="86" y="184" width="240" height="404" rx="24" fill="#FFF9F0" stroke="#D9C9B8" stroke-width="2"/>
  <text x="144" y="228" font-size="28" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">代码仓库</text>
  <rect x="122" y="266" width="170" height="54" rx="12" fill="#F1EFEA" stroke="#CFC5B5"/>
  <rect x="122" y="334" width="170" height="54" rx="12" fill="#F1EFEA" stroke="#CFC5B5"/>
  <rect x="122" y="402" width="170" height="54" rx="12" fill="#F1EFEA" stroke="#CFC5B5"/>
  <rect x="122" y="470" width="170" height="54" rx="12" fill="#F1EFEA" stroke="#CFC5B5"/>
  <text x="164" y="300" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#5D554B">源代码文件</text>
  <text x="164" y="368" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#5D554B">配置与脚本</text>
  <text x="173" y="436" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#5D554B">测试用例</text>
  <text x="147" y="504" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#5D554B">提交与 PR 线索</text>

  <rect x="420" y="140" width="344" height="496" rx="26" fill="#F0F7FF" stroke="#A9C7EE" stroke-width="2"/>
  <text x="480" y="188" font-size="28" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#234E7D" font-weight="700">IDE Agent Runtime</text>

  <rect x="458" y="228" width="268" height="70" rx="16" fill="#FFFFFF" stroke="#B8D3F4"/>
  <text x="520" y="270" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">代码库索引 / 检索</text>

  <rect x="458" y="322" width="268" height="70" rx="16" fill="#FFFFFF" stroke="#B8D3F4"/>
  <text x="524" y="364" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">任务规划 / 搜索</text>

  <rect x="458" y="416" width="268" height="70" rx="16" fill="#FFFFFF" stroke="#B8D3F4"/>
  <text x="518" y="458" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">跨文件编辑 / Apply</text>

  <rect x="458" y="510" width="268" height="70" rx="16" fill="#FFFFFF" stroke="#B8D3F4"/>
  <text x="514" y="552" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">终端 / Rules / MCP</text>

  <rect x="868" y="184" width="246" height="404" rx="24" fill="#F4FBF7" stroke="#B7DEC7" stroke-width="2"/>
  <text x="921" y="228" font-size="28" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2A6B49" font-weight="700">开发者</text>
  <rect x="902" y="272" width="178" height="64" rx="14" fill="#FFFFFF" stroke="#B7DEC7"/>
  <rect x="902" y="360" width="178" height="64" rx="14" fill="#FFFFFF" stroke="#B7DEC7"/>
  <rect x="902" y="448" width="178" height="64" rx="14" fill="#FFFFFF" stroke="#B7DEC7"/>
  <text x="944" y="311" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">描述任务</text>
  <text x="940" y="399" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">审查改动</text>
  <text x="925" y="487" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">决定接受与回退</text>

  <line x1="326" y1="386" x2="420" y2="386" stroke="#5A8FD8" stroke-width="4" stroke-linecap="round"/>
  <polygon points="420,386 405,378 405,394" fill="#5A8FD8"/>

  <line x1="764" y1="386" x2="868" y2="386" stroke="#41A36F" stroke-width="4" stroke-linecap="round"/>
  <polygon points="868,386 853,378 853,394" fill="#41A36F"/>

  <line x1="868" y1="536" x2="764" y2="536" stroke="#41A36F" stroke-width="4" stroke-linecap="round"/>
  <polygon points="764,536 779,528 779,544" fill="#41A36F"/>

  <text x="362" y="364" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#5A8FD8">读仓库</text>
  <text x="792" y="364" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#41A36F">提交任务</text>
  <text x="790" y="560" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#41A36F">返回 diff</text>

  <text x="82" y="676" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#665E54">关键变化：AI 开始对“这个任务如何在整个项目里落地”负责，而不只是预测下一行代码。</text>
</svg>
