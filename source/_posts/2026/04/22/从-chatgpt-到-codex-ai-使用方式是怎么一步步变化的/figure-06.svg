<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#F6F1E8"/>
  <rect x="42" y="38" width="1116" height="684" rx="28" fill="#FFF9F0" stroke="#D7CCBA" stroke-width="2"/>

  <text x="80" y="100" font-size="34" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">第六阶段：AI 进入真实工作环境</text>
  <text x="80" y="136" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#73685B">浏览器、网页后台、桌面应用和真实账号系统，开始成为 Agent 可以观察和操作的执行面。</text>

  <rect x="90" y="190" width="245" height="150" rx="22" fill="#EAF3FF" stroke="#9EC0EA" stroke-width="2"/>
  <text x="124" y="238" font-size="24" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#1F3D66" font-weight="700">工程环境</text>
  <text x="124" y="276" font-size="17" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#475B75">仓库、终端、测试</text>
  <text x="124" y="306" font-size="17" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#475B75">Git、PR、CI 日志</text>

  <rect x="476" y="190" width="245" height="150" rx="22" fill="#F0FBF4" stroke="#94C9A8" stroke-width="2"/>
  <text x="510" y="238" font-size="24" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#23583B" font-weight="700">浏览器环境</text>
  <text x="510" y="276" font-size="17" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#466650">网页后台、DevTools</text>
  <text x="510" y="306" font-size="17" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#466650">表单、请求、控制台</text>

  <rect x="865" y="190" width="245" height="150" rx="22" fill="#FFF1E8" stroke="#E6AE82" stroke-width="2"/>
  <text x="899" y="238" font-size="24" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#7A3F18" font-weight="700">电脑环境</text>
  <text x="899" y="276" font-size="17" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#76533D">截图、点击、输入</text>
  <text x="899" y="306" font-size="17" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#76533D">桌面应用、本机窗口</text>

  <path d="M350 265 C385 245, 430 245, 462 265" fill="none" stroke="#D79C4A" stroke-width="5" stroke-linecap="round"/>
  <path d="M462 265 L443 252 M462 265 L443 278" fill="none" stroke="#D79C4A" stroke-width="5" stroke-linecap="round"/>
  <path d="M736 265 C773 245, 818 245, 850 265" fill="none" stroke="#D79C4A" stroke-width="5" stroke-linecap="round"/>
  <path d="M850 265 L831 252 M850 265 L831 278" fill="none" stroke="#D79C4A" stroke-width="5" stroke-linecap="round"/>

  <rect x="116" y="410" width="968" height="178" rx="24" fill="#FFFFFF" stroke="#E0D5C6" stroke-width="2"/>
  <text x="152" y="456" font-size="24" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">新的可协作动作</text>

  <circle cx="170" cy="502" r="8" fill="#2F6DD0"/>
  <text x="194" y="508" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#4F473E">创建 BITS、创建 Meego、绑定分支、触发流水线</text>

  <circle cx="170" cy="542" r="8" fill="#2F6DD0"/>
  <text x="194" y="548" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#4F473E">打开页面复现问题，观察真实请求，再回到代码里修复</text>

  <circle cx="666" cy="502" r="8" fill="#2F6DD0"/>
  <text x="690" y="508" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#4F473E">操作没有 API 的后台系统和桌面工具</text>

  <circle cx="666" cy="542" r="8" fill="#2F6DD0"/>
  <text x="690" y="548" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#4F473E">把网页状态、截图、命令结果放回同一个任务链路</text>

  <rect x="116" y="626" width="968" height="58" rx="18" fill="#2E2A24"/>
  <text x="150" y="662" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#FFF9F0" font-weight="700">关键不是“能点鼠标”，而是操作可确认、过程可追踪、结果可审查、风险可隔离。</text>
</svg>
