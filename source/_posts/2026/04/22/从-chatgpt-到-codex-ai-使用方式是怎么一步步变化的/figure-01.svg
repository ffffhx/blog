  <text x="108" y="504" font-size="17" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#8B6A44">这条线更像使用习惯的迁移：从“提问”到“补全”，再到“仓库级执行”和“多代理协同”。</text>

