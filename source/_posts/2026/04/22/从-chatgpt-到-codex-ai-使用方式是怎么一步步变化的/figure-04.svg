<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#F4F0E8"/>
  <text x="72" y="86" font-size="34" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">CLI Agent 的典型执行回路</text>
  <text x="72" y="120" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#6E665D">以 Claude Code、Codex CLI 为代表，AI 已经进入终端，开始围绕工程任务持续循环：读代码、跑命令、改文件、看结果。</text>

  <rect x="82" y="176" width="1036" height="520" rx="28" fill="#FFF9F2" stroke="#D8C9B7" stroke-width="2"/>

  <rect x="116" y="238" width="180" height="74" rx="16" fill="#FFF2DE" stroke="#F0C07D" stroke-width="2"/>
  <rect x="340" y="238" width="180" height="74" rx="16" fill="#FFFFFF" stroke="#A8C7EE" stroke-width="2"/>
  <rect x="564" y="238" width="180" height="74" rx="16" fill="#FFFFFF" stroke="#A8C7EE" stroke-width="2"/>
  <rect x="788" y="238" width="180" height="74" rx="16" fill="#FFFFFF" stroke="#A8C7EE" stroke-width="2"/>

  <text x="157" y="282" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#7A4E11" font-weight="700">用户下达任务</text>
  <text x="397" y="282" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">读取仓库与计划</text>
  <text x="628" y="282" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">执行命令 / 搜索</text>
  <text x="840" y="282" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2E2A24" font-weight="700">编辑文件 / 跑测试</text>

  <line x1="296" y1="275" x2="340" y2="275" stroke="#D79B45" stroke-width="4" stroke-linecap="round"/>
  <polygon points="340,275 326,267 326,283" fill="#D79B45"/>
  <line x1="520" y1="275" x2="564" y2="275" stroke="#5A8FD8" stroke-width="4" stroke-linecap="round"/>
  <polygon points="564,275 550,267 550,283" fill="#5A8FD8"/>
  <line x1="744" y1="275" x2="788" y2="275" stroke="#5A8FD8" stroke-width="4" stroke-linecap="round"/>
  <polygon points="788,275 774,267 774,283" fill="#5A8FD8"/>

  <rect x="176" y="386" width="848" height="150" rx="24" fill="#F0F6FF" stroke="#A8C7EE" stroke-width="2"/>
  <text x="214" y="428" font-size="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#254D7A" font-weight="700">Agent Loop</text>
  <text x="214" y="464" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#536271">读文件 → 分析输出 → 调整命令 → 改代码 → 重跑测试 → 继续迭代</text>

  <rect x="214" y="492" width="200" height="28" rx="14" fill="#DCEAFF"/>
  <rect x="436" y="492" width="170" height="28" rx="14" fill="#DCEAFF"/>
  <rect x="626" y="492" width="170" height="28" rx="14" fill="#DCEAFF"/>
  <rect x="816" y="492" width="170" height="28" rx="14" fill="#DCEAFF"/>
  <text x="238" y="512" font-size="14" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#345A85">文件系统上下文</text>
  <text x="468" y="512" font-size="14" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#345A85">终端输出</text>
  <text x="656" y="512" font-size="14" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#345A85">测试结果</text>
  <text x="848" y="512" font-size="14" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#345A85">git 状态</text>

  <rect x="112" y="584" width="272" height="80" rx="20" fill="#FFF4E8" stroke="#F0C07D" stroke-width="2"/>
  <text x="154" y="618" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#8A5511" font-weight="700">权限与审批</text>
  <text x="136" y="646" font-size="15" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#6A604F">修改文件、联网、危险命令前请求许可</text>

  <rect x="464" y="584" width="272" height="80" rx="20" fill="#F3FBF6" stroke="#B7DEC7" stroke-width="2"/>
  <text x="534" y="618" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#2D6D4C" font-weight="700">可恢复性</text>
  <text x="500" y="646" font-size="15" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#5A655F">diff、提交记录、分支与回滚路径都更清晰</text>

  <rect x="816" y="584" width="272" height="80" rx="20" fill="#F7F3FF" stroke="#D0C0F4" stroke-width="2"/>
  <text x="866" y="618" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#5C43A8" font-weight="700">为什么 CLI 关键</text>
  <text x="852" y="646" font-size="15" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#61586F">因为工程师本来就在这里 build / test / git</text>

  <path d="M 968 312 C 1040 348, 1048 380, 1024 428 C 1004 466, 944 480, 892 470" fill="none" stroke="#5A8FD8" stroke-width="4"/>
  <polygon points="893,470 907,458 909,475" fill="#5A8FD8"/>
</svg>
