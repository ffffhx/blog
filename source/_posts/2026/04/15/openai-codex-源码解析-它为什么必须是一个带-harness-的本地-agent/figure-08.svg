<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box-title { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box-text { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <text class="title" x="600" y="58" text-anchor="middle">这套架构的收益与代价</text>
  <text class="subtitle" x="600" y="92" text-anchor="middle">越像产品级 Agent，系统复杂度就越不可能保持轻盈</text>

  <rect x="90" y="150" width="470" height="510" rx="28" fill="#e8f7ea" stroke="#67c27d" stroke-width="2"/>
  <text class="box-title" x="325" y="202" text-anchor="middle">收益</text>

  <rect x="130" y="240" width="390" height="72" rx="18" fill="#ffffff" stroke="#bde4c7" stroke-width="2"/>
  <text class="box-text" x="325" y="285" text-anchor="middle">贴着本地环境工作，真实可执行</text>

  <rect x="130" y="334" width="390" height="72" rx="18" fill="#ffffff" stroke="#bde4c7" stroke-width="2"/>
  <text class="box-text" x="325" y="379" text-anchor="middle">多前端共享一套 runtime，平台化更强</text>

  <rect x="130" y="428" width="390" height="72" rx="18" fill="#ffffff" stroke="#bde4c7" stroke-width="2"/>
  <text class="box-text" x="325" y="473" text-anchor="middle">Harness 更强，副作用更可控</text>

  <rect x="130" y="522" width="390" height="72" rx="18" fill="#ffffff" stroke="#bde4c7" stroke-width="2"/>
  <text class="box-text" x="325" y="567" text-anchor="middle">状态更完整，支持恢复、搜索、长期协作</text>

  <rect x="640" y="150" width="470" height="510" rx="28" fill="#fdecec" stroke="#ef8d8d" stroke-width="2"/>
  <text class="box-title" x="875" y="202" text-anchor="middle">代价</text>

  <rect x="680" y="240" width="390" height="72" rx="18" fill="#ffffff" stroke="#f3b2b2" stroke-width="2"/>
  <text class="box-text" x="875" y="285" text-anchor="middle">跨平台执行与沙箱实现非常复杂</text>

  <rect x="680" y="334" width="390" height="72" rx="18" fill="#ffffff" stroke="#f3b2b2" stroke-width="2"/>
  <text class="box-text" x="875" y="379" text-anchor="middle">协议层要长期维护，兼容成本高</text>

  <rect x="680" y="428" width="390" height="72" rx="18" fill="#ffffff" stroke="#f3b2b2" stroke-width="2"/>
  <text class="box-text" x="875" y="473" text-anchor="middle">状态越多，一致性和调试越难</text>

  <rect x="680" y="522" width="390" height="72" rx="18" fill="#ffffff" stroke="#f3b2b2" stroke-width="2"/>
  <text class="box-text" x="875" y="567" text-anchor="middle">审批和安全边界会拉长链路、影响流畅度</text>

  <rect x="330" y="682" width="540" height="46" rx="14" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text class="small" x="600" y="711" text-anchor="middle">结论：Codex 的难点不是“把模型接上工具”，而是“把工具接进产品级运行时”</text>
</svg>
