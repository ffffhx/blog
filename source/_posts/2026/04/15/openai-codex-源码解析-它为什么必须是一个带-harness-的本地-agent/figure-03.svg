<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box-title { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box-text { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="820" rx="24"/>
  <text class="title" x="600" y="62" text-anchor="middle">Codex 的 5 层结构</text>
  <text class="subtitle" x="600" y="96" text-anchor="middle">不要按目录树看，而要按职责分层看</text>

  <rect x="200" y="130" width="800" height="100" rx="22" fill="#f4ebff" stroke="#c4b5fd" stroke-width="2"/>
  <text class="box-title" x="600" y="172" text-anchor="middle">分发与安装层</text>
  <text class="box-text" x="600" y="206" text-anchor="middle">npm / Homebrew / SDK / 仓库级脚本</text>

  <line x1="600" y1="230" x2="600" y2="272" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="150" y="286" width="900" height="110" rx="22" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="box-title" x="600" y="330" text-anchor="middle">交互层</text>
  <text class="box-text" x="600" y="364" text-anchor="middle">CLI / TUI / 桌面端 / IDE 集成</text>

  <line x1="600" y1="396" x2="600" y2="438" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="140" y="452" width="920" height="120" rx="24" fill="#fff4da" stroke="#f2b84b" stroke-width="2"/>
  <text class="box-title" x="600" y="498" text-anchor="middle">协议层</text>
  <text class="box-text" x="600" y="534" text-anchor="middle">App Server / JSON-RPC / Thread / Turn / Item / 文件与命令服务</text>

  <line x1="600" y1="572" x2="600" y2="614" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="120" y="628" width="960" height="120" rx="24" fill="#e7f7ea" stroke="#6bc381" stroke-width="2"/>
  <text class="box-title" x="600" y="674" text-anchor="middle">核心运行时</text>
  <text class="box-text" x="600" y="708" text-anchor="middle">Core / Tasks / Tool Orchestration / Skills / Plugins / State Bridge</text>

  <rect x="140" y="764" width="450" height="38" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text class="small" x="365" y="788" text-anchor="middle">左手控制执行：Tools / Sandbox / Approval / Policy</text>

  <rect x="610" y="764" width="450" height="38" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text class="small" x="835" y="788" text-anchor="middle">右手保存历史：Rollout / SQLite / Memory</text>
</svg>
