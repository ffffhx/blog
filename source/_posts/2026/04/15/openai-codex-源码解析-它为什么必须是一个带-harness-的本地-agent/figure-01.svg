<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdf9; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box-title { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box-text { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>

  <text class="title" x="72" y="92">先把几个词说人话</text>
  <text class="subtitle" x="72" y="126">看 Codex 之前，先把“模型、runtime、harness、工具、状态”这几个层次分开</text>

  <rect x="88" y="180" width="220" height="110" rx="20" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="box-title" x="198" y="226" text-anchor="middle">大模型</text>
  <text class="box-text" x="198" y="260" text-anchor="middle">负责理解、规划、输出</text>

  <rect x="366" y="160" width="470" height="150" rx="24" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="box-title" x="601" y="208" text-anchor="middle">Agent Runtime</text>
  <text class="box-text" x="601" y="244" text-anchor="middle">接输入、拼上下文、调模型、收工具结果、发事件</text>
  <text class="small" x="601" y="274" text-anchor="middle">它像“让模型真的干活”的运行时操作系统</text>

  <rect x="894" y="180" width="220" height="110" rx="20" fill="#ebe5ff" stroke="#b6a4ff" stroke-width="2"/>
  <text class="box-title" x="1004" y="226" text-anchor="middle">Harness</text>
  <text class="box-text" x="1004" y="260" text-anchor="middle">负责能力边界和安全约束</text>

  <line x1="308" y1="235" x2="346" y2="235" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="836" y1="235" x2="874" y2="235" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="96" y="380" width="240" height="110" rx="20" fill="#e0f2fe" stroke="#4ea9dc" stroke-width="2"/>
  <text class="box-title" x="216" y="426" text-anchor="middle">Tool Calling</text>
  <text class="box-text" x="216" y="460" text-anchor="middle">模型提议动作，runtime 真正执行</text>

  <rect x="384" y="380" width="240" height="110" rx="20" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="box-title" x="504" y="426" text-anchor="middle">Thread / Turn / Item</text>
  <text class="box-text" x="504" y="460" text-anchor="middle">会话、轮次、最小事件单元</text>

  <rect x="672" y="380" width="240" height="110" rx="20" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="box-title" x="792" y="426" text-anchor="middle">Rollout / State</text>
  <text class="box-text" x="792" y="460" text-anchor="middle">原始记录、索引、结构化状态</text>

  <rect x="960" y="380" width="160" height="110" rx="20" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="box-title" x="1040" y="426" text-anchor="middle">Memory</text>
  <text class="box-text" x="1040" y="460" text-anchor="middle">从历史里提炼长期记忆</text>

  <line x1="216" y1="310" x2="216" y2="360" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="504" y1="310" x2="504" y2="360" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="792" y1="310" x2="792" y2="360" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1040" y1="310" x2="1040" y2="360" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="150" y="560" width="900" height="100" rx="22" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="box-title" x="600" y="602" text-anchor="middle">一句话总结</text>
  <text class="box-text" x="600" y="636" text-anchor="middle">模型负责概率决策，Harness 负责把这些决策限制在可接受的执行边界内</text>
</svg>
