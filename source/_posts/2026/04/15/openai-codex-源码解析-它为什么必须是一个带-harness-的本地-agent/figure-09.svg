<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box-title { font: 700 25px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box-text { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <text class="title" x="600" y="58" text-anchor="middle">最后一张图：怎么理解 Codex</text>
  <text class="subtitle" x="600" y="92" text-anchor="middle">最好的视角不是“终端里的聊天”，而是“被 Harness 约束的本地执行系统”</text>

  <circle cx="600" cy="410" r="90" fill="#efe8ff" stroke="#c4b5fd" stroke-width="3"/>
  <text class="box-title" x="600" y="404" text-anchor="middle">模型</text>
  <text class="box-text" x="600" y="434" text-anchor="middle">理解、规划、生成</text>

  <circle cx="600" cy="410" r="180" fill="none" stroke="#f1ba4a" stroke-width="8"/>
  <text class="box-title" x="600" y="214" text-anchor="middle">Harness</text>
  <text class="box-text" x="600" y="244" text-anchor="middle">审批、沙箱、策略、状态、恢复</text>

  <circle cx="600" cy="410" r="280" fill="none" stroke="#67c27d" stroke-width="8"/>
  <text class="box-title" x="600" y="114" text-anchor="middle">本地工作环境</text>
  <text class="box-text" x="600" y="144" text-anchor="middle">代码仓库、终端、git、文件系统、IDE、插件和外部能力</text>

  <rect x="200" y="640" width="800" height="58" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text class="box-text" x="600" y="676" text-anchor="middle">一句话：Codex 的核心不是“会调工具”，而是“让工具调用在本地环境里依然可控”</text>
</svg>
