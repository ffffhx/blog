<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .lane-title { font: 700 20px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box-text { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="900" rx="24"/>
  <text class="title" x="600" y="58" text-anchor="middle">一轮 Turn 的执行链路</text>
  <text class="subtitle" x="600" y="92" text-anchor="middle">它不是“问一下模型”，而是一条持续流式、可回放、可中断的执行流水线</text>

  <rect x="70" y="140" width="220" height="680" rx="22" fill="#eef4ff" stroke="#9bbcff" stroke-width="2"/>
  <text class="lane-title" x="180" y="178" text-anchor="middle">用户 / UI</text>

  <rect x="330" y="140" width="250" height="680" rx="22" fill="#fff2d9" stroke="#f2bc52" stroke-width="2"/>
  <text class="lane-title" x="455" y="178" text-anchor="middle">App Server / 协议层</text>

  <rect x="620" y="140" width="250" height="680" rx="22" fill="#e8f7ea" stroke="#67c27d" stroke-width="2"/>
  <text class="lane-title" x="745" y="178" text-anchor="middle">Core / Turn Runtime</text>

  <rect x="910" y="140" width="220" height="680" rx="22" fill="#f6ebff" stroke="#c6a8ff" stroke-width="2"/>
  <text class="lane-title" x="1020" y="178" text-anchor="middle">Tools / State</text>

  <rect x="95" y="220" width="170" height="56" rx="14" fill="#ffffff" stroke="#cdd9f8" stroke-width="2"/>
  <text class="box-text" x="180" y="255" text-anchor="middle">用户发起请求</text>

  <rect x="355" y="220" width="200" height="56" rx="14" fill="#ffffff" stroke="#f5d08e" stroke-width="2"/>
  <text class="box-text" x="455" y="255" text-anchor="middle">thread/start 或 turn/start</text>

  <rect x="645" y="220" width="200" height="56" rx="14" fill="#ffffff" stroke="#9ad0a6" stroke-width="2"/>
  <text class="box-text" x="745" y="255" text-anchor="middle">构建 TurnContext</text>

  <rect x="645" y="330" width="200" height="56" rx="14" fill="#ffffff" stroke="#9ad0a6" stroke-width="2"/>
  <text class="box-text" x="745" y="365" text-anchor="middle">拼装历史、工具和指令</text>

  <rect x="645" y="440" width="200" height="56" rx="14" fill="#ffffff" stroke="#9ad0a6" stroke-width="2"/>
  <text class="box-text" x="745" y="475" text-anchor="middle">调用模型并接收流式输出</text>

  <rect x="935" y="440" width="170" height="56" rx="14" fill="#ffffff" stroke="#d4b8ff" stroke-width="2"/>
  <text class="box-text" x="1020" y="475" text-anchor="middle">如有 tool call</text>

  <rect x="935" y="550" width="170" height="56" rx="14" fill="#ffffff" stroke="#d4b8ff" stroke-width="2"/>
  <text class="box-text" x="1020" y="585" text-anchor="middle">执行工具并返回结果</text>

  <rect x="645" y="660" width="200" height="56" rx="14" fill="#ffffff" stroke="#9ad0a6" stroke-width="2"/>
  <text class="box-text" x="745" y="695" text-anchor="middle">结束 turn，汇总最终消息</text>

  <rect x="935" y="710" width="170" height="56" rx="14" fill="#ffffff" stroke="#d4b8ff" stroke-width="2"/>
  <text class="box-text" x="1020" y="745" text-anchor="middle">写入 rollout / state</text>

  <rect x="95" y="660" width="170" height="56" rx="14" fill="#ffffff" stroke="#cdd9f8" stroke-width="2"/>
  <text class="box-text" x="180" y="695" text-anchor="middle">UI 持续收到事件</text>

  <line x1="265" y1="248" x2="335" y2="248" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="555" y1="248" x2="625" y2="248" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="745" y1="276" x2="745" y2="322" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="745" y1="386" x2="745" y2="432" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="845" y1="468" x2="925" y2="468" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1020" y1="496" x2="1020" y2="542" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="935" y1="578" x2="855" y2="578" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="745" y1="496" x2="745" y2="652" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="845" y1="688" x2="925" y2="738" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="645" y1="688" x2="275" y2="688" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

  <text class="small" x="180" y="784" text-anchor="middle">用户看到的不是单个答案，而是完整执行过程</text>
  <text class="small" x="745" y="784" text-anchor="middle">Turn 本质上是一个可取消、可观测、可流式输出的后台任务</text>
</svg>
