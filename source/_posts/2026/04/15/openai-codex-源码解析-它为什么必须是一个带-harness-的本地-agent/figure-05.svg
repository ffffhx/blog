<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box-title { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box-text { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="820" rx="24"/>
  <text class="title" x="600" y="58" text-anchor="middle">Harness 控制链</text>
  <text class="subtitle" x="600" y="92" text-anchor="middle">模型提出动作，真正的执行权要经过审批、策略和沙箱层层过滤</text>

  <rect x="120" y="180" width="180" height="88" rx="20" fill="#ebe5ff" stroke="#b9a7ff" stroke-width="2"/>
  <text class="box-title" x="210" y="224" text-anchor="middle">模型</text>
  <text class="box-text" x="210" y="252" text-anchor="middle">提议 tool call</text>

  <rect x="360" y="160" width="230" height="128" rx="22" fill="#fff4da" stroke="#f1ba4a" stroke-width="2"/>
  <text class="box-title" x="475" y="206" text-anchor="middle">审批判断</text>
  <text class="box-text" x="475" y="238" text-anchor="middle">Skip / Ask / Forbidden</text>
  <text class="small" x="475" y="266" text-anchor="middle">必要时交给用户或 guardian</text>

  <rect x="650" y="160" width="230" height="128" rx="22" fill="#e8f7ea" stroke="#67c27d" stroke-width="2"/>
  <text class="box-title" x="765" y="206" text-anchor="middle">策略判断</text>
  <text class="box-text" x="765" y="238" text-anchor="middle">网络策略 / execpolicy</text>
  <text class="small" x="765" y="266" text-anchor="middle">判断可否执行、是否允许升级</text>

  <rect x="930" y="160" width="150" height="128" rx="22" fill="#fdecec" stroke="#ef8d8d" stroke-width="2"/>
  <text class="box-title" x="1005" y="206" text-anchor="middle">沙箱选择</text>
  <text class="box-text" x="1005" y="238" text-anchor="middle">只读 / 工作区写 / 更高权限</text>

  <line x1="300" y1="224" x2="340" y2="224" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="590" y1="224" x2="630" y2="224" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="880" y1="224" x2="910" y2="224" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="430" y="372" width="340" height="94" rx="22" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text class="box-title" x="600" y="416" text-anchor="middle">第一次尝试执行</text>
  <text class="box-text" x="600" y="448" text-anchor="middle">先在受限环境里跑，再看是否成功</text>

  <line x1="1005" y1="288" x2="1005" y2="340" stroke="#6b7280" stroke-width="4"/>
  <line x1="1005" y1="340" x2="770" y2="340" stroke="#6b7280" stroke-width="4"/>
  <line x1="770" y1="340" x2="770" y2="372" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="160" y="560" width="230" height="112" rx="22" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text class="box-title" x="275" y="604" text-anchor="middle">被拒绝</text>
  <text class="box-text" x="275" y="636" text-anchor="middle">直接停止，返回拒绝原因</text>

  <rect x="485" y="548" width="230" height="136" rx="22" fill="#e0f2fe" stroke="#4ea9dc" stroke-width="2"/>
  <text class="box-title" x="600" y="594" text-anchor="middle">成功</text>
  <text class="box-text" x="600" y="626" text-anchor="middle">输出回填模型</text>
  <text class="small" x="600" y="654" text-anchor="middle">同时记录事件、状态和审计信息</text>

  <rect x="810" y="548" width="230" height="136" rx="22" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="box-title" x="925" y="594" text-anchor="middle">因沙箱失败</text>
  <text class="box-text" x="925" y="626" text-anchor="middle">看策略是否允许更高权限重试</text>
  <text class="small" x="925" y="654" text-anchor="middle">而且不会无条件升级</text>

  <line x1="430" y1="616" x2="390" y2="616" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="466" x2="600" y2="528" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="770" y1="616" x2="790" y2="616" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>

  <text class="small" x="600" y="748" text-anchor="middle">一句话：模型只负责提出动作，真正的权限边界掌握在 runtime 手里</text>
</svg>
