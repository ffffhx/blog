<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box-title { font: 700 25px "PingFang SC", "Microsoft YaHei", sans-serif; }
      .box-text { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="760" rx="24"/>
  <text class="title" x="600" y="76" text-anchor="middle">普通聊天 vs 本地 Agent</text>
  <text class="subtitle" x="600" y="112" text-anchor="middle">关键区别不在“会不会写代码”，而在“是不是进入执行闭环”</text>

  <rect x="90" y="160" width="440" height="460" rx="28" fill="#eef4ff" stroke="#86aefb" stroke-width="2"/>
  <text class="box-title" x="310" y="212" text-anchor="middle" fill="#1d4ed8">普通聊天</text>

  <rect x="140" y="250" width="340" height="72" rx="18" fill="#ffffff" stroke="#bfd4ff" stroke-width="2"/>
  <text class="box-text" x="310" y="295" text-anchor="middle">你手工复制上下文给模型</text>

  <line x1="310" y1="322" x2="310" y2="360" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="140" y="374" width="340" height="72" rx="18" fill="#ffffff" stroke="#bfd4ff" stroke-width="2"/>
  <text class="box-text" x="310" y="419" text-anchor="middle">模型给出建议或示例代码</text>

  <line x1="310" y1="446" x2="310" y2="484" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="140" y="498" width="340" height="72" rx="18" fill="#ffffff" stroke="#bfd4ff" stroke-width="2"/>
  <text class="box-text" x="310" y="543" text-anchor="middle">你自己去执行、验证、修正</text>

  <text class="small" x="310" y="602" text-anchor="middle">错误主要是“答案错了”</text>

  <rect x="670" y="160" width="440" height="460" rx="28" fill="#e9f8ec" stroke="#68c27d" stroke-width="2"/>
  <text class="box-title" x="890" y="212" text-anchor="middle" fill="#15803d">本地 Agent</text>

  <rect x="720" y="232" width="340" height="66" rx="18" fill="#ffffff" stroke="#bbe8c5" stroke-width="2"/>
  <text class="box-text" x="890" y="274" text-anchor="middle">读仓库、读配置、看当前工作区</text>

  <line x1="890" y1="298" x2="890" y2="332" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="720" y="348" width="340" height="66" rx="18" fill="#ffffff" stroke="#bbe8c5" stroke-width="2"/>
  <text class="box-text" x="890" y="390" text-anchor="middle">跑命令、调工具、修改文件</text>

  <line x1="890" y1="414" x2="890" y2="448" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="720" y="464" width="340" height="66" rx="18" fill="#ffffff" stroke="#bbe8c5" stroke-width="2"/>
  <text class="box-text" x="890" y="506" text-anchor="middle">根据结果继续下一步，形成闭环</text>

  <text class="small" x="890" y="602" text-anchor="middle">错误会升级成“执行错误”和“副作用错误”</text>

  <rect x="410" y="650" width="380" height="68" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text class="box-text" x="600" y="692" text-anchor="middle">一旦有副作用，系统设计重心就会从“回答质量”转向“Harness 质量”</text>
</svg>
