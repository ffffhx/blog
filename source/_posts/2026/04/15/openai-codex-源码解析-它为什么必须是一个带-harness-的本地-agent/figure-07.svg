<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box-title { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box-text { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="820" rx="24"/>
  <text class="title" x="600" y="58" text-anchor="middle">长期状态管道：Rollout -> SQLite -> Memory</text>
  <text class="subtitle" x="600" y="92" text-anchor="middle">先记住发生过什么，再整理成状态，最后提炼成未来还能继续用的记忆</text>

  <rect x="90" y="190" width="240" height="110" rx="22" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="box-title" x="210" y="236" text-anchor="middle">Turn / Item</text>
  <text class="box-text" x="210" y="268" text-anchor="middle">用户消息、tool call、输出事件</text>

  <rect x="390" y="190" width="240" height="110" rx="22" fill="#fff4da" stroke="#f1ba4a" stroke-width="2"/>
  <text class="box-title" x="510" y="236" text-anchor="middle">Rollout</text>
  <text class="box-text" x="510" y="268" text-anchor="middle">原始 JSONL 事件流落盘</text>

  <rect x="690" y="190" width="240" height="110" rx="22" fill="#e8f7ea" stroke="#67c27d" stroke-width="2"/>
  <text class="box-title" x="810" y="236" text-anchor="middle">SQLite State</text>
  <text class="box-text" x="810" y="268" text-anchor="middle">线程、日志、作业、元数据索引</text>

  <rect x="960" y="190" width="150" height="110" rx="22" fill="#ebe5ff" stroke="#b9a7ff" stroke-width="2"/>
  <text class="box-title" x="1035" y="236" text-anchor="middle">查询</text>
  <text class="box-text" x="1035" y="268" text-anchor="middle">列表 / 搜索 / 恢复</text>

  <line x1="330" y1="245" x2="370" y2="245" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="630" y1="245" x2="670" y2="245" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="930" y1="245" x2="940" y2="245" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="250" y="430" width="300" height="120" rx="24" fill="#fffdf9" stroke="#d1d5db" stroke-width="2"/>
  <text class="box-title" x="400" y="476" text-anchor="middle">Memory Phase 1</text>
  <text class="box-text" x="400" y="508" text-anchor="middle">从近期 rollout 中抽取</text>
  <text class="box-text" x="400" y="536" text-anchor="middle">raw_memory 和 rollout_summary</text>

  <rect x="650" y="430" width="300" height="120" rx="24" fill="#fffdf9" stroke="#d1d5db" stroke-width="2"/>
  <text class="box-title" x="800" y="476" text-anchor="middle">Memory Phase 2</text>
  <text class="box-text" x="800" y="508" text-anchor="middle">合并高价值 stage-1 outputs</text>
  <text class="box-text" x="800" y="536" text-anchor="middle">刷新本地 memory artifacts</text>

  <line x1="810" y1="300" x2="810" y2="390" stroke="#6b7280" stroke-width="4"/>
  <line x1="810" y1="390" x2="550" y2="390" stroke="#6b7280" stroke-width="4"/>
  <line x1="550" y1="390" x2="550" y2="430" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="550" y1="490" x2="630" y2="490" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="360" y="640" width="480" height="100" rx="24" fill="#fef2f2" stroke="#f3a6a6" stroke-width="2"/>
  <text class="box-title" x="600" y="684" text-anchor="middle">回到下一轮上下文</text>
  <text class="box-text" x="600" y="716" text-anchor="middle">历史不再只是原始日志，而会被压缩成更适合再次注入模型的长期记忆</text>

  <line x1="800" y1="550" x2="800" y2="606" stroke="#6b7280" stroke-width="4"/>
  <line x1="800" y1="606" x2="700" y2="606" stroke="#6b7280" stroke-width="4"/>
  <line x1="700" y1="606" x2="700" y2="640" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
