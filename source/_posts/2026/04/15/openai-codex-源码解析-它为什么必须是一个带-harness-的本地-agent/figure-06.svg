<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box-title { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box-text { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <text class="title" x="600" y="58" text-anchor="middle">为什么扩展系统必须是一等公民</text>
  <text class="subtitle" x="600" y="92" text-anchor="middle">能力可以很多样，但进入模型和 runtime 的方式必须统一</text>

  <circle cx="600" cy="390" r="110" fill="#fff4da" stroke="#f1ba4a" stroke-width="3"/>
  <text class="box-title" x="600" y="378" text-anchor="middle">Codex Core</text>
  <text class="box-text" x="600" y="410" text-anchor="middle">统一注册、统一调度、统一审计</text>

  <rect x="140" y="180" width="250" height="120" rx="24" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="box-title" x="265" y="226" text-anchor="middle">内置 Tools</text>
  <text class="box-text" x="265" y="258" text-anchor="middle">exec_command / apply_patch</text>
  <text class="small" x="265" y="286" text-anchor="middle">直接贴近本地环境</text>

  <rect x="810" y="180" width="250" height="120" rx="24" fill="#ebe5ff" stroke="#b9a7ff" stroke-width="2"/>
  <text class="box-title" x="935" y="226" text-anchor="middle">MCP</text>
  <text class="box-text" x="935" y="258" text-anchor="middle">外部 tool / resource 协议化接入</text>
  <text class="small" x="935" y="286" text-anchor="middle">连接远端系统而不写死进 core</text>

  <rect x="140" y="500" width="250" height="120" rx="24" fill="#e8f7ea" stroke="#67c27d" stroke-width="2"/>
  <text class="box-title" x="265" y="546" text-anchor="middle">Skills</text>
  <text class="box-text" x="265" y="578" text-anchor="middle">经验、流程、约束的结构化注入</text>
  <text class="small" x="265" y="606" text-anchor="middle">让模型更像在按套路干活</text>

  <rect x="810" y="500" width="250" height="120" rx="24" fill="#fdecec" stroke="#ef8d8d" stroke-width="2"/>
  <text class="box-title" x="935" y="546" text-anchor="middle">Plugins / Apps</text>
  <text class="box-text" x="935" y="578" text-anchor="middle">更完整的能力包和连接器</text>
  <text class="small" x="935" y="606" text-anchor="middle">可以同时带 skill、app、MCP server</text>

  <line x1="390" y1="240" x2="500" y2="330" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="810" y1="240" x2="700" y2="330" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="390" y1="560" x2="500" y2="450" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="810" y1="560" x2="700" y2="450" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="360" y="668" width="480" height="54" rx="16" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text class="box-text" x="600" y="702" text-anchor="middle">不是把所有能力都写进 core，而是把“能力接入”本身工程化</text>
</svg>
