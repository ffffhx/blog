<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfbf7; }
      .title { font: 700 32px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box-title { font: 700 22px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box-text { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .note { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760" rx="24"/>
  <text class="title" x="640" y="54" text-anchor="middle">一条消息在 OpenClaw 里的完整路径</text>
  <text class="subtitle" x="640" y="86" text-anchor="middle">重点不只是模型回答，而是消息、队列、事件和回写都走统一流程</text>

  <rect x="70" y="150" width="180" height="120" rx="22" fill="#efe8ff" stroke="#c4b5fd" stroke-width="2"/>
  <text class="box-title" x="160" y="196" text-anchor="middle">用户消息</text>
  <text class="box-text" x="160" y="228" text-anchor="middle">WhatsApp</text>
  <text class="box-text" x="160" y="252" text-anchor="middle">CLI / Web UI</text>

  <rect x="330" y="150" width="210" height="120" rx="22" fill="#fff2d9" stroke="#fbbf24" stroke-width="2"/>
  <text class="box-title" x="435" y="196" text-anchor="middle">Gateway 接入</text>
  <text class="box-text" x="435" y="228" text-anchor="middle">统一协议</text>
  <text class="box-text" x="435" y="252" text-anchor="middle">绑定 session</text>

  <rect x="620" y="150" width="220" height="120" rx="22" fill="#dff4ea" stroke="#34d399" stroke-width="2"/>
  <text class="box-title" x="730" y="196" text-anchor="middle">Session Lane</text>
  <text class="box-text" x="730" y="228" text-anchor="middle">同一会话先排队</text>
  <text class="box-text" x="730" y="252" text-anchor="middle">避免状态打架</text>

  <rect x="920" y="150" width="260" height="120" rx="22" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text class="box-title" x="1050" y="196" text-anchor="middle">Agent Loop</text>
  <text class="box-text" x="1050" y="228" text-anchor="middle">模型推理 + 工具调用</text>
  <text class="box-text" x="1050" y="252" text-anchor="middle">assistant / tool / lifecycle</text>

  <line x1="250" y1="210" x2="330" y2="210" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="540" y1="210" x2="620" y2="210" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="840" y1="210" x2="920" y2="210" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="210" y="410" width="240" height="120" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="box-title" x="330" y="456" text-anchor="middle">插件 / 工具</text>
  <text class="box-text" x="330" y="488" text-anchor="middle">message、browser、canvas</text>

  <rect x="520" y="410" width="240" height="120" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="box-title" x="640" y="456" text-anchor="middle">Provider</text>
  <text class="box-text" x="640" y="488" text-anchor="middle">OpenAI、Anthropic、Google</text>

  <rect x="830" y="410" width="240" height="120" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="box-title" x="950" y="456" text-anchor="middle">渠道回写</text>
  <text class="box-text" x="950" y="488" text-anchor="middle">把结果发回原渠道</text>

  <line x1="1050" y1="270" x2="1050" y2="350" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1050" y1="350" x2="330" y2="350" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1050" y1="350" x2="640" y2="350" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1050" y1="350" x2="950" y2="350" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="330" y1="350" x2="330" y2="410" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="350" x2="640" y2="410" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="950" y1="350" x2="950" y2="410" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <text class="note" x="640" y="620" text-anchor="middle">关键点：同一个 session 先串行，再谈全局并发；系统最终拿到的不只是最终答案，还有完整事件流。</text>
</svg>
