<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .title { font: 700 32px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .box-title { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box-text { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="820" rx="24"/>

  <text class="title" x="600" y="56" text-anchor="middle">OpenClaw 的 4 层结构</text>
  <text class="subtitle" x="600" y="88" text-anchor="middle">它更像一个个人 AI 助手平台，而不是单纯的聊天机器人</text>

  <rect x="180" y="130" width="840" height="110" rx="24" fill="#efe8ff" stroke="#c4b5fd" stroke-width="2"/>
  <text class="box-title" x="600" y="172" text-anchor="middle">入口层</text>
  <text class="box-text" x="600" y="208" text-anchor="middle">聊天渠道、CLI、Web UI、macOS App、iOS / Android Node</text>

  <line x1="600" y1="242" x2="600" y2="290" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="140" y="300" width="920" height="160" rx="24" fill="#fff2d9" stroke="#fbbf24" stroke-width="2"/>
  <text class="box-title" x="600" y="344" text-anchor="middle">Gateway 控制平面</text>
  <text class="box-text" x="600" y="382" text-anchor="middle">统一协议、WebSocket / HTTP、认证、配对、健康检查、状态广播</text>
  <text class="small" x="600" y="414" text-anchor="middle">同一台机器上长期运行的总入口，负责把所有连接和状态收口</text>

  <line x1="600" y1="462" x2="600" y2="510" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="180" y="520" width="840" height="120" rx="24" fill="#dff4ea" stroke="#34d399" stroke-width="2"/>
  <text class="box-title" x="600" y="562" text-anchor="middle">Agent 执行层</text>
  <text class="box-text" x="600" y="598" text-anchor="middle">Session、Lane Queue、Agent Loop、Tool Calling、流式事件</text>

  <line x1="600" y1="642" x2="600" y2="690" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="90" y="700" width="220" height="82" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="box-text" x="200" y="744" text-anchor="middle">模型 Provider</text>

  <rect x="350" y="700" width="220" height="82" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="box-text" x="460" y="744" text-anchor="middle">消息 Channel</text>

  <rect x="610" y="700" width="220" height="82" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="box-text" x="720" y="744" text-anchor="middle">语音 / 图像 / 搜索</text>

  <rect x="870" y="700" width="240" height="82" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="box-text" x="990" y="744" text-anchor="middle">Canvas / Node / 设备能力</text>
</svg>
