<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .m { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>

  <text class="title" x="72" y="92">它不是“工具箱”，而是“执行平台”</text>
  <text class="subtitle" x="72" y="126">真正的区别，不在命令数量，而在它要不要稳定服务脚本和 Agent</text>

  <rect x="100" y="180" width="360" height="360" rx="28" fill="#eef4ff" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="280" y="236" text-anchor="middle">普通 CLI</text>
  <text class="t" x="280" y="290" text-anchor="middle">重点是“人类好不好敲”</text>
  <text class="t" x="280" y="330" text-anchor="middle">输出多半是给人看的文本</text>
  <text class="t" x="280" y="370" text-anchor="middle">出错后通常靠人自己判断下一步</text>
  <text class="t" x="280" y="410" text-anchor="middle">很少关心命令能不能被协议化复用</text>

  <rect x="740" y="180" width="360" height="360" rx="28" fill="#eefbf1" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="920" y="236" text-anchor="middle">Agent 友好型 CLI 平台</text>
  <text class="t" x="920" y="290" text-anchor="middle">重点是“人和程序都好调”</text>
  <text class="t" x="920" y="330" text-anchor="middle">输出要尽量稳定、结构化</text>
  <text class="t" x="920" y="370" text-anchor="middle">错误要方便脚本和 Agent 继续处理</text>
  <text class="t" x="920" y="410" text-anchor="middle">命令树还要能继续桥接到 MCP 和 Skills</text>

  <line x1="480" y1="360" x2="720" y2="360" stroke="#9ca3af" stroke-width="5" marker-end="url(#arrow)"/>
  <text class="h" x="600" y="328" text-anchor="middle">bytedcli</text>
  <text class="m" x="600" y="392" text-anchor="middle">从“方便手敲”走向“方便复用”</text>

  <rect x="160" y="590" width="880" height="90" rx="22" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="t" x="600" y="644" text-anchor="middle">所以看这个仓库时，不要先数它接了多少系统，而要先看它怎么统一命令、认证、输出和 Agent 接入</text>
</svg>
