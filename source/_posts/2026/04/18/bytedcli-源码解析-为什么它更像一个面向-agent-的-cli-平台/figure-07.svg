<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .m { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>
  <text class="title" x="72" y="92">为什么它天然适合 Agent</text>
  <text class="subtitle" x="72" y="126">JSON 不是终点，MCP 和 Skills 也不是附属品，它们是一条连续的复用链</text>

  <rect x="80" y="210" width="180" height="100" rx="20" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="170" y="255" text-anchor="middle">CLI 命令树</text>
  <text class="t" x="170" y="285" text-anchor="middle">人类直接执行</text>

  <rect x="320" y="210" width="180" height="100" rx="20" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="410" y="255" text-anchor="middle">JSON 输出</text>
  <text class="t" x="410" y="285" text-anchor="middle">脚本稳定消费</text>

  <rect x="560" y="210" width="180" height="100" rx="20" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="650" y="255" text-anchor="middle">MCP 桥接</text>
  <text class="t" x="650" y="285" text-anchor="middle">CLI 变成工具</text>

  <rect x="800" y="210" width="180" height="100" rx="20" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="h" x="890" y="255" text-anchor="middle">Skills</text>
  <text class="t" x="890" y="285" text-anchor="middle">告诉 Agent 怎么用</text>

  <rect x="990" y="210" width="120" height="100" rx="20" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="h" x="1050" y="255" text-anchor="middle">Agent</text>
  <text class="t" x="1050" y="285" text-anchor="middle">组合执行</text>

  <line x1="260" y1="260" x2="300" y2="260" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="500" y1="260" x2="540" y2="260" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="740" y1="260" x2="780" y2="260" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="980" y1="260" x2="988" y2="260" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="120" y="430" width="440" height="170" rx="24" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="340" y="484" text-anchor="middle">MCP 里还有两种思路</text>
  <text class="t" x="340" y="522" text-anchor="middle">1. 直接把很多 CLI 命令平铺成工具</text>
  <text class="t" x="340" y="556" text-anchor="middle">2. 提供 run_command / list_commands 这种代理工具</text>
  <text class="m" x="340" y="590" text-anchor="middle">本质上都是在复用同一棵命令树</text>

  <rect x="640" y="430" width="420" height="170" rx="24" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="850" y="484" text-anchor="middle">发布时把 skills 一起带上</text>
  <text class="t" x="850" y="522" text-anchor="middle">说明这个 npm 包不只是“可执行文件”</text>
  <text class="t" x="850" y="556" text-anchor="middle">还是“执行能力 + 工作说明书”的组合</text>
  <text class="m" x="850" y="590" text-anchor="middle">这就是它和普通 CLI 最不一样的地方之一</text>
</svg>
