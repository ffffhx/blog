<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .m { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>
  <text class="title" x="72" y="92">统一底座：配置、HTTP、输出、错误</text>
  <text class="subtitle" x="72" y="126">平台类 CLI 真正稳定，靠的是底层行为一致，而不是每个命令自己重新发明一遍</text>

  <rect x="100" y="190" width="240" height="170" rx="24" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="220" y="242" text-anchor="middle">配置优先级</text>
  <text class="t" x="220" y="284" text-anchor="middle">CLI 参数</text>
  <text class="t" x="220" y="316" text-anchor="middle">↓</text>
  <text class="t" x="220" y="348" text-anchor="middle">环境变量</text>
  <text class="t" x="220" y="380" text-anchor="middle">↓ 默认值</text>

  <rect x="420" y="170" width="360" height="210" rx="24" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="600" y="222" text-anchor="middle">utils/http</text>
  <text class="t" x="600" y="264" text-anchor="middle">proxy / retry / trace / api / http2</text>
  <text class="m" x="600" y="302" text-anchor="middle">把代理、超时、重试、请求打印和调用方式统一收口</text>
  <text class="m" x="600" y="336" text-anchor="middle">避免每个 domain 都自己实现一套 HTTP 行为</text>

  <rect x="860" y="190" width="240" height="170" rx="24" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="980" y="242" text-anchor="middle">统一输出</text>
  <text class="t" x="980" y="284" text-anchor="middle">文本模式给人看</text>
  <text class="t" x="980" y="320" text-anchor="middle">JSON 模式给脚本和 Agent 看</text>
  <text class="t" x="980" y="356" text-anchor="middle">错误也尽量结构化</text>

  <line x1="340" y1="275" x2="400" y2="275" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="780" y1="275" x2="840" y2="275" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="190" y="470" width="820" height="150" rx="24" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="522" text-anchor="middle">一句话概括这层</text>
  <text class="t" x="600" y="562" text-anchor="middle">bytedcli 不是简单包一层 fetch，而是在把“配置、请求、错误、输出”变成一条统一的执行链</text>
  <text class="m" x="600" y="596" text-anchor="middle">这也是它后面能继续接更多系统、更多命令、更多 Agent 用法的基础</text>
</svg>
