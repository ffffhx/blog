<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .m { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>
  <text class="title" x="72" y="92">为什么它还能继续长大</text>
  <text class="subtitle" x="72" y="126">平台类 CLI 迟早会遇到“能力越来越多”，关键在于有没有治理闭环</text>

  <rect x="90" y="250" width="180" height="100" rx="20" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="180" y="295" text-anchor="middle">新增 domain</text>
  <text class="t" x="180" y="325" text-anchor="middle">先按层落点</text>

  <rect x="330" y="250" width="180" height="100" rx="20" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="420" y="295" text-anchor="middle">command / handler</text>
  <text class="t" x="420" y="325" text-anchor="middle">CLI 入口清楚</text>

  <rect x="570" y="250" width="180" height="100" rx="20" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="660" y="295" text-anchor="middle">service / api</text>
  <text class="t" x="660" y="325" text-anchor="middle">流程和请求拆开</text>

  <rect x="810" y="250" width="180" height="100" rx="20" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="h" x="900" y="295" text-anchor="middle">tests / docs / skills</text>
  <text class="t" x="900" y="325" text-anchor="middle">一起补齐</text>

  <line x1="270" y1="300" x2="310" y2="300" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="510" y1="300" x2="550" y2="300" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="750" y1="300" x2="790" y2="300" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="170" y="470" width="860" height="170" rx="24" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="522" text-anchor="middle">真正让它不容易失控的，是治理闭环</text>
  <text class="t" x="600" y="560" text-anchor="middle">分层纪律、文档同步、帮助信息、技能说明、测试验证、发布资产，一起维持同一套对外行为</text>
  <text class="m" x="600" y="596" text-anchor="middle">所以这个仓库最值得学的，不是“又接了一个系统”，而是“接了很多系统以后还没烂掉”</text>
</svg>
