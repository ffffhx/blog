<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf8f4; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .m { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>
  <text class="title" x="72" y="92">认证、多站点和会话恢复</text>
  <text class="subtitle" x="72" y="126">内部 CLI 最难的经常不是命令，而是“我现在到底拿着谁的身份、在什么站点上执行”</text>

  <rect x="90" y="210" width="200" height="100" rx="20" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="190" y="255" text-anchor="middle">--site / 环境变量</text>
  <text class="t" x="190" y="285" text-anchor="middle">先决定站点和 SSO 环境</text>

  <rect x="350" y="210" width="220" height="100" rx="20" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="460" y="255" text-anchor="middle">auth login</text>
  <text class="t" x="460" y="285" text-anchor="middle">二维码 / session / 恢复流程</text>

  <rect x="630" y="210" width="220" height="100" rx="20" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="740" y="255" text-anchor="middle">本地凭据存储</text>
  <text class="t" x="740" y="285" text-anchor="middle">token、session、缓存</text>

  <rect x="910" y="210" width="200" height="100" rx="20" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="h" x="1010" y="255" text-anchor="middle">业务命令复用</text>
  <text class="t" x="1010" y="285" text-anchor="middle">codebase / rds / tcc ...</text>

  <line x1="290" y1="260" x2="330" y2="260" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="260" x2="610" y2="260" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="850" y1="260" x2="890" y2="260" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="160" y="430" width="880" height="170" rx="24" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="482" text-anchor="middle">为什么这一层难</text>
  <text class="t" x="600" y="520" text-anchor="middle">因为它要同时处理多站点、多 SSO、多种 token、浏览器态复用、二维码落盘、非阻塞登录恢复</text>
  <text class="m" x="600" y="556" text-anchor="middle">所以 bytedcli 把认证放成一等公民，而不是每个命令自己偷偷处理一份登录逻辑</text>
</svg>
