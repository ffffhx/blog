<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .boxTitle { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .boxText { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>

  <text class="title" x="72" y="92">先把几个词翻成人话</text>
  <text class="subtitle" x="72" y="126">读 bytedcli 之前，先区分“命令、分层、输出、Agent 接入”分别在管什么</text>

  <rect x="90" y="180" width="210" height="120" rx="22" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="boxTitle" x="195" y="225" text-anchor="middle">CLI / 命令树</text>
  <text class="boxText" x="195" y="258" text-anchor="middle">终端里实际敲出来的入口</text>

  <rect x="340" y="180" width="210" height="120" rx="22" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="boxTitle" x="445" y="225" text-anchor="middle">Handler / Service</text>
  <text class="boxText" x="445" y="258" text-anchor="middle">负责接参数和编排流程</text>

  <rect x="590" y="180" width="210" height="120" rx="22" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="boxTitle" x="695" y="225" text-anchor="middle">API / Auth</text>
  <text class="boxText" x="695" y="258" text-anchor="middle">负责请求、登录和凭据</text>

  <rect x="840" y="180" width="210" height="120" rx="22" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="boxTitle" x="945" y="225" text-anchor="middle">JSON / MCP / Skills</text>
  <text class="boxText" x="945" y="258" text-anchor="middle">负责给脚本和 Agent 消费</text>

  <line x1="300" y1="240" x2="320" y2="240" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="550" y1="240" x2="570" y2="240" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="800" y1="240" x2="820" y2="240" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="160" y="420" width="880" height="170" rx="26" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="boxTitle" x="600" y="478" text-anchor="middle">一句话先记住</text>
  <text class="boxText" x="600" y="518" text-anchor="middle">bytedcli 不只是“把内部系统包成命令”</text>
  <text class="boxText" x="600" y="552" text-anchor="middle">它更像是在做一套能同时服务人类、脚本和 Agent 的执行平台</text>
  <text class="small" x="600" y="586" text-anchor="middle">后面所有设计：分层、认证、JSON、MCP、Skills，都是围着这件事展开的</text>
</svg>
