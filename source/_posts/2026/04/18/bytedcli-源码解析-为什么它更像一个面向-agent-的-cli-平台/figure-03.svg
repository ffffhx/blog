<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf8f4; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>

  <text class="title" x="72" y="92">真正稳定的核心是分层</text>
  <text class="subtitle" x="72" y="126">命令可以一直加，但每一层都只做自己那一层的事</text>

  <rect x="280" y="170" width="640" height="78" rx="18" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="600" y="218" text-anchor="middle">src/bytedcli.ts / src/cli/index.ts</text>
  <text class="t" x="600" y="242" text-anchor="middle">负责启动、全局参数、命令树装配</text>

  <rect x="250" y="275" width="700" height="78" rx="18" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="600" y="323" text-anchor="middle">src/cli/commands/*</text>
  <text class="t" x="600" y="347" text-anchor="middle">只定义命令和参数，不堆业务逻辑</text>

  <rect x="220" y="380" width="760" height="78" rx="18" fill="#fef3e8" stroke="#f4a261" stroke-width="2"/>
  <text class="h" x="600" y="428" text-anchor="middle">src/cli/handlers/*</text>
  <text class="t" x="600" y="452" text-anchor="middle">接参数、调服务、组织文本 / JSON 输出</text>

  <rect x="190" y="485" width="820" height="78" rx="18" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="600" y="533" text-anchor="middle">src/services/*</text>
  <text class="t" x="600" y="557" text-anchor="middle">负责跨 API 编排，把复杂流程从 CLI 层剥出去</text>

  <rect x="160" y="590" width="880" height="78" rx="18" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="h" x="600" y="638" text-anchor="middle">src/api/* + src/auth/* + src/utils/* + src/presenters/*</text>
  <text class="t" x="600" y="662" text-anchor="middle">负责请求、认证、基础设施和展示模板</text>

  <line x1="600" y1="248" x2="600" y2="267" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="353" x2="600" y2="372" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="458" x2="600" y2="477" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="563" x2="600" y2="582" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
