<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>
  <text class="title" x="72" y="92">启动与装配链路</text>
  <text class="subtitle" x="72" y="126">入口很薄，真正重要的是怎么统一建命令树、全局参数和输出模式</text>

  <rect x="90" y="220" width="160" height="90" rx="18" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="170" y="273" text-anchor="middle">用户输入</text>

  <rect x="300" y="220" width="170" height="90" rx="18" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="385" y="258" text-anchor="middle">src/bytedcli.ts</text>
  <text class="t" x="385" y="288" text-anchor="middle">运行时兜底</text>

  <rect x="520" y="220" width="180" height="90" rx="18" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="610" y="258" text-anchor="middle">buildProgram()</text>
  <text class="t" x="610" y="288" text-anchor="middle">建根命令和全局参数</text>

  <rect x="750" y="220" width="170" height="90" rx="18" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="h" x="835" y="258" text-anchor="middle">registerCommands()</text>
  <text class="t" x="835" y="288" text-anchor="middle">按域挂子命令</text>

  <rect x="970" y="220" width="130" height="90" rx="18" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="h" x="1035" y="273" text-anchor="middle">runCli()</text>

  <line x1="250" y1="265" x2="280" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="470" y1="265" x2="500" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="265" x2="730" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="920" y1="265" x2="950" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="150" y="430" width="900" height="170" rx="24" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="484" text-anchor="middle">runCli 里还要做的几件事</text>
  <text class="t" x="600" y="524" text-anchor="middle">先标准化参数，再判断是不是 JSON 模式，再决定帮助信息、错误信息和 commander 输出怎么走</text>
  <text class="t" x="600" y="558" text-anchor="middle">这就是为什么 bytedcli 不只是“把命令挂出来”，而是在管理整个执行过程</text>
</svg>
