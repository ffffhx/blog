<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 26px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>

  <text class="title" x="72" y="92">普通 CLI 和 agent-native CLI 的差别</text>
  <text class="subtitle" x="72" y="126">lark-cli 更像“Agent 可调用的平台接口”，而不只是“给人手敲的命令工具”</text>

  <rect x="100" y="180" width="420" height="420" rx="28" fill="#eef5ff" stroke="#8bb3ff" stroke-width="3"/>
  <text class="h" x="310" y="242" text-anchor="middle">普通 CLI</text>
  <text class="t" x="310" y="300" text-anchor="middle">重点是人类用户体验</text>
  <text class="t" x="310" y="340" text-anchor="middle">命令短不短</text>
  <text class="t" x="310" y="380" text-anchor="middle">帮助信息清不清楚</text>
  <text class="t" x="310" y="420" text-anchor="middle">输出好不好读</text>
  <text class="t" x="310" y="480" text-anchor="middle">典型关系：人发命令，工具执行</text>
  <text class="t" x="310" y="520" text-anchor="middle">机器协作不是主要目标</text>

  <rect x="680" y="180" width="420" height="420" rx="28" fill="#fff1d6" stroke="#f2b84b" stroke-width="3"/>
  <text class="h" x="890" y="242" text-anchor="middle">agent-native CLI</text>
  <text class="t" x="890" y="300" text-anchor="middle">重点是人和 Agent 都能稳定调用</text>
  <text class="t" x="890" y="340" text-anchor="middle">身份要可判断</text>
  <text class="t" x="890" y="380" text-anchor="middle">成功失败要结构化</text>
  <text class="t" x="890" y="420" text-anchor="middle">权限不足时要给下一步 hint</text>
  <text class="t" x="890" y="480" text-anchor="middle">典型关系：Agent 调命令，命令继续驱动工作流</text>
  <text class="t" x="890" y="520" text-anchor="middle">机器协作是一等目标</text>
</svg>
