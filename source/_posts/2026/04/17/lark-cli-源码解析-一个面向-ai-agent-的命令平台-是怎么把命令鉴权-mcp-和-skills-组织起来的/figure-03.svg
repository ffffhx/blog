<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 28px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>
  <text class="title" x="72" y="92">三层命令系统</text>
  <text class="subtitle" x="72" y="126">上层做体验，中层做规模，下层做兜底</text>

  <rect x="220" y="180" width="760" height="120" rx="24" fill="#fff1d6" stroke="#f2b84b" stroke-width="3"/>
  <text class="h" x="600" y="232" text-anchor="middle">Shortcuts</text>
  <text class="t" x="600" y="268" text-anchor="middle">面向高频任务：更像用户语言，带默认值、format、dry-run</text>

  <line x1="600" y1="300" x2="600" y2="340" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="220" y="360" width="760" height="120" rx="24" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="3"/>
  <text class="h" x="600" y="412" text-anchor="middle">API Commands</text>
  <text class="t" x="600" y="448" text-anchor="middle">面向平台 schema：规模化覆盖服务、资源、方法</text>

  <line x1="600" y1="480" x2="600" y2="520" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="220" y="540" width="760" height="120" rx="24" fill="#e8f7ea" stroke="#61c27d" stroke-width="3"/>
  <text class="h" x="600" y="592" text-anchor="middle">Raw API</text>
  <text class="t" x="600" y="628" text-anchor="middle">面向绝对兜底：只要 OpenAPI 在，就有原始调用路径</text>
</svg>
