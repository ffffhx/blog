<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>
  <text class="title" x="72" y="92">为什么它对 AI Agent 特别友好</text>
  <text class="subtitle" x="72" y="126">命令只是入口，真正关键的是“机器能不能稳定消费它的行为”</text>

  <rect x="100" y="200" width="260" height="130" rx="24" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="230" y="252" text-anchor="middle">结构化输出</text>
  <text class="t" x="230" y="286" text-anchor="middle">ok / identity / data / error / hint</text>

  <rect x="470" y="200" width="260" height="130" rx="24" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="600" y="252" text-anchor="middle">MCP</text>
  <text class="t" x="600" y="286" text-anchor="middle">某些能力直接走工具调用而不是 OpenAPI</text>

  <rect x="840" y="200" width="260" height="130" rx="24" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="970" y="252" text-anchor="middle">Skills</text>
  <text class="t" x="970" y="286" text-anchor="middle">告诉 Agent 业务工作流应该怎么走</text>

  <line x1="360" y1="265" x2="450" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="730" y1="265" x2="820" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="220" y="460" width="760" height="150" rx="24" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="512" text-anchor="middle">组合起来之后，Agent 拿到的是一整套可执行表面</text>
  <text class="t" x="600" y="548" text-anchor="middle">命令层给入口，输出层给判断依据，MCP 给能力补充，Skills 给业务做法</text>
  <text class="t" x="600" y="580" text-anchor="middle">这比“只把 API 暴露出去”更接近真实可用的 Agent 平台</text>
</svg>
