<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>
  <text class="title" x="72" y="92">启动与装配链路</text>
  <text class="subtitle" x="72" y="126">入口很薄，重点在把依赖和命令树按顺序装起来</text>

  <rect x="96" y="200" width="150" height="90" rx="18" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="171" y="252" text-anchor="middle">main.go</text>

  <rect x="300" y="200" width="180" height="90" rx="18" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="390" y="238" text-anchor="middle">Bootstrap</text>
  <text class="t" x="390" y="268" text-anchor="middle">先拿 profile 等全局参数</text>

  <rect x="534" y="200" width="180" height="90" rx="18" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="624" y="238" text-anchor="middle">Factory</text>
  <text class="t" x="624" y="268" text-anchor="middle">集中装配置、client、credential</text>

  <rect x="768" y="200" width="180" height="90" rx="18" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="h" x="858" y="238" text-anchor="middle">rootCmd</text>
  <text class="t" x="858" y="268" text-anchor="middle">根命令和固定命令</text>

  <rect x="986" y="200" width="120" height="90" rx="18" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="h" x="1046" y="252" text-anchor="middle">执行</text>

  <line x1="246" y1="245" x2="280" y2="245" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="480" y1="245" x2="514" y2="245" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="714" y1="245" x2="748" y2="245" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="948" y1="245" x2="966" y2="245" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="180" y="430" width="840" height="150" rx="24" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="482" text-anchor="middle">rootCmd 下面继续挂三类东西</text>
  <text class="t" x="600" y="522" text-anchor="middle">固定命令：config / auth / schema / api / update</text>
  <text class="t" x="600" y="554" text-anchor="middle">动态命令：service.RegisterServiceCommands</text>
  <text class="t" x="600" y="586" text-anchor="middle">高频命令：shortcuts.RegisterShortcuts</text>
</svg>
