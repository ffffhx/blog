<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fcfaf6; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 22px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>
  <text class="title" x="72" y="92">Shortcut 的统一执行流水线</text>
  <text class="subtitle" x="72" y="126">业务代码只是最后一步，前面先走完身份、权限、输入和 dry-run</text>

  <rect x="90" y="220" width="130" height="90" rx="18" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="155" y="255" text-anchor="middle">命令输入</text>
  <text class="t" x="155" y="285" text-anchor="middle">+agenda</text>

  <rect x="260" y="220" width="130" height="90" rx="18" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="325" y="255" text-anchor="middle">身份解析</text>
  <text class="t" x="325" y="285" text-anchor="middle">user / bot</text>

  <rect x="430" y="220" width="130" height="90" rx="18" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="495" y="255" text-anchor="middle">scope 检查</text>
  <text class="t" x="495" y="285" text-anchor="middle">本地预拦截</text>

  <rect x="600" y="220" width="130" height="90" rx="18" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="h" x="665" y="255" text-anchor="middle">输入解析</text>
  <text class="t" x="665" y="285" text-anchor="middle">@file / stdin</text>

  <rect x="770" y="220" width="130" height="90" rx="18" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="h" x="835" y="255" text-anchor="middle">dry-run</text>
  <text class="t" x="835" y="285" text-anchor="middle">先看计划</text>

  <rect x="940" y="220" width="170" height="90" rx="18" fill="#eefbf2" stroke="#5fc48a" stroke-width="2"/>
  <text class="h" x="1025" y="255" text-anchor="middle">Execute + Output</text>
  <text class="t" x="1025" y="285" text-anchor="middle">真正执行业务并统一输出</text>

  <line x1="220" y1="265" x2="240" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="390" y1="265" x2="410" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="560" y1="265" x2="580" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="730" y1="265" x2="750" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="900" y1="265" x2="920" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="150" y="440" width="900" height="160" rx="24" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="494" text-anchor="middle">框架层统一吃掉横切逻辑</text>
  <text class="t" x="600" y="530" text-anchor="middle">这样具体业务命令只需要关心“这条命令到底做什么”</text>
  <text class="t" x="600" y="562" text-anchor="middle">而不用每次都重新写身份判断、权限校验、输入解析、格式化输出</text>
</svg>
