<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>
  <text class="title" x="72" y="92">元数据驱动命令的生成过程</text>
  <text class="subtitle" x="72" y="126">内置快照保底，远端数据补新鲜度，最后再展开成命令树</text>

  <rect x="80" y="220" width="200" height="110" rx="20" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="180" y="268" text-anchor="middle">embed 元数据</text>
  <text class="t" x="180" y="302" text-anchor="middle">二进制内自带一份基线</text>

  <rect x="340" y="220" width="200" height="110" rx="20" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="440" y="268" text-anchor="middle">远端更新</text>
  <text class="t" x="440" y="302" text-anchor="middle">可选拉取最新 schema</text>

  <rect x="600" y="220" width="200" height="110" rx="20" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="700" y="268" text-anchor="middle">本地缓存</text>
  <text class="t" x="700" y="302" text-anchor="middle">保留最近一次 overlay 结果</text>

  <rect x="860" y="220" width="260" height="110" rx="20" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="h" x="990" y="258" text-anchor="middle">registerService</text>
  <text class="t" x="990" y="292" text-anchor="middle">展开成 service / resource / method</text>

  <line x1="280" y1="275" x2="320" y2="275" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="540" y1="275" x2="580" y2="275" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="800" y1="275" x2="840" y2="275" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="170" y="460" width="860" height="150" rx="24" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="512" text-anchor="middle">命令展开后，还会自动统一很多配套能力</text>
  <text class="t" x="600" y="548" text-anchor="middle">--params / --data / --file / format / jq / pagination / identity check / schema help</text>
  <text class="t" x="600" y="580" text-anchor="middle">所以它省下来的不只是命令代码，而是整套命令协议的重复开发</text>
</svg>
