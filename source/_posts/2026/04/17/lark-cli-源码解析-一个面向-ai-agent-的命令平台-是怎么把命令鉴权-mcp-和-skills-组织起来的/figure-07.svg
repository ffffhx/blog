<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>
  <text class="title" x="72" y="92">鉴权与身份决策链</text>
  <text class="subtitle" x="72" y="126">这里不只是“拿 token”，而是在决定整条命令到底能不能执行</text>

  <rect x="90" y="210" width="220" height="110" rx="20" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="200" y="258" text-anchor="middle">扩展 Provider</text>
  <text class="t" x="200" y="292" text-anchor="middle">先尝试 env 等外部来源</text>

  <rect x="360" y="210" width="220" height="110" rx="20" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="470" y="258" text-anchor="middle">默认配置来源</text>
  <text class="t" x="470" y="292" text-anchor="middle">扩展没命中时再回退</text>

  <rect x="630" y="210" width="220" height="110" rx="20" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="740" y="248" text-anchor="middle">Identity Hint</text>
  <text class="t" x="740" y="282" text-anchor="middle">推断 default-as / auto-as</text>

  <rect x="900" y="210" width="220" height="110" rx="20" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="h" x="1010" y="258" text-anchor="middle">Strict Mode</text>
  <text class="t" x="1010" y="292" text-anchor="middle">最后决定哪些身份能活下来</text>

  <line x1="310" y1="265" x2="340" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="580" y1="265" x2="610" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="850" y1="265" x2="880" y2="265" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="180" y="450" width="840" height="150" rx="24" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="502" text-anchor="middle">对 Agent 来说，这条链尤其重要</text>
  <text class="t" x="600" y="538" text-anchor="middle">因为 Agent 不只要知道“有没有 token”，还要知道“该用哪种身份”“不够权限时下一步该怎么补”</text>
  <text class="t" x="600" y="570" text-anchor="middle">所以 lark-cli 会把身份、权限和 hint 一起纳入统一执行逻辑</text>
</svg>
