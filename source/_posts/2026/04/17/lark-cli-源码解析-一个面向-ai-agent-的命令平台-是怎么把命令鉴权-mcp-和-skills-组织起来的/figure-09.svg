<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .h { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>
  <text class="title" x="72" y="92">工程化兜底闭环</text>
  <text class="subtitle" x="72" y="126">这不是一次性脚本，而是一套要长期迭代的命令平台</text>

  <rect x="90" y="230" width="180" height="100" rx="20" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="h" x="180" y="272" text-anchor="middle">fetch_meta</text>
  <text class="t" x="180" y="302" text-anchor="middle">先准备元数据</text>

  <rect x="330" y="230" width="180" height="100" rx="20" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="h" x="420" y="272" text-anchor="middle">build</text>
  <text class="t" x="420" y="302" text-anchor="middle">再编译二进制</text>

  <rect x="570" y="230" width="180" height="100" rx="20" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="h" x="660" y="272" text-anchor="middle">unit-test</text>
  <text class="t" x="660" y="302" text-anchor="middle">验证 cmd / internal / shortcuts</text>

  <rect x="810" y="230" width="180" height="100" rx="20" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="h" x="900" y="272" text-anchor="middle">integration-test</text>
  <text class="t" x="900" y="302" text-anchor="middle">从用户视角跑 CLI</text>

  <rect x="990" y="230" width="120" height="100" rx="20" fill="#fdecec" stroke="#ef8e8e" stroke-width="2"/>
  <text class="h" x="1050" y="272" text-anchor="middle">反馈</text>
  <text class="t" x="1050" y="302" text-anchor="middle">继续迭代</text>

  <line x1="270" y1="280" x2="310" y2="280" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="510" y1="280" x2="550" y2="280" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="750" y1="280" x2="790" y2="280" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="990" y1="280" x2="970" y2="280" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="180" y="460" width="840" height="160" rx="24" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="h" x="600" y="514" text-anchor="middle">这套工程规范本身也在服务 Agent 可调用性</text>
  <text class="t" x="600" y="550" text-anchor="middle">dry-run E2E 保证“请求结构”稳定，live E2E 保证“真实集成”不漂</text>
  <text class="t" x="600" y="582" text-anchor="middle">AGENTS.md 则把结构化错误、stdout / stderr 边界和测试要求都写成了贡献规范</text>
</svg>
