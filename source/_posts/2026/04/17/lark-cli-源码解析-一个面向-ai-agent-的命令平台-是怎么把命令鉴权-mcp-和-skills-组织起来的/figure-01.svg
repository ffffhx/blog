<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .frame { fill: #fffdfa; stroke: #ddd6c8; stroke-width: 2; }
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .boxTitle { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .boxText { font: 500 17px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 500 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="760" rx="24"/>
  <rect class="frame" x="40" y="40" width="1120" height="680" rx="20"/>

  <text class="title" x="72" y="92">先把几个词分层</text>
  <text class="subtitle" x="72" y="126">读 lark-cli 之前，先区分“命令、身份、能力、输出、Agent 指南”分别在管什么</text>

  <rect x="90" y="180" width="220" height="120" rx="22" fill="#e8f0fe" stroke="#8bb3ff" stroke-width="2"/>
  <text class="boxTitle" x="200" y="226" text-anchor="middle">Cobra / 命令树</text>
  <text class="boxText" x="200" y="260" text-anchor="middle">负责把命令和参数挂出来</text>

  <rect x="350" y="180" width="220" height="120" rx="22" fill="#fff1d6" stroke="#f2b84b" stroke-width="2"/>
  <text class="boxTitle" x="460" y="226" text-anchor="middle">Credential / 身份</text>
  <text class="boxText" x="460" y="260" text-anchor="middle">决定用 user 还是 bot</text>

  <rect x="610" y="180" width="220" height="120" rx="22" fill="#e8f7ea" stroke="#61c27d" stroke-width="2"/>
  <text class="boxTitle" x="720" y="226" text-anchor="middle">OpenAPI / MCP</text>
  <text class="boxText" x="720" y="260" text-anchor="middle">真正提供外部能力</text>

  <rect x="870" y="180" width="220" height="120" rx="22" fill="#f3e8ff" stroke="#c79cff" stroke-width="2"/>
  <text class="boxTitle" x="980" y="226" text-anchor="middle">Envelope / Hint</text>
  <text class="boxText" x="980" y="260" text-anchor="middle">负责结构化输出和报错</text>

  <line x1="310" y1="240" x2="330" y2="240" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="240" x2="590" y2="240" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="830" y1="240" x2="850" y2="240" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="180" y="420" width="840" height="170" rx="26" fill="#fffdf9" stroke="#d6d3d1" stroke-width="2"/>
  <text class="boxTitle" x="600" y="474" text-anchor="middle">Skills</text>
  <text class="boxText" x="600" y="510" text-anchor="middle">不是新协议，而是给 Agent 的工作说明书</text>
  <text class="boxText" x="600" y="544" text-anchor="middle">它负责告诉 Agent：这个业务域里应该先做什么、后做什么、哪些步骤不能跳</text>
  <text class="small" x="600" y="578" text-anchor="middle">所以看这个仓库时，不要只盯命令本身，还要看“命令怎么被 Agent 消费”</text>

  <line x1="600" y1="300" x2="600" y2="390" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
