<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#334b54"/>
    </marker>
  </defs>
  <rect width="1200" height="760" rx="28" fill="#f7efe2"/>
  <text x="60" y="78" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700" fill="#263f47">论文主线：LLM 负责生成，Agent 架构负责长期一致性</text>
  <text x="60" y="118" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#5d6f73">Smallville 里的角色不是只靠一次 prompt 扮演，而是在环境、记忆、反思和计划之间循环。</text>
  <rect x="80" y="190" width="230" height="150" rx="18" fill="#ffffff" stroke="#334b54" stroke-width="3"/>
  <text x="128" y="250" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#334b54">环境感知</text>
  <text x="112" y="292" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#61747a">看到人、地点、物体状态</text>
  <rect x="370" y="190" width="230" height="150" rx="18" fill="#e8795f" stroke="#334b54" stroke-width="3"/>
  <text x="430" y="250" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#fffaf0">记忆流</text>
  <text x="415" y="292" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#fffaf0">自然语言事件日志</text>
  <rect x="660" y="190" width="230" height="150" rx="18" fill="#f0bd6e" stroke="#334b54" stroke-width="3"/>
  <text x="720" y="250" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#334b54">检索</text>
  <text x="692" y="292" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#334b54">找出当前相关经历</text>
  <rect x="950" y="190" width="170" height="150" rx="18" fill="#6fa3a5" stroke="#334b54" stroke-width="3"/>
  <text x="1000" y="250" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#fffaf0">LLM</text>
  <text x="986" y="292" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#fffaf0">生成推理</text>
  <rect x="225" y="455" width="230" height="150" rx="18" fill="#ffffff" stroke="#334b54" stroke-width="3"/>
  <text x="285" y="515" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#334b54">反思</text>
  <text x="257" y="557" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#61747a">把经历抽象成信念</text>
  <rect x="515" y="455" width="230" height="150" rx="18" fill="#ffffff" stroke="#334b54" stroke-width="3"/>
  <text x="575" y="515" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#334b54">计划</text>
  <text x="547" y="557" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#61747a">从日程拆到小动作</text>
  <rect x="805" y="455" width="230" height="150" rx="18" fill="#ffffff" stroke="#334b54" stroke-width="3"/>
  <text x="865" y="515" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#334b54">行动</text>
  <text x="838" y="557" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#61747a">移动、聊天、改变物体</text>
