<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" rx="28" fill="#f5efe4"/>
  <text x="60" y="78" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700" fill="#263f47">论文评估：完整架构更可信，也能产生涌现社交行为</text>
  <text x="60" y="118" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#5d6f73">受控评估看个体回答可信度，端到端评估看两天小镇生活里的传播、关系和协调。</text>
  <rect x="70" y="175" width="500" height="500" rx="24" fill="#ffffff" stroke="#334b54" stroke-width="3"/>
  <text x="110" y="235" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#334b54">受控评估 TrueSkill 均值</text>
  <line x1="150" y1="600" x2="520" y2="600" stroke="#334b54" stroke-width="3"/>
  <rect x="160" y="292" width="52" height="308" fill="#e8795f"/>
  <rect x="230" y="360" width="52" height="240" fill="#f0bd6e"/>
  <rect x="300" y="392" width="52" height="208" fill="#6fa3a5"/>
  <rect x="370" y="458" width="52" height="142" fill="#b9ccc6"/>
  <rect x="440" y="498" width="52" height="102" fill="#8da0a7"/>
  <text x="145" y="276" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334b54">29.89</text>
  <text x="215" y="344" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334b54">26.88</text>
  <text x="285" y="376" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334b54">25.64</text>
  <text x="355" y="442" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334b54">22.95</text>
  <text x="425" y="482" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334b54">21.21</text>
  <text x="120" y="645" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#5d6f73">完整</text>
  <text x="210" y="645" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#5d6f73">无反思</text>
  <text x="285" y="645" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#5d6f73">无计划</text>
  <text x="365" y="645" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#5d6f73">众包</text>
  <text x="430" y="645" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#5d6f73">无记忆</text>
  <rect x="630" y="175" width="500" height="500" rx="24" fill="#ffffff" stroke="#334b54" stroke-width="3"/>
  <text x="670" y="235" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#334b54">两天小镇模拟结果</text>
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <circle cx="720" cy="325" r="62" fill="#e8795f"/>
    <text x="686" y="318" font-size="26" font-weight="700" fill="#fffaf0">1 → 8</text>
    <text x="664" y="355" font-size="18" fill="#fffaf0">参选消息</text>
    <circle cx="880" cy="325" r="62" fill="#f0bd6e"/>
    <text x="839" y="318" font-size="26" font-weight="700" fill="#334b54">1 → 13</text>
    <text x="832" y="355" font-size="18" fill="#334b54">派对消息</text>
    <circle cx="1040" cy="325" r="62" fill="#6fa3a5"/>
    <text x="1000" y="318" font-size="26" font-weight="700" fill="#fffaf0">0.167</text>
    <text x="1000" y="350" font-size="24" font-weight="700" fill="#fffaf0">→ 0.74</text>
    <text x="1000" y="382" font-size="18" fill="#fffaf0">关系密度</text>
    <rect x="700" y="455" width="360" height="84" rx="16" fill="#334b54"/>
    <text x="738" y="507" font-size="25" font-weight="700" fill="#fffaf0">12 个被邀请角色里 5 个到场</text>
    <text x="725" y="585" font-size="21" fill="#5d6f73">这些行为来自初始化意图后的传播和协调，不是逐个脚本写死。</text>
  </g>
