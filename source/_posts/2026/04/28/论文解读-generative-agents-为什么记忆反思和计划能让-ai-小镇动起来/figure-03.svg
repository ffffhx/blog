<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334b54"/>
    </marker>
  </defs>
  <rect width="1200" height="760" rx="28" fill="#f6efe5"/>
  <text x="60" y="78" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700" fill="#263f47">记忆、反思、计划如何一起生成行为</text>
  <text x="60" y="118" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#5d6f73">检索解决“想起什么”，反思解决“总结出什么”，计划解决“接下来怎么持续做”。</text>
  <rect x="70" y="185" width="270" height="430" rx="22" fill="#ffffff" stroke="#334b54" stroke-width="3"/>
  <text x="118" y="240" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#334b54">记忆流</text>
  <rect x="110" y="285" width="190" height="46" rx="8" fill="#e8795f"/>
  <rect x="110" y="348" width="190" height="46" rx="8" fill="#f0bd6e"/>
  <rect x="110" y="411" width="190" height="46" rx="8" fill="#6fa3a5"/>
  <rect x="110" y="474" width="190" height="46" rx="8" fill="#d9e6df"/>
  <text x="130" y="315" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#fffaf0">观察：遇到 Maria</text>
  <text x="130" y="378" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#334b54">观察：讨论派对</text>
  <text x="130" y="441" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#fffaf0">计划：下午装饰</text>
  <text x="130" y="504" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#334b54">反思：关系更近</text>
  <rect x="445" y="185" width="270" height="150" rx="22" fill="#ffffff" stroke="#334b54" stroke-width="3"/>
  <text x="505" y="240" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#334b54">检索</text>
  <text x="485" y="284" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#5d6f73">近期性 + 重要性 + 相关性</text>
  <rect x="445" y="385" width="270" height="150" rx="22" fill="#ffffff" stroke="#334b54" stroke-width="3"/>
  <text x="505" y="440" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#334b54">反思</text>
  <text x="485" y="484" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#5d6f73">把碎片事件压缩成信念</text>
  <rect x="840" y="185" width="270" height="150" rx="22" fill="#ffffff" stroke="#334b54" stroke-width="3"/>
  <text x="900" y="240" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#334b54">计划</text>
  <text x="880" y="284" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#5d6f73">一天大纲到 5-15 分钟动作</text>
  <rect x="840" y="385" width="270" height="150" rx="22" fill="#ffffff" stroke="#334b54" stroke-width="3"/>
  <text x="900" y="440" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700" fill="#334b54">反应</text>
  <text x="880" y="484" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#5d6f73">环境突变时重规划</text>
  <rect x="445" y="585" width="665" height="78" rx="18" fill="#334b54"/>
  <text x="488" y="634" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#fffaf0">输出：移动、对话、改变对象状态，并写回新的记忆</text>
