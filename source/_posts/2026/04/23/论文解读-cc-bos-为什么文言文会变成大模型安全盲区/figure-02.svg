<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#F4EFE7"/>
  <rect x="36" y="36" width="1128" height="688" rx="28" fill="#FFF9F1" stroke="#D8C8AF" stroke-width="2"/>
  <text x="72" y="96" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">CC-BOS 的高层流程</text>
  <text x="72" y="132" fill="#6D6258" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="17">下面是便于理解的抽象流程图，只保留论文方法的骨架，不展示任何可直接复现的攻击样例。</text>

  <rect x="74" y="208" width="190" height="126" rx="24" fill="#FDF0DF" stroke="#D8AE72" stroke-width="2"/>
  <text x="116" y="256" fill="#7B4D18" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">步骤 1</text>
  <text x="108" y="294" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">待评估的</text>
  <text x="96" y="322" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">高风险请求</text>

  <rect x="314" y="208" width="244" height="126" rx="24" fill="#EAF4EE" stroke="#7FA88B" stroke-width="2"/>
  <text x="356" y="256" fill="#28523A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">步骤 2</text>
  <text x="354" y="294" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">文言文策略空间</text>
  <text x="354" y="322" fill="#5D6B63" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">人设、语境、风格、隐喻包装等</text>

  <rect x="608" y="208" width="208" height="126" rx="24" fill="#E6EEF9" stroke="#7A99C4" stroke-width="2"/>
  <text x="656" y="256" fill="#2F4B7C" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">步骤 3</text>
  <text x="648" y="294" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">生成候选</text>
  <text x="650" y="322" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">提示方案</text>

  <rect x="866" y="208" width="244" height="126" rx="24" fill="#FBEAEA" stroke="#C88E8E" stroke-width="2"/>
  <text x="914" y="256" fill="#7A3030" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">步骤 4</text>
  <text x="932" y="294" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">黑盒目标模型</text>
  <text x="912" y="322" fill="#6D6258" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">只通过 API 或对话接口交互</text>

  <path d="M264 271H304" stroke="#9D8668" stroke-width="4" stroke-linecap="round"/>
  <path d="M294 259L312 271L294 283" stroke="#9D8668" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M558 271H598" stroke="#9D8668" stroke-width="4" stroke-linecap="round"/>
  <path d="M588 259L606 271L588 283" stroke="#9D8668" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M816 271H856" stroke="#9D8668" stroke-width="4" stroke-linecap="round"/>
  <path d="M846 259L864 271L846 283" stroke="#9D8668" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="168" y="454" width="250" height="130" rx="24" fill="#FFF4E7" stroke="#D8AE72" stroke-width="2"/>
  <text x="214" y="502" fill="#7B4D18" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">步骤 5</text>
  <text x="210" y="540" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">输出归一化翻译</text>
  <text x="208" y="568" fill="#6D6258" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">减少文言文表层形式对评测的干扰</text>

  <rect x="486" y="454" width="250" height="130" rx="24" fill="#EFF8F2" stroke="#7FA88B" stroke-width="2"/>
  <text x="532" y="502" fill="#28523A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">步骤 6</text>
  <text x="548" y="540" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">评估打分</text>
  <text x="524" y="568" fill="#6D6258" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">看是否更接近作者定义的成功</text>

  <rect x="804" y="454" width="306" height="130" rx="24" fill="#EEF4FF" stroke="#7A99C4" stroke-width="2"/>
  <text x="850" y="502" fill="#2F4B7C" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">步骤 7</text>
  <text x="848" y="540" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">继续优化下一轮</text>
  <text x="842" y="568" fill="#5D6B63" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">局部试探 / 向最好解靠近 / 大跳变</text>

  <path d="M988 334V402H293V444" stroke="#9D8668" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M281 434L293 452L305 434" stroke="#9D8668" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M418 519H476" stroke="#9D8668" stroke-width="4" stroke-linecap="round"/>
  <path d="M466 507L484 519L466 531" stroke="#9D8668" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M736 519H794" stroke="#9D8668" stroke-width="4" stroke-linecap="round"/>
  <path d="M784 507L802 519L784 531" stroke="#9D8668" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M804 610H514C478 610 450 638 450 674V674" stroke="#5E7DA7" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>
  <path d="M438 664L450 682L462 664" stroke="#5E7DA7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M450 682V666" stroke="#5E7DA7" stroke-width="4" stroke-linecap="round"/>
  <text x="378" y="708" fill="#2F4B7C" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19">得分越高，越倾向回到策略空间继续搜索更好的组合</text>
</svg>
