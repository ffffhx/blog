<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#F7F1E8"/>
  <rect x="36" y="36" width="1128" height="688" rx="28" fill="#FFF9F1" stroke="#D8C8AF" stroke-width="2"/>
  <text x="72" y="96" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">论文的核心假设：为什么文言文可能变成安全盲区</text>
  <text x="72" y="132" fill="#6D6258" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="17">这张图讲的是论文的主张，不代表所有模型和所有线上系统都会必然如此。</text>

  <rect x="72" y="178" width="286" height="424" rx="24" fill="#FDF0DF" stroke="#D8AE72" stroke-width="2"/>
  <text x="110" y="228" fill="#7B4D18" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">文言文输入特征</text>
  <rect x="104" y="258" width="222" height="60" rx="16" fill="#FFF9F1"/>
  <text x="136" y="296" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">语义压缩，字数更短</text>
  <rect x="104" y="336" width="222" height="60" rx="16" fill="#FFF9F1"/>
  <text x="136" y="374" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">多义、省略、倒装常见</text>
  <rect x="104" y="414" width="222" height="60" rx="16" fill="#FFF9F1"/>
  <text x="136" y="452" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">典故、借代、隐喻更多</text>
  <rect x="104" y="492" width="222" height="78" rx="16" fill="#FFF9F1"/>
  <text x="136" y="530" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">和现代中文、英文的</text>
  <text x="136" y="558" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">常见分布差得更远</text>

  <rect x="456" y="178" width="286" height="424" rx="24" fill="#EAF4EE" stroke="#7FA88B" stroke-width="2"/>
  <text x="505" y="228" fill="#28523A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">现代护栏常见做法</text>
  <rect x="488" y="258" width="222" height="78" rx="16" fill="#F8FCF9"/>
  <text x="520" y="296" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">关键词、模板、</text>
  <text x="520" y="324" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">常见拒答模式识别</text>
  <rect x="488" y="354" width="222" height="78" rx="16" fill="#F8FCF9"/>
  <text x="520" y="392" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">更熟悉现代表达的</text>
  <text x="520" y="420" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">语料和对齐方式</text>
  <rect x="488" y="450" width="222" height="96" rx="16" fill="#F8FCF9"/>
  <text x="520" y="488" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">如果只盯表层词汇，</text>
  <text x="520" y="516" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">就可能看不清</text>
  <text x="520" y="544" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">真正的危险意图</text>

  <rect x="840" y="178" width="286" height="424" rx="24" fill="#FBEAEA" stroke="#C88E8E" stroke-width="2"/>
  <text x="902" y="228" fill="#7A3030" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">论文声称的结果</text>
  <rect x="872" y="258" width="222" height="78" rx="16" fill="#FFF7F7"/>
  <text x="904" y="296" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">主体模型可能</text>
  <text x="904" y="324" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">已经理解隐含意思</text>
  <rect x="872" y="354" width="222" height="78" rx="16" fill="#FFF7F7"/>
  <text x="904" y="392" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">但外层安全检查</text>
  <text x="904" y="420" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">识别不够稳定</text>
  <rect x="872" y="450" width="222" height="96" rx="16" fill="#FFF7F7"/>
  <text x="904" y="488" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">于是语言风格本身</text>
  <text x="904" y="516" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">就可能成为</text>
  <text x="904" y="544" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">越狱突破口之一</text>

  <path d="M358 390H432" stroke="#9D8668" stroke-width="4" stroke-linecap="round"/>
  <path d="M421 378L440 390L421 402" stroke="#9D8668" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M742 390H816" stroke="#9D8668" stroke-width="4" stroke-linecap="round"/>
  <path d="M805 378L824 390L805 402" stroke="#9D8668" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="72" y="634" width="1054" height="54" rx="16" fill="#2E2A26"/>
  <text x="102" y="668" fill="#F7F1E8" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">真正值得工程团队警惕的，不是“古文很神秘”，而是“你的护栏是不是只熟悉现代、直接、显式的表达方式”。</text>
</svg>
