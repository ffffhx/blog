<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#F6F0E8"/>
  <rect x="36" y="36" width="1128" height="688" rx="28" fill="#FFF9F1" stroke="#D8C8AF" stroke-width="2"/>
  <text x="72" y="96" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">怎么读这篇论文的实验结论</text>
  <text x="72" y="132" fill="#6D6258" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="17">看数字时要同时看评测设定、是否加防御、是否能迁移，以及这些结果离真实生产环境还有多远。</text>

  <rect x="72" y="188" width="248" height="214" rx="24" fill="#FDF0DF" stroke="#D8AE72" stroke-width="2"/>
  <text x="110" y="238" fill="#7B4D18" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">1. 主评测效果很强</text>
  <text x="104" y="284" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">AdvBench 上</text>
  <text x="104" y="314" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">六个目标模型</text>
  <text x="104" y="344" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">论文都报告了</text>
  <text x="104" y="378" fill="#7B4D18" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="700">100% ASR</text>

  <rect x="340" y="188" width="248" height="214" rx="24" fill="#EAF4EE" stroke="#7FA88B" stroke-width="2"/>
  <text x="378" y="238" fill="#28523A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">2. 查询成本也很低</text>
  <text x="372" y="284" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">平均查询数大约</text>
  <text x="392" y="324" fill="#28523A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">1.12 - 2.38</text>
  <text x="372" y="362" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">说明不是靠海量试错</text>

  <rect x="608" y="188" width="248" height="214" rx="24" fill="#E6EEF9" stroke="#7A99C4" stroke-width="2"/>
  <text x="646" y="238" fill="#2F4B7C" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">3. 加防御会下降</text>
  <text x="640" y="284" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">输入 + 输出双防御下</text>
  <text x="658" y="324" fill="#2F4B7C" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">22% - 40%</text>
  <text x="640" y="362" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">说明护栏有作用，但不够</text>

  <rect x="876" y="188" width="248" height="214" rx="24" fill="#FBEAEA" stroke="#C88E8E" stroke-width="2"/>
  <text x="914" y="238" fill="#7A3030" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">4. 还能跨模型迁移</text>
  <text x="908" y="284" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">论文给出的交叉迁移</text>
  <text x="938" y="324" fill="#7A3030" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">76% - 96%</text>
  <text x="908" y="362" fill="#2E2A26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">说明不是只对单模型有效</text>

  <rect x="72" y="454" width="1052" height="196" rx="24" fill="#2E2A26"/>
  <text x="112" y="514" fill="#FFF9F1" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">读这类安全论文时，最重要的不是只盯着“100%”</text>
  <text x="112" y="560" fill="#F2E7D8" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">还要同时问：这些结果是在什么数据集、什么 judge、什么模型版本、什么防御配置下得到的。</text>
  <text x="112" y="598" fill="#F2E7D8" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">高结果值得警惕，但它首先证明的是“这个方向危险”，不自动等于“所有现实系统都一样脆弱”。</text>
</svg>
