<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="28" fill="#F7F1E6"/>
  <rect x="40" y="40" width="1120" height="680" rx="24" fill="#FFF9F0" stroke="#D9CBB4" stroke-width="2"/>

  <text x="80" y="104" fill="#3D3427" font-size="34" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700">
    Agent Harness 不是“模型外面再套个壳”这么简单
  </text>
  <text x="80" y="144" fill="#746552" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    它更像一座工坊：把目标、上下文、工具、权限、记忆、验证和恢复组织成一条可控执行链
  </text>

  <rect x="80" y="230" width="180" height="110" rx="20" fill="#F2E2BF" stroke="#C89A3D" stroke-width="2"/>
  <text x="170" y="278" text-anchor="middle" fill="#5E430B" font-size="28" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700">
    用户目标
  </text>
  <text x="170" y="312" text-anchor="middle" fill="#7B6334" font-size="17" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    “帮我把事做完”
  </text>

  <rect x="310" y="170" width="610" height="420" rx="28" fill="#FFF4DE" stroke="#D9A84F" stroke-width="3"/>
  <text x="615" y="212" text-anchor="middle" fill="#7A5411" font-size="30" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700">
    Harness / 工坊
  </text>
  <text x="615" y="242" text-anchor="middle" fill="#8E7040" font-size="17" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    负责让模型“安全地碰世界”
  </text>

  <rect x="360" y="280" width="220" height="92" rx="18" fill="#DDEDE2" stroke="#6E9A7D" stroke-width="2"/>
  <text x="470" y="319" text-anchor="middle" fill="#254A31" font-size="24" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700">
    上下文整理
  </text>
  <text x="470" y="347" text-anchor="middle" fill="#4B6A55" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    目标 / 规则 / 记忆 / 相关资料
  </text>

  <rect x="650" y="280" width="220" height="92" rx="18" fill="#E7E2F6" stroke="#7D72B8" stroke-width="2"/>
  <text x="760" y="319" text-anchor="middle" fill="#43377D" font-size="24" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700">
    工具与权限
  </text>
  <text x="760" y="347" text-anchor="middle" fill="#62589A" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    允许什么 / 谁来批准 / 如何隔离
  </text>

  <rect x="510" y="390" width="210" height="104" rx="20" fill="#E9F3FA" stroke="#5E97B7" stroke-width="2.5"/>
  <text x="615" y="430" text-anchor="middle" fill="#1F5472" font-size="27" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700">
    模型
  </text>
  <text x="615" y="460" text-anchor="middle" fill="#437089" font-size="17" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    负责判断、规划、选择下一步
  </text>

  <rect x="360" y="520" width="220" height="44" rx="14" fill="#F8E3E0" stroke="#C47C71" stroke-width="2"/>
  <text x="470" y="548" text-anchor="middle" fill="#7B3E35" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="600">
    日志 / 记忆 / 摘要
  </text>

  <rect x="650" y="520" width="220" height="44" rx="14" fill="#FBEED7" stroke="#C7984A" stroke-width="2"/>
  <text x="760" y="548" text-anchor="middle" fill="#7D5713" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="600">
    测试 / 校验 / 恢复
  </text>

  <rect x="960" y="230" width="160" height="300" rx="22" fill="#F0F5F9" stroke="#8BA4B7" stroke-width="2"/>
  <text x="1040" y="272" text-anchor="middle" fill="#365267" font-size="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700">
    真实环境
  </text>
  <text x="1040" y="320" text-anchor="middle" fill="#5A7385" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    文件系统
  </text>
  <text x="1040" y="356" text-anchor="middle" fill="#5A7385" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    终端 / API
  </text>
  <text x="1040" y="392" text-anchor="middle" fill="#5A7385" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    浏览器 / 数据
  </text>
  <text x="1040" y="428" text-anchor="middle" fill="#5A7385" font-size="18" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    外部服务
  </text>
  <text x="1040" y="474" text-anchor="middle" fill="#7B8D99" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    模型不能直接裸碰
  </text>

  <path d="M260 285H310" stroke="#B17B1D" stroke-width="4" stroke-linecap="round"/>
  <path d="M298 274L310 285L298 296" stroke="#B17B1D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M720 442C805 442 865 442 920 442C946 442 960 426 960 400" stroke="#5E97B7" stroke-width="4" stroke-linecap="round"/>
  <path d="M949 411L960 400L971 411" stroke="#5E97B7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M960 360C900 360 850 360 870 360" stroke="#8BA4B7" stroke-width="4" stroke-dasharray="10 10" stroke-linecap="round"/>
  <path d="M882 349L870 360L882 371" stroke="#8BA4B7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M580 430H510C472 430 470 395 470 372" stroke="#6E9A7D" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M470 384L460 372L480 372" stroke="#6E9A7D" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M650 430H760C760 408 760 392 760 372" stroke="#7D72B8" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M750 384L760 372L770 384" stroke="#7D72B8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M565 494C540 506 510 514 470 520" stroke="#C47C71" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M477 507L470 520L485 525" stroke="#C47C71" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M665 494C690 506 720 514 760 520" stroke="#C7984A" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M745 525L760 520L753 507" stroke="#C7984A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="92" y="628" width="1016" height="58" rx="18" fill="#F1E6D3" stroke="#D4B992" stroke-width="1.8"/>
  <text x="600" y="665" text-anchor="middle" fill="#5B4930" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="600">
    模型负责“想下一步”，Harness 负责“让下一步可执行、可约束、可观察、可恢复”
  </text>
</svg>
