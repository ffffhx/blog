<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" rx="24" fill="#F7F4ED"/>
  <rect x="40" y="40" width="1120" height="620" rx="20" fill="#FFFDF9" stroke="#D8D2C6" stroke-width="2"/>

  <text x="72" y="96" fill="#1F2937" font-size="34" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif" font-weight="700">
    Hermes 一条请求的主链路
  </text>
  <text x="72" y="132" fill="#6B7280" font-size="18" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    重点不是某个单独工具，而是“接入 -> 上下文 -> 推理 -> 工具 -> 持久化”这条流水线。
  </text>

  <rect x="74" y="196" width="150" height="104" rx="16" fill="#E8F0FE" stroke="#7AA2F7" stroke-width="2"/>
  <text x="112" y="238" fill="#1E3A8A" font-size="28" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif" font-weight="700">
    用户消息
  </text>
  <text x="102" y="270" fill="#1E3A8A" font-size="16" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    CLI / Telegram / Slack
  </text>

  <rect x="274" y="196" width="180" height="104" rx="16" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="320" y="238" fill="#92400E" font-size="28" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif" font-weight="700">
    接入层
  </text>
  <text x="304" y="270" fill="#92400E" font-size="16" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    main.py / gateway
  </text>

  <rect x="502" y="174" width="270" height="148" rx="16" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="556" y="222" fill="#166534" font-size="28" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif" font-weight="700">
    上下文拼装
  </text>
  <text x="532" y="256" fill="#166534" font-size="18" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    system prompt
  </text>
  <text x="532" y="284" fill="#166534" font-size="18" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    memory / session / skills
  </text>

  <rect x="820" y="174" width="196" height="148" rx="16" fill="#F3E8FF" stroke="#9333EA" stroke-width="2"/>
  <text x="854" y="222" fill="#6B21A8" font-size="28" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif" font-weight="700">
    LLM 推理
  </text>
  <text x="852" y="256" fill="#6B21A8" font-size="18" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    多轮 tool calling
  </text>
  <text x="866" y="284" fill="#6B21A8" font-size="18" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    HermesAgentLoop
  </text>

  <rect x="810" y="418" width="228" height="126" rx="16" fill="#FDECEC" stroke="#DC2626" stroke-width="2"/>
  <text x="868" y="462" fill="#991B1B" font-size="28" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif" font-weight="700">
    工具执行
  </text>
  <text x="844" y="496" fill="#991B1B" font-size="18" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    文件 / 终端 / Web / 子代理
  </text>
  <text x="868" y="524" fill="#991B1B" font-size="18" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    memory / skill
  </text>

  <rect x="214" y="418" width="334" height="126" rx="16" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
  <text x="274" y="462" fill="#075985" font-size="28" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif" font-weight="700">
