  </text>
  <text x="246" y="496" fill="#075985" font-size="18" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    会话记录 / FTS5 搜索 / MEMORY.md
  </text>
  <text x="264" y="524" fill="#075985" font-size="18" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    USER.md / Skill / Cron 任务
  </text>

  <path d="M224 248H256" stroke="#4B5563" stroke-width="4" stroke-linecap="round"/>
  <path d="M250 239L272 248L250 257" fill="#4B5563"/>

  <path d="M454 248H486" stroke="#4B5563" stroke-width="4" stroke-linecap="round"/>
  <path d="M480 239L502 248L480 257" fill="#4B5563"/>

  <path d="M772 248H804" stroke="#4B5563" stroke-width="4" stroke-linecap="round"/>
  <path d="M798 239L820 248L798 257" fill="#4B5563"/>

  <path d="M920 322V398" stroke="#DC2626" stroke-width="4" stroke-linecap="round"/>
  <path d="M911 392L920 410L929 392" fill="#DC2626"/>

  <path d="M808 480H564" stroke="#DC2626" stroke-width="4" stroke-linecap="round"/>
  <path d="M570 471L548 480L570 489" fill="#DC2626"/>
  <text x="630" y="466" fill="#991B1B" font-size="18" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    工具结果回填
  </text>

  <path d="M382 418V332" stroke="#0284C7" stroke-width="4" stroke-linecap="round"/>
  <path d="M373 338L382 320L391 338" fill="#0284C7"/>
  <text x="178" y="364" fill="#075985" font-size="18" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    下次请求时可再次召回
  </text>

  <text x="72" y="610" fill="#6B7280" font-size="18" font-family="PingFang SC, Microsoft YaHei, Inter, Arial, sans-serif">
    关键判断：Hermes 的核心不是“有多少工具”，而是这条链路如何让结果在本次有效、对下次也有效。
  </text>
</svg>
