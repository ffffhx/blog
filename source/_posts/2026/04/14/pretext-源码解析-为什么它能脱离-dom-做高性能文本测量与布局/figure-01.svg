<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="560" rx="24" fill="#F7F4ED"/>
  <rect x="40" y="44" width="1120" height="472" rx="20" fill="#FFFDF9" stroke="#D8D2C6" stroke-width="2"/>

  <text x="72" y="98" fill="#1F2937" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="700">
    Why a geometry read can force layout
  </text>
  <text x="72" y="132" fill="#6B7280" font-size="18" font-family="Inter, Arial, sans-serif">
    Browser would prefer to defer style/layout, but getBoundingClientRect() needs exact numbers now.
  </text>

  <rect x="76" y="184" width="230" height="112" rx="16" fill="#E8F0FE" stroke="#7AA2F7" stroke-width="2"/>
  <text x="104" y="228" fill="#1E3A8A" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">
    JS writes
  </text>
  <text x="104" y="262" fill="#1E3A8A" font-size="18" font-family="Inter, Arial, sans-serif">
    style / class / text / DOM
  </text>

  <rect x="354" y="184" width="260" height="112" rx="16" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="382" y="228" fill="#92400E" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">
    Marked dirty
  </text>
  <text x="382" y="262" fill="#92400E" font-size="18" font-family="Inter, Arial, sans-serif">
    style/layout may be stale
  </text>

  <rect x="666" y="184" width="244" height="112" rx="16" fill="#E8F5E9" stroke="#43A047" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="694" y="228" fill="#166534" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">
    Normal case
  </text>
  <text x="694" y="262" fill="#166534" font-size="18" font-family="Inter, Arial, sans-serif">
    defer until render phase
  </text>

  <rect x="666" y="340" width="244" height="112" rx="16" fill="#FDECEC" stroke="#DC2626" stroke-width="2"/>
  <text x="694" y="384" fill="#991B1B" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">
    Geometry read
  </text>
  <text x="694" y="418" fill="#991B1B" font-size="18" font-family="Inter, Arial, sans-serif">
    getBoundingClientRect()
  </text>

  <rect x="956" y="184" width="160" height="112" rx="16" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="986" y="228" fill="#065F46" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">
    Render
  </text>
  <text x="986" y="262" fill="#065F46" font-size="18" font-family="Inter, Arial, sans-serif">
    later
  </text>

  <rect x="956" y="340" width="176" height="112" rx="16" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="984" y="384" fill="#991B1B" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">
    Sync flush
  </text>
  <text x="984" y="418" fill="#991B1B" font-size="18" font-family="Inter, Arial, sans-serif">
    style + layout now
  </text>

  <path d="M306 240H338" stroke="#4B5563" stroke-width="4" stroke-linecap="round"/>
  <path d="M332 231L354 240L332 249" fill="#4B5563"/>

  <path d="M614 240H648" stroke="#4B5563" stroke-width="4" stroke-linecap="round"/>
  <path d="M642 231L664 240L642 249" fill="#4B5563"/>

  <path d="M910 240H938" stroke="#4B5563" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8"/>
  <path d="M932 231L954 240L932 249" fill="#4B5563"/>

  <path d="M788 300V328" stroke="#DC2626" stroke-width="4" stroke-linecap="round"/>
  <path d="M779 322L788 340L797 322" fill="#DC2626"/>

  <path d="M910 396H938" stroke="#DC2626" stroke-width="4" stroke-linecap="round"/>
  <path d="M932 387L954 396L932 405" fill="#DC2626"/>

  <text x="74" y="492" fill="#6B7280" font-size="18" font-family="Inter, Arial, sans-serif">
    Key idea: the API is synchronous. If layout is stale, the browser must compute it before returning the rectangle.
  </text>
</svg>
