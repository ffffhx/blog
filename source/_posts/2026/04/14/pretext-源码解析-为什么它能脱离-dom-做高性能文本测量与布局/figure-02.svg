<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="620" rx="24" fill="#F6F7FB"/>
  <rect x="40" y="40" width="1120" height="540" rx="20" fill="#FFFFFF" stroke="#D8DCE7" stroke-width="2"/>

  <text x="72" y="94" fill="#111827" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="700">
    Interleaved writes and reads vs batched access
  </text>
  <text x="72" y="128" fill="#6B7280" font-size="18" font-family="Inter, Arial, sans-serif">
    Left side can trigger repeated forced layout. Right side gives the browser a chance to batch work.
  </text>

  <rect x="72" y="164" width="494" height="368" rx="18" fill="#FFF7F7" stroke="#F0B6B6" stroke-width="2"/>
  <rect x="634" y="164" width="494" height="368" rx="18" fill="#F7FBF8" stroke="#B7DEC1" stroke-width="2"/>

  <text x="102" y="210" fill="#991B1B" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">
    Bad: read after every write
  </text>
  <text x="664" y="210" fill="#166534" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">
    Better: batch writes, then reads
  </text>

  <rect x="104" y="252" width="130" height="58" rx="12" fill="#DBEAFE"/>
  <rect x="252" y="252" width="130" height="58" rx="12" fill="#FEE2E2"/>
  <rect x="400" y="252" width="130" height="58" rx="12" fill="#FECACA"/>
  <text x="137" y="288" fill="#1E3A8A" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Write A</text>
  <text x="283" y="288" fill="#991B1B" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Read A</text>
  <text x="431" y="288" fill="#991B1B" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Layout</text>

  <rect x="104" y="336" width="130" height="58" rx="12" fill="#DBEAFE"/>
  <rect x="252" y="336" width="130" height="58" rx="12" fill="#FEE2E2"/>
  <rect x="400" y="336" width="130" height="58" rx="12" fill="#FECACA"/>
  <text x="137" y="372" fill="#1E3A8A" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Write B</text>
  <text x="283" y="372" fill="#991B1B" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Read B</text>
  <text x="431" y="372" fill="#991B1B" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Layout</text>

  <rect x="104" y="420" width="130" height="58" rx="12" fill="#DBEAFE"/>
  <rect x="252" y="420" width="130" height="58" rx="12" fill="#FEE2E2"/>
  <rect x="400" y="420" width="130" height="58" rx="12" fill="#FECACA"/>
  <text x="137" y="456" fill="#1E3A8A" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Write C</text>
  <text x="283" y="456" fill="#991B1B" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Read C</text>
  <text x="431" y="456" fill="#991B1B" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Layout</text>

  <rect x="666" y="252" width="130" height="58" rx="12" fill="#DBEAFE"/>
  <rect x="814" y="252" width="130" height="58" rx="12" fill="#DBEAFE"/>
  <rect x="962" y="252" width="130" height="58" rx="12" fill="#DBEAFE"/>
  <text x="699" y="288" fill="#1E3A8A" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Write A</text>
  <text x="847" y="288" fill="#1E3A8A" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Write B</text>
  <text x="995" y="288" fill="#1E3A8A" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Write C</text>

  <rect x="734" y="336" width="290" height="58" rx="12" fill="#DCFCE7"/>
  <text x="806" y="372" fill="#166534" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Layout once</text>

  <rect x="666" y="420" width="130" height="58" rx="12" fill="#E0F2FE"/>
  <rect x="814" y="420" width="130" height="58" rx="12" fill="#E0F2FE"/>
  <rect x="962" y="420" width="130" height="58" rx="12" fill="#E0F2FE"/>
  <text x="699" y="456" fill="#075985" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Read A</text>
  <text x="847" y="456" fill="#075985" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Read B</text>
  <text x="995" y="456" fill="#075985" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Read C</text>

  <text x="72" y="560" fill="#6B7280" font-size="18" font-family="Inter, Arial, sans-serif">
    The right side is not free, but it avoids turning every read into its own emergency layout checkpoint.
  </text>
</svg>
