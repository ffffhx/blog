<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">工具注册与调用外壳</title>
  <desc id="desc">展示工具模块如何经过 createTools、registerTool、Mutex、McpResponse 成为可调用的 MCP 工具。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#50606f"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #1f2933; }
      .bg { fill: #f7f3eb; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #5f6c76; }
      .box { fill: #ffffff; stroke: #d6cfc2; stroke-width: 2; rx: 8; }
      .blue { fill: #e8f1f8; stroke: #86aac6; }
      .green { fill: #e9f4ee; stroke: #8eb89b; }
      .gold { fill: #fbf0d5; stroke: #d6b767; }
      .rose { fill: #f7e8e5; stroke: #cb9187; }
      .label { font-size: 21px; font-weight: 700; }
      .small { font-size: 16px; fill: #596774; }
      .code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; fill: #314559; }
      .arrow { stroke: #50606f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="70" y="74" class="title">工具很多，但调用外壳统一</text>
  <text x="70" y="108" class="subtitle">分类开关、实验条件、页面路由、串行锁、响应格式化都在 registerTool 外壳里完成</text>

  <rect x="70" y="162" width="250" height="124" class="box blue"/>
  <text x="100" y="204" class="label">工具模块</text>
  <text x="100" y="235" class="small">pages / input / network</text>
  <text x="100" y="262" class="small">console / performance</text>

  <rect x="450" y="162" width="250" height="124" class="box gold"/>
  <text x="480" y="204" class="label">createTools()</text>
  <text x="480" y="235" class="small">选择 slim 或完整工具</text>
  <text x="480" y="262" class="small">按名称稳定排序</text>

  <rect x="830" y="162" width="250" height="124" class="box green"/>
  <text x="860" y="204" class="label">registerTool()</text>
  <text x="860" y="235" class="small">过滤分类与实验开关</text>
  <text x="860" y="262" class="small">合并 pageId schema</text>

  <rect x="180" y="418" width="250" height="126" class="box rose"/>
  <text x="210" y="460" class="label">调用前</text>
  <text x="210" y="492" class="small">Mutex 串行化</text>
  <text x="210" y="520" class="small">getContext 懒加载浏览器</text>

  <rect x="505" y="418" width="250" height="126" class="box"/>
  <text x="535" y="460" class="label">工具 handler</text>
  <text x="535" y="492" class="small">只关注具体动作</text>
  <text x="535" y="520" class="code">click / trace / screenshot</text>

  <rect x="830" y="418" width="250" height="126" class="box blue"/>
  <text x="860" y="460" class="label">McpResponse</text>
  <text x="860" y="492" class="small">文本、图片、分页、文件引用</text>
  <text x="860" y="520" class="small">structuredContent</text>

  <path d="M320 224 L450 224" class="arrow"/>
  <path d="M700 224 L830 224" class="arrow"/>
  <path d="M955 286 C955 350 305 350 305 418" class="arrow"/>
  <path d="M430 481 L505 481" class="arrow"/>
  <path d="M755 481 L830 481" class="arrow"/>

  <text x="84" y="675" class="small">关键点：每个工具是小块确定动作，平台性能力由统一外壳提供，测试和文档也能直接从工具定义生成。</text>
</svg>
