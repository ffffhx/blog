<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">性能 Trace 的 DevTools 解析链路</title>
  <desc id="desc">展示 performance_start_trace 如何录制 Chrome trace，再交给 DevTools TraceEngine 和 formatter 生成 Agent 可读输出。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#50606f"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #1f2933; }
      .bg { fill: #f7f3eb; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #5f6c76; }
      .box { fill: #ffffff; stroke: #d6cfc2; stroke-width: 2; rx: 8; }
      .blue { fill: #e8f1f8; stroke: #86aac6; }
      .green { fill: #e9f4ee; stroke: #8eb89b; }
      .gold { fill: #fbf0d5; stroke: #d6b767; }
      .rose { fill: #f7e8e5; stroke: #cb9187; }
      .label { font-size: 21px; font-weight: 700; }
      .small { font-size: 16px; fill: #596774; }
      .code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; fill: #314559; }
      .arrow { stroke: #50606f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="70" y="74" class="title">性能分析复用 Chrome DevTools 的解释器</text>
  <text x="70" y="108" class="subtitle">项目录制 trace，但指标解释、insight 和格式化主要交给 chrome-devtools-frontend</text>

  <rect x="70" y="172" width="245" height="112" class="box gold"/>
  <text x="100" y="214" class="label">开始录制</text>
  <text x="100" y="245" class="code">page.tracing.start()</text>

  <rect x="450" y="172" width="260" height="112" class="box blue"/>
  <text x="480" y="214" class="label">Chrome Trace</text>
  <text x="480" y="245" class="small">traceEvents buffer</text>

  <rect x="845" y="172" width="270" height="112" class="box green"/>
  <text x="875" y="214" class="label">TraceEngine</text>
  <text x="875" y="245" class="small">parse events + insights</text>

  <rect x="845" y="392" width="270" height="124" class="box rose"/>
  <text x="875" y="434" class="label">Formatter</text>
  <text x="875" y="465" class="small">summary / insight 输出</text>
  <text x="875" y="492" class="small">call tree / network 说明</text>

  <rect x="450" y="392" width="260" height="124" class="box"/>
  <text x="480" y="434" class="label">McpResponse</text>
  <text x="480" y="465" class="small">保存 trace 结果</text>
  <text x="480" y="492" class="small">返回文本和 structuredContent</text>

  <rect x="70" y="392" width="245" height="124" class="box blue"/>
  <text x="100" y="434" class="label">Agent</text>
  <text x="100" y="465" class="small">根据 insight 继续追问</text>
  <text x="100" y="492" class="code">analyze_insight</text>

  <path d="M315 228 L450 228" class="arrow"/>
  <path d="M710 228 L845 228" class="arrow"/>
  <path d="M980 284 L980 392" class="arrow"/>
  <path d="M845 454 L710 454" class="arrow"/>
  <path d="M450 454 L315 454" class="arrow"/>
  <path d="M192 392 C192 335 875 335 875 392" class="arrow"/>

  <text x="84" y="675" class="small">关键点：项目没有自造性能指标解释器，而是把 Chrome trace 交给 DevTools TraceEngine，输出更接近 DevTools 面板语义。</text>
</svg>
