<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Chrome DevTools MCP 的整体分层</title>
  <desc id="desc">从 MCP client 经过 stdio server、工具层、Puppeteer、Chrome 和 DevTools frontend 的整体架构。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#50606f"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #1f2933; }
      .bg { fill: #f7f3eb; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #5f6c76; }
      .box { fill: #ffffff; stroke: #d6cfc2; stroke-width: 2; rx: 8; }
      .blue { fill: #e8f1f8; stroke: #86aac6; }
      .green { fill: #e9f4ee; stroke: #8eb89b; }
      .gold { fill: #fbf0d5; stroke: #d6b767; }
      .rose { fill: #f7e8e5; stroke: #cb9187; }
      .label { font-size: 22px; font-weight: 700; }
      .small { font-size: 16px; fill: #596774; }
      .code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; fill: #314559; }
      .arrow { stroke: #50606f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="70" y="74" class="title">Chrome DevTools MCP 的整体分层</text>
  <text x="70" y="108" class="subtitle">它把 MCP 协议、Puppeteer 浏览器控制和 DevTools 分析模型接成一条 Agent 调试链路</text>

  <rect x="70" y="174" width="230" height="104" class="box gold"/>
  <text x="100" y="215" class="label">MCP Client</text>
  <text x="100" y="246" class="small">Codex / Claude / Gemini</text>

  <rect x="390" y="138" width="310" height="96" class="box blue"/>
  <text x="420" y="176" class="label">stdio MCP Server</text>
  <text x="420" y="206" class="code">chrome-devtools-mcp</text>

  <rect x="390" y="286" width="310" height="116" class="box"/>
  <text x="420" y="328" class="label">工具层</text>
  <text x="420" y="358" class="small">pages / input / network / console</text>
  <text x="420" y="384" class="small">performance / screenshot / script</text>

  <rect x="390" y="455" width="310" height="104" class="box green"/>
  <text x="420" y="496" class="label">运行上下文</text>
  <text x="420" y="527" class="code">McpContext + McpPage</text>

  <rect x="805" y="174" width="270" height="104" class="box rose"/>
  <text x="835" y="215" class="label">Puppeteer</text>
  <text x="835" y="246" class="small">launch / connect / page / locator</text>

  <rect x="805" y="334" width="270" height="104" class="box"/>
  <text x="835" y="375" class="label">Chrome / CDP</text>
  <text x="835" y="406" class="small">真实浏览器与调试协议</text>

  <rect x="805" y="494" width="270" height="122" class="box blue"/>
  <text x="835" y="536" class="label">DevTools frontend</text>
  <text x="835" y="566" class="small">TraceEngine / Formatter</text>
  <text x="835" y="592" class="small">Issue / SourceMap / Heap</text>

  <path d="M300 226 L390 186" class="arrow"/>
  <path d="M545 234 L545 286" class="arrow"/>
  <path d="M545 402 L545 455" class="arrow"/>
  <path d="M700 507 C750 507 755 226 805 226" class="arrow"/>
  <path d="M940 278 L940 334" class="arrow"/>
  <path d="M940 438 L940 494" class="arrow"/>
  <path d="M805 555 C750 555 746 526 700 526" class="arrow"/>

  <text x="84" y="672" class="small">关键点：浏览器动作由 Puppeteer 执行，调试解释由 DevTools frontend 提供，MCP 工具层负责把它们变成 Agent 可调用的接口。</text>
</svg>
