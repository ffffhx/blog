<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">页面快照与 uid 交互闭环</title>
  <desc id="desc">展示 take_snapshot 如何从可访问性树生成 uid，再由 click 和 fill 找回 DOM 元素并等待页面稳定。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#50606f"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #1f2933; }
      .bg { fill: #f7f3eb; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #5f6c76; }
      .box { fill: #ffffff; stroke: #d6cfc2; stroke-width: 2; rx: 8; }
      .blue { fill: #e8f1f8; stroke: #86aac6; }
      .green { fill: #e9f4ee; stroke: #8eb89b; }
      .gold { fill: #fbf0d5; stroke: #d6b767; }
      .rose { fill: #f7e8e5; stroke: #cb9187; }
      .label { font-size: 21px; font-weight: 700; }
      .small { font-size: 16px; fill: #596774; }
      .code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; fill: #314559; }
      .arrow { stroke: #50606f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #7d8a96; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="70" y="74" class="title">用 uid 替代脆弱坐标</text>
  <text x="70" y="108" class="subtitle">Agent 先读文本快照，再用 uid 执行动作，动作后等待导航和 DOM 稳定再继续观察</text>

  <rect x="75" y="168" width="245" height="116" class="box gold"/>
  <text x="105" y="210" class="label">Chrome Page</text>
  <text x="105" y="242" class="small">DOM、frame、页面状态</text>

  <rect x="460" y="168" width="260" height="116" class="box blue"/>
  <text x="490" y="210" class="label">accessibility.snapshot</text>
  <text x="490" y="242" class="small">includeIframes + AXNode</text>

  <rect x="850" y="168" width="260" height="116" class="box green"/>
  <text x="880" y="210" class="label">TextSnapshot</text>
  <text x="880" y="242" class="small">为节点分配稳定 uid</text>

  <rect x="850" y="395" width="260" height="116" class="box"/>
  <text x="880" y="437" class="label">Agent 选择 uid</text>
  <text x="880" y="469" class="code">click uid=1_7</text>

  <rect x="460" y="395" width="260" height="116" class="box rose"/>
  <text x="490" y="437" class="label">找回元素</text>
  <text x="490" y="469" class="small">uid -> AXNode -> ElementHandle</text>

  <rect x="75" y="395" width="245" height="116" class="box blue"/>
  <text x="105" y="437" class="label">执行 + 等待</text>
  <text x="105" y="469" class="small">Locator 点击 / 填写</text>
  <text x="105" y="495" class="small">等待导航和 DOM 稳定</text>

  <path d="M320 226 L460 226" class="arrow"/>
  <path d="M720 226 L850 226" class="arrow"/>
  <path d="M980 284 L980 395" class="arrow"/>
  <path d="M850 453 L720 453" class="arrow"/>
  <path d="M460 453 L320 453" class="arrow"/>
  <path d="M198 395 C198 330 198 330 198 284" class="loop"/>

  <text x="84" y="675" class="small">关键点：uid 建立在页面结构上，Locator 执行动作后再等待页面稳定，比让模型长期依赖坐标更适合真实调试。</text>
</svg>
