<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">MCP Server 启动与浏览器懒连接</title>
  <desc id="desc">展示 chrome-devtools-mcp 如何先启动 MCP server，再在工具第一次调用时懒启动或连接 Chrome。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#50606f"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #1f2933; }
      .bg { fill: #f7f3eb; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #5f6c76; }
      .box { fill: #ffffff; stroke: #d6cfc2; stroke-width: 2; rx: 8; }
      .blue { fill: #e8f1f8; stroke: #86aac6; }
      .green { fill: #e9f4ee; stroke: #8eb89b; }
      .gold { fill: #fbf0d5; stroke: #d6b767; }
      .label { font-size: 21px; font-weight: 700; }
      .small { font-size: 16px; fill: #596774; }
      .code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; fill: #314559; }
      .arrow { stroke: #50606f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="70" y="74" class="title">启动先轻量，浏览器按需出现</text>
  <text x="70" y="108" class="subtitle">listTools 只需要 schema，真正 launch/connect Chrome 发生在工具执行时的 getContext()</text>

  <rect x="78" y="172" width="220" height="90" class="box gold"/>
  <text x="108" y="208" class="label">bin 入口</text>
  <text x="108" y="238" class="code">Node 版本检查</text>

  <rect x="370" y="172" width="240" height="90" class="box blue"/>
  <text x="400" y="208" class="label">main 入口</text>
  <text x="400" y="238" class="code">parseArguments()</text>

  <rect x="682" y="172" width="250" height="90" class="box"/>
  <text x="712" y="208" class="label">创建 MCP Server</text>
  <text x="712" y="238" class="code">createMcpServer()</text>

  <rect x="682" y="330" width="250" height="94" class="box green"/>
  <text x="712" y="368" class="label">注册工具 schema</text>
  <text x="712" y="398" class="small">此时还不需要 Chrome</text>

  <rect x="370" y="330" width="240" height="94" class="box"/>
  <text x="400" y="368" class="label">stdio transport</text>
  <text x="400" y="398" class="code">server.connect()</text>

  <rect x="78" y="500" width="250" height="104" class="box blue"/>
  <text x="108" y="540" class="label">第一次工具调用</text>
  <text x="108" y="572" class="small">例如 navigate_page</text>

  <rect x="420" y="500" width="250" height="104" class="box gold"/>
  <text x="450" y="540" class="label">getContext()</text>
  <text x="450" y="572" class="small">懒启动或连接浏览器</text>

  <rect x="760" y="500" width="300" height="104" class="box green"/>
  <text x="790" y="540" class="label">Browser + McpContext</text>
  <text x="790" y="572" class="small">页面、collector、DevTools universe</text>

  <path d="M298 217 L370 217" class="arrow"/>
  <path d="M610 217 L682 217" class="arrow"/>
  <path d="M807 262 L807 330" class="arrow"/>
  <path d="M682 377 L610 377" class="arrow"/>
  <path d="M203 500 C205 430 300 378 370 378" class="arrow dash"/>
  <path d="M328 552 L420 552" class="arrow"/>
  <path d="M670 552 L760 552" class="arrow"/>

  <text x="84" y="675" class="small">关键点：工具列表和浏览器生命周期分离，减少 MCP client 初始化成本，也避免无工具调用时提前打开 Chrome。</text>
</svg>
