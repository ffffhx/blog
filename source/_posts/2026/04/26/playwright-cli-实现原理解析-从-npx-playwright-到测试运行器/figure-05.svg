<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Playwright CLI 的证据链入口</title>
  <desc id="desc">展示测试运行后 HTML report、blob report、trace viewer 和 trace CLI 的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#53626e"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #1f2933; }
      .bg { fill: #f7f3eb; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #5f6c76; }
      .box { fill: #ffffff; stroke: #d6cfc2; stroke-width: 2; rx: 8; }
      .blue { fill: #e8f1f8; stroke: #91b5ce; }
      .green { fill: #e9f4ee; stroke: #91b99c; }
      .gold { fill: #fbf0d5; stroke: #d8b86d; }
      .red { fill: #f7e4df; stroke: #cf998d; }
      .label { font-size: 21px; font-weight: 700; }
      .small { font-size: 15px; fill: #5d6872; }
      .arrow { stroke: #53626e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="70" y="72" class="title">CLI 不只负责运行，也负责消费失败证据</text>
  <text x="70" y="106" class="subtitle">report 和 trace 命令把测试产物变成可以查看、合并和脚本化检查的入口</text>

  <rect x="90" y="178" width="245" height="125" class="box gold"/>
  <text x="126" y="224" class="label">playwright test</text>
  <text x="126" y="258" class="small">执行测试并产生结果</text>

  <rect x="470" y="135" width="250" height="112" class="box blue"/>
  <text x="505" y="178" class="label">HTML report</text>
  <text x="505" y="210" class="small">show-report 本地查看</text>

  <rect x="470" y="288" width="250" height="112" class="box"/>
  <text x="505" y="331" class="label">blob report</text>
  <text x="505" y="363" class="small">merge-reports 合并分片</text>

  <rect x="470" y="441" width="250" height="112" class="box green"/>
  <text x="505" y="484" class="label">trace.zip</text>
  <text x="505" y="516" class="small">动作、快照、网络、console</text>

  <rect x="840" y="135" width="260" height="112" class="box blue"/>
  <text x="875" y="178" class="label">浏览器可视化</text>
  <text x="875" y="210" class="small">HTML report / trace viewer</text>

  <rect x="840" y="325" width="260" height="170" class="box red"/>
  <text x="875" y="368" class="label">trace CLI</text>
  <text x="875" y="402" class="small">actions / requests</text>
  <text x="875" y="430" class="small">console / errors</text>
  <text x="875" y="458" class="small">snapshot / screenshot</text>

  <rect x="840" y="575" width="260" height="92" class="box green"/>
  <text x="875" y="612" class="label">机器可读证据</text>
  <text x="875" y="642" class="small">CI、脚本、agent workflow</text>

  <path d="M335 240 C395 240 410 191 470 191" class="arrow"/>
  <path d="M335 240 C395 240 410 344 470 344" class="arrow"/>
  <path d="M335 240 C395 240 410 497 470 497" class="arrow"/>
  <path d="M720 191 L840 191" class="arrow"/>
  <path d="M720 497 C780 497 790 410 840 410" class="arrow"/>
  <path d="M970 495 L970 575" class="arrow"/>
</svg>
