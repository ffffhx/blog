<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Playwright CLI 的入口分层</title>
  <desc id="desc">从包管理器命令进入不同 npm 包的 bin，再汇聚到 commander program。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#50606f"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #1f2933; }
      .bg { fill: #f7f3eb; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #5f6c76; }
      .box { fill: #ffffff; stroke: #d6cfc2; stroke-width: 2; rx: 8; }
      .box-blue { fill: #e8f1f8; stroke: #91b5ce; }
      .box-green { fill: #e9f4ee; stroke: #91b99c; }
      .box-gold { fill: #fbf0d5; stroke: #d8b86d; }
      .label { font-size: 22px; font-weight: 700; }
      .small { font-size: 16px; fill: #596774; }
      .code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 16px; fill: #314559; }
      .arrow { stroke: #50606f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="70" y="74" class="title">Playwright CLI 的三层入口</text>
  <text x="70" y="108" class="subtitle">bin 文件很薄，真正的命令装配发生在 playwright-core 和 playwright 的 program 模块中</text>

  <rect x="70" y="165" width="240" height="110" class="box box-gold"/>
  <text x="100" y="210" class="label">包管理器命令</text>
  <text x="100" y="242" class="code">npx playwright test</text>

  <rect x="420" y="118" width="300" height="96" class="box"/>
  <text x="450" y="154" class="label">@playwright/test</text>
  <text x="450" y="184" class="code">cli.js -> playwright/lib/program</text>

  <rect x="420" y="260" width="300" height="96" class="box box-blue"/>
  <text x="450" y="296" class="label">playwright</text>
  <text x="450" y="326" class="code">cli.js -> ./lib/program</text>

  <rect x="420" y="402" width="300" height="96" class="box"/>
  <text x="450" y="438" class="label">playwright-core</text>
  <text x="450" y="468" class="code">cli.js -> coreBundle</text>

  <rect x="842" y="178" width="275" height="116" class="box box-green"/>
  <text x="872" y="220" class="label">commander program</text>
  <text x="872" y="252" class="small">统一解析参数</text>
  <text x="872" y="278" class="small">统一分发 action</text>

  <rect x="842" y="380" width="275" height="132" class="box"/>
  <text x="872" y="422" class="label">两类命令集合</text>
  <text x="872" y="454" class="small">core: open / install / trace</text>
  <text x="872" y="482" class="small">test: test / report / merge</text>

  <path d="M310 220 C355 220 366 166 420 166" class="arrow"/>
  <path d="M310 220 C358 220 370 308 420 308" class="arrow"/>
  <path d="M310 220 C350 220 365 450 420 450" class="arrow"/>
  <path d="M720 308 C770 308 790 236 842 236" class="arrow"/>
  <path d="M720 450 C770 450 790 446 842 446" class="arrow"/>
  <path d="M980 294 L980 380" class="arrow"/>

  <text x="84" y="655" class="small">关键点：用户看到的是一个 playwright 命令，源码里却通过包边界把基础自动化和测试运行器拆开。</text>
</svg>
