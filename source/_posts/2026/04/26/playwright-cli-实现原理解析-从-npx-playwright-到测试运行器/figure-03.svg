<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">playwright test 执行流水线</title>
  <desc id="desc">从 CLI 参数进入配置加载、测试发现、phase、dispatcher、worker 和 reporter。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#53626e"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #1f2933; }
      .bg { fill: #f7f3eb; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #5f6c76; }
      .box { fill: #ffffff; stroke: #d6cfc2; stroke-width: 2; rx: 8; }
      .blue { fill: #e8f1f8; stroke: #91b5ce; }
      .green { fill: #e9f4ee; stroke: #91b99c; }
      .gold { fill: #fbf0d5; stroke: #d8b86d; }
      .red { fill: #f7e4df; stroke: #cf998d; }
      .label { font-size: 21px; font-weight: 700; }
      .small { font-size: 15px; fill: #5d6872; }
      .arrow { stroke: #53626e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .lane { fill: none; stroke: #d6cfc2; stroke-width: 2; stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="70" y="72" class="title">`playwright test` 的内部流水线</text>
  <text x="70" y="106" class="subtitle">CLI 先归一参数，再把一次测试运行拆成可调度的任务链</text>

  <rect x="70" y="160" width="190" height="100" class="box gold"/>
  <text x="100" y="198" class="label">CLI 参数</text>
  <text x="100" y="228" class="small">路径 / grep / project</text>

  <rect x="315" y="160" width="205" height="100" class="box blue"/>
  <text x="345" y="198" class="label">配置加载</text>
  <text x="345" y="228" class="small">config + overrides</text>

  <rect x="575" y="160" width="205" height="100" class="box"/>
  <text x="605" y="198" class="label">测试发现</text>
  <text x="605" y="228" class="small">files -> suites</text>

  <rect x="835" y="160" width="205" height="100" class="box green"/>
  <text x="865" y="198" class="label">任务链</text>
  <text x="865" y="228" class="small">setup / load / run</text>

  <rect x="132" y="370" width="220" height="116" class="box blue"/>
  <text x="162" y="412" class="label">phase 生成</text>
  <text x="162" y="442" class="small">处理 project 依赖</text>
  <text x="162" y="468" class="small">决定哪些可并行</text>

  <rect x="435" y="370" width="220" height="116" class="box"/>
  <text x="465" y="412" class="label">dispatcher</text>
  <text x="465" y="442" class="small">调度 test group</text>
  <text x="465" y="468" class="small">尊重 workers 限制</text>

  <rect x="738" y="370" width="220" height="116" class="box green"/>
  <text x="768" y="412" class="label">worker 进程</text>
  <text x="768" y="442" class="small">执行测试文件</text>
  <text x="768" y="468" class="small">隔离失败状态</text>

  <rect x="435" y="580" width="220" height="96" class="box red"/>
  <text x="465" y="620" class="label">reporter / 产物</text>
  <text x="465" y="650" class="small">stdout / trace / report</text>

  <path d="M260 210 L315 210" class="arrow"/>
  <path d="M520 210 L575 210" class="arrow"/>
  <path d="M780 210 L835 210" class="arrow"/>
  <path d="M938 260 C938 322 240 312 240 370" class="arrow"/>
  <path d="M352 428 L435 428" class="arrow"/>
  <path d="M655 428 L738 428" class="arrow"/>
  <path d="M848 486 C848 620 690 628 655 628" class="arrow"/>
  <path d="M545 580 L545 520 C545 500 545 498 545 486" class="arrow"/>

  <rect x="94" y="330" width="930" height="190" class="lane"/>
  <text x="104" y="350" class="small">并发执行区：phase 内并行，phase 间按依赖顺序推进</text>
</svg>
