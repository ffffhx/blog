<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Playwright 浏览器工具命令复用 launchContext</title>
  <desc id="desc">open、codegen、screenshot、pdf 和 install 的内部职责分布。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#53626e"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #1f2933; }
      .bg { fill: #f7f3eb; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #5f6c76; }
      .box { fill: #ffffff; stroke: #d6cfc2; stroke-width: 2; rx: 8; }
      .blue { fill: #e8f1f8; stroke: #91b5ce; }
      .green { fill: #e9f4ee; stroke: #91b99c; }
      .gold { fill: #fbf0d5; stroke: #d8b86d; }
      .label { font-size: 21px; font-weight: 700; }
      .small { font-size: 15px; fill: #5d6872; }
      .arrow { stroke: #53626e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="70" y="72" class="title">浏览器工具命令共用同一套上下文启动层</text>
  <text x="70" y="106" class="subtitle">CLI 参数最终会变成 launchOptions 和 contextOptions</text>

  <rect x="70" y="160" width="220" height="330" class="box gold"/>
  <text x="105" y="204" class="label">CLI 命令</text>
  <text x="105" y="250" class="small">open</text>
  <text x="105" y="286" class="small">codegen</text>
  <text x="105" y="322" class="small">screenshot</text>
  <text x="105" y="358" class="small">pdf</text>
  <text x="105" y="420" class="small">参数：browser / device</text>
  <text x="105" y="448" class="small">storage / har / proxy</text>

  <rect x="385" y="160" width="270" height="330" class="box blue"/>
  <text x="425" y="204" class="label">launchContext()</text>
  <text x="425" y="250" class="small">选择 BrowserType</text>
  <text x="425" y="286" class="small">合成 launchOptions</text>
  <text x="425" y="322" class="small">合成 contextOptions</text>
  <text x="425" y="358" class="small">注册关闭与保存逻辑</text>
  <text x="425" y="420" class="small">输出 browser + context</text>

  <rect x="750" y="160" width="300" height="140" class="box green"/>
  <text x="790" y="204" class="label">浏览器上下文</text>
  <text x="790" y="242" class="small">launch / launchPersistentContext</text>
  <text x="790" y="270" class="small">newContext / openPage</text>

  <rect x="750" y="350" width="300" height="140" class="box"/>
  <text x="790" y="394" class="label">命令专属动作</text>
  <text x="790" y="432" class="small">recorder / screenshot / pdf</text>
  <text x="790" y="460" class="small">waitForSelector / storageState</text>

  <rect x="385" y="565" width="270" height="100" class="box"/>
  <text x="425" y="606" class="label">install</text>
  <text x="425" y="636" class="small">走 registry，不走 launchContext</text>

  <rect x="750" y="565" width="300" height="100" class="box green"/>
  <text x="790" y="606" class="label">浏览器二进制资产</text>
  <text x="790" y="636" class="small">revision / platform / dependencies</text>

  <path d="M290 325 L385 325" class="arrow"/>
  <path d="M655 238 L750 238" class="arrow"/>
  <path d="M900 300 L900 350" class="arrow"/>
  <path d="M655 615 L750 615" class="arrow"/>
</svg>
