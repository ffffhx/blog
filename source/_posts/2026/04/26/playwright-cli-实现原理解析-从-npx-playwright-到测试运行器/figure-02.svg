<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Playwright CLI 命令装配图</title>
  <desc id="desc">展示 core 命令和 test 命令怎样共同挂到同一个 commander program。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4f5f6b"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #1f2933; }
      .bg { fill: #f7f3eb; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #5f6c76; }
      .panel { fill: #ffffff; stroke: #d6cfc2; stroke-width: 2; rx: 8; }
      .head-core { fill: #dcecf6; }
      .head-test { fill: #e5f2e8; }
      .head-stub { fill: #fbefd4; }
      .label { font-size: 22px; font-weight: 700; }
      .item { font-size: 18px; fill: #31404d; }
      .small { font-size: 15px; fill: #65717b; }
      .program { fill: #273746; }
      .program-text { fill: #ffffff; font-size: 24px; font-weight: 700; }
      .arrow { stroke: #4f5f6b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="70" y="72" class="title">命令不是写在一个大 switch 里</text>
  <text x="70" y="106" class="subtitle">Playwright 用 decorator 把不同层的命令挂到同一个 commander program</text>

  <rect x="70" y="155" width="310" height="420" class="panel"/>
  <rect x="70" y="155" width="310" height="68" class="head-core"/>
  <text x="100" y="198" class="label">playwright-core</text>
  <text x="100" y="254" class="item">open / cr / ff / wk</text>
  <text x="100" y="290" class="item">codegen</text>
  <text x="100" y="326" class="item">install / install-deps</text>
  <text x="100" y="362" class="item">screenshot / pdf</text>
  <text x="100" y="398" class="item">show-trace</text>
  <text x="100" y="434" class="item">trace actions / requests</text>
  <text x="100" y="470" class="item">run-server / run-driver</text>
  <text x="100" y="522" class="small">来源：libCli.decorateProgram(program)</text>

  <rect x="445" y="155" width="310" height="420" class="panel"/>
  <rect x="445" y="155" width="310" height="68" class="head-test"/>
  <text x="475" y="198" class="label">playwright / @playwright/test</text>
  <text x="475" y="254" class="item">test</text>
  <text x="475" y="290" class="item">show-report</text>
  <text x="475" y="326" class="item">merge-reports</text>
  <text x="475" y="362" class="item">clear-cache</text>
  <text x="475" y="398" class="item">test-server</text>
  <text x="475" y="434" class="item">run-test-mcp-server</text>
  <text x="475" y="470" class="item">init-agents</text>
  <text x="475" y="522" class="small">来源：packages/playwright/src/program.ts</text>

  <rect x="820" y="238" width="300" height="154" class="program" rx="8"/>
  <text x="865" y="306" class="program-text">commander program</text>
  <text x="870" y="344" class="program-text">parse(process.argv)</text>

  <rect x="820" y="456" width="300" height="96" class="panel"/>
  <rect x="820" y="456" width="300" height="48" class="head-stub"/>
  <text x="850" y="487" class="label">playwright-core stub</text>
  <text x="850" y="528" class="small">未安装测试包时提示安装 @playwright/test</text>

  <path d="M380 330 C425 330 410 315 445 315" class="arrow"/>
  <path d="M755 315 L820 315" class="arrow"/>
  <path d="M380 250 C620 110 800 210 840 255" class="arrow"/>
  <path d="M970 392 L970 456" class="arrow"/>
</svg>
